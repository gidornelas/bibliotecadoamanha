    <script type="module">
        // IMPORTANTE: Configure seu projeto Firebase em firebase-config.js
        // e substitua as configurações abaixo pelas suas reais
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getFirestore, doc, getDoc, setDoc, enableIndexedDbPersistence, onSnapshot } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, setPersistence, browserLocalPersistence, browserSessionPersistence, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';

        // Configuração Firebase (SUBSTITUA PELAS SUAS CONFIGURAÇÕES REAIS)
        const firebaseConfig = {
            apiKey: "AIzaSyA6cx6vGuJHzohRyr-uda_gI7_MavD_OmU", // ← ALTERE AQUI
            authDomain: "biblioteca-do-amanha.firebaseapp.com", // ← ALTERE AQUI
            projectId: "biblioteca-do-amanha", // ← ALTERE AQUI
            storageBucket: "biblioteca-do-amanha.firebasestorage.app", // ← ALTERE AQUI
            messagingSenderId: "39485326387", // ← ALTERE AQUI
            appId: "1:39485326387:web:84c1e13522efa7cbb1cf46" // ← ALTERE AQUI
        };

        const supabaseConfig = {
            url: 'https://sasnmejcbjvoupxqicff.supabase.co', // ← ALTERE AQUI
            anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhc25tZWpjYmp2b3VweHFpY2ZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDAzMTQsImV4cCI6MjA5MDk3NjMxNH0.GF3AgdBMegRdYKP5bUMO7WwjfEDPbOHMzDHrQHoszts', // ← ALTERE AQUI
            bucket: 'biblioteca-epubs' // ← CRIE ESTE BUCKET NO SUPABASE
        };

        window.supabaseConfig = supabaseConfig;
        window.supabaseBucket = supabaseConfig.bucket;
        window.supabaseClient = null;
        // Configure a URL publica para o proxy de capas (Goodreads/Skoob) em producao.
        // Exemplo: window.coverProxyBaseUrl = 'https://SEU-DOMINIO.com/api/cover';
        window.coverProxyBaseUrl = window.coverProxyBaseUrl || 'https://biblioteca-do-amanha.vercel.app/api/cover';
        window.getCoverProxyBases = () => {
            const fromConfig = String(window.coverProxyBaseUrl || '')
                .split(',')
                .map(value => value.trim())
                .filter(Boolean);

            const sameOriginBase = (window.location?.origin && /^https?:/i.test(window.location.origin))
                ? `${window.location.origin}/api/cover`
                : '';

            const isLocalHost = ['localhost', '127.0.0.1'].includes(window.location?.hostname || '');
            const localDevBase = isLocalHost ? 'http://localhost:8787/cover' : '';

            return [...new Set([...fromConfig, sameOriginBase, localDevBase].filter(Boolean))];
        };
        window.supabaseConfigReady = Boolean(
            supabaseConfig.url &&
            !supabaseConfig.url.includes('SEU-PROJETO') &&
            supabaseConfig.anonKey &&
            !supabaseConfig.anonKey.includes('SUA_ANON_KEY')
        );

        window.ensureSupabaseClient = async () => {
            if (window.supabaseClient) return window.supabaseClient;
            if (!window.supabaseConfigReady) return null;

            for (let i = 0; i < 20; i += 1) {
                const supabaseLib = window.supabase || globalThis.supabase;
                if (supabaseLib?.createClient) {
                    window.supabaseClient = supabaseLib.createClient(supabaseConfig.url, supabaseConfig.anonKey);
                    return window.supabaseClient;
                }
                await new Promise(resolve => setTimeout(resolve, 100));
            }

            return null;
        };

        try {
            window.FirebaseApp = initializeApp(firebaseConfig);
            window.db = getFirestore(window.FirebaseApp);
            enableIndexedDbPersistence(window.db).catch((error) => {
                console.warn('Persistência offline não ativada:', error.code);
            });
            window.auth = getAuth(window.FirebaseApp);
            window.doc = doc;
            window.getDoc = getDoc;
            window.setDoc = setDoc;
            window.onSnapshot = onSnapshot;
            window.signInWithEmailAndPassword = signInWithEmailAndPassword;
            window.sendPasswordResetEmail = sendPasswordResetEmail;
            window.setPersistence = setPersistence;
            window.browserLocalPersistence = browserLocalPersistence;
            window.browserSessionPersistence = browserSessionPersistence;
            window.signOut = signOut;
            window.onAuthStateChanged = onAuthStateChanged;
            console.log('✅ Firebase conectado com sucesso!');
        } catch (error) {
            console.warn('⚠️ Firebase não configurado. Usando apenas localStorage.', error);
            window.db = null;
        }

        try {
            if (window.supabaseConfigReady) {
                window.ensureSupabaseClient()
                    .then((client) => {
                        if (client) console.log('✅ Supabase Storage conectado com sucesso!');
                        else console.warn('⚠️ Supabase não carregou no navegador. Verifique a CDN ou extensões que bloqueiam scripts.');
                    })
                    .catch((error) => {
                        console.warn('⚠️ Falha ao iniciar Supabase Storage.', error);
                    });
            } else {
                console.warn('⚠️ Supabase não configurado. Preencha url e anon key para ativar uploads remotos.');
            }
        } catch (error) {
            console.warn('⚠️ Falha ao iniciar Supabase Storage.', error);
        }
    </script>

<body class="bg-[#F8F9FB] text-[#111827]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // Suprime console.log em produção; mantém console.error e console.warn
        if (typeof location !== 'undefined' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            console.log = () => {};
        }

        // --- 0. CONFIGURAÇÃO DO BANCO DE DADOS NA NUVEM ---

        const LOCAL_META_PREFIX = 'libdb-meta:';
        const LOCAL_PENDING_SYNC_KEY = 'libdb-pending-sync-keys-v1';

        const getLocalMetaKey = (key) => `${LOCAL_META_PREFIX}${key}`;

        const setLocalSnapshot = (key, data, timestampMs = Date.now()) => {
            localStorage.setItem(key, JSON.stringify(data));
            localStorage.setItem(getLocalMetaKey(key), String(timestampMs));
        };

        const getLocalSnapshot = (key, defaultValue = {}) => {
            const rawData = localStorage.getItem(key);
            const rawTs = localStorage.getItem(getLocalMetaKey(key));
            const timestampMs = Number(rawTs) || 0;

            if (!rawData) {
                return { exists: false, data: defaultValue, timestampMs };
            }

            try {
                return {
                    exists: true,
                    data: JSON.parse(rawData),
                    timestampMs
                };
            } catch {
                return { exists: false, data: defaultValue, timestampMs: 0 };
            }
        };

        const getPendingSyncKeys = () => {
            try {
                const raw = localStorage.getItem(LOCAL_PENDING_SYNC_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        };

        const setPendingSyncKeys = (keys) => {
            const unique = [...new Set(keys)].filter(Boolean);
            localStorage.setItem(LOCAL_PENDING_SYNC_KEY, JSON.stringify(unique));
        };

        const markPendingSyncKey = (key, shouldBePending) => {
            const current = getPendingSyncKeys();
            if (shouldBePending) {
                if (!current.includes(key)) setPendingSyncKeys([...current, key]);
                return;
            }
            setPendingSyncKeys(current.filter(item => item !== key));
        };

        const extractTimestampMs = (value) => {
            if (!value) return 0;
            const maybeDate = typeof value === 'string' ? new Date(value) : value.toDate?.();
            const time = maybeDate?.getTime?.();
            return Number.isFinite(time) ? time : 0;
        };

        // Funções para salvar/carregar dados do Firebase
        const waitForDb = async () => {
            for (let i = 0; i < 20; i += 1) {
                if (window.db) return true;
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            return false;
        };

        // Chaves que são compartilhadas entre os dois perfis (chat, comentários, notificações)
        const SHARED_KEYS = new Set([
            'libdb-chat-v1-shared',
            'libdb-comments-v1-shared',
            'libdb-notifications-v1'
        ]);

        // Chave compartilhada para mapear perfil -> UID do Firebase
        const PROFILE_UIDS_KEY = 'profile-uids';

        // Retorna a referência Firestore correta: compartilhada ou pessoal
        const getCloudDocRef = (key) => {
            if (SHARED_KEYS.has(key)) {
                // Path único para toda a biblioteca — acessível pelas duas usuárias
                return doc(window.db, 'shared', 'biblioteca-do-amanha', 'data', key);
            }
            const userId = window.auth?.currentUser?.uid || 'default-user';
            return doc(window.db, 'users', userId, 'data', key);
        };

        const readCloudSnapshot = async (key, defaultValue = {}) => {
            if (!window.db) {
                const ready = await waitForDb();
                if (!ready) return { exists: false, data: defaultValue, timestampMs: 0 };
            }
            const docRef = getCloudDocRef(key);
            const docSnap = await getDoc(docRef);

            if (!docSnap.exists()) {
                return { exists: false, data: defaultValue, timestampMs: 0 };
            }

            const cloudData = docSnap.data() || {};
            return {
                exists: true,
                data: cloudData.data ?? defaultValue,
                timestampMs: extractTimestampMs(cloudData.timestamp)
            };
        };

        // Lê dados do Firestore usando o UID de outro usuário (para leitura cross-profile)
        const readCloudSnapshotForUid = async (key, uid, defaultValue = {}) => {
            if (!window.db) {
                const ready = await waitForDb();
                if (!ready) return { exists: false, data: defaultValue, timestampMs: 0 };
            }
            const docRef = doc(window.db, 'users', uid, 'data', key);
            const docSnap = await getDoc(docRef);

            if (!docSnap.exists()) {
                return { exists: false, data: defaultValue, timestampMs: 0 };
            }

            const cloudData = docSnap.data() || {};
            return {
                exists: true,
                data: cloudData.data ?? defaultValue,
                timestampMs: extractTimestampMs(cloudData.timestamp)
            };
        };

        // Carrega o mapa de UIDs dos perfis do Firestore compartilhado
        const loadProfileUids = async () => {
            if (!window.db) {
                const ready = await waitForDb();
                if (!ready) return {};
            }
            try {
                const uidsDocRef = doc(window.db, 'shared', 'biblioteca-do-amanha', 'data', PROFILE_UIDS_KEY);
                const snap = await getDoc(uidsDocRef);
                return snap.exists() ? snap.data() : {};
            } catch (e) {
                console.warn('[ProfileUIDs] Erro ao carregar UIDs:', e);
                return {};
            }
        };

        const saveToCloud = async (key, data, setSyncStatus) => {
            const nowMs = Date.now();
            setLocalSnapshot(key, data, nowMs);
            try {
                console.log('[Cloud] Salvando', key, 'com', typeof data === 'object' ? Object.keys(data).length : '? items');
                if (!window.db) {
                    const ready = await waitForDb();
                    if (!ready) {
                        console.warn('[Cloud] Database não pronto, marcando para sincronização posterior');
                        if (setSyncStatus) setSyncStatus("offline");
                        markPendingSyncKey(key, true);
                        return;
                    }
                }

                const userId = window.auth.currentUser ? window.auth.currentUser.uid : 'default-user';
                console.log('[Cloud] Enviando para Firestore:', { key, shared: SHARED_KEYS.has(key), uid: userId });
                await setDoc(getCloudDocRef(key), {
                    data: data,
                    timestamp: new Date(nowMs).toISOString()
                });
                console.log('[Cloud]', key, '- Salvo com sucesso na nuvem');
                markPendingSyncKey(key, false);
                if (setSyncStatus) setSyncStatus("online");
            } catch (error) {
                console.error('[Cloud] Erro ao salvar', key, ':', error);
                if (setSyncStatus) setSyncStatus("offline");
                markPendingSyncKey(key, true);
            }
        };

        const sanitizeFileName = (name = '') =>
            name
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-zA-Z0-9._-]/g, '_');

        const ensureSupabaseReady = async () => {
            const client = window.ensureSupabaseClient ? await window.ensureSupabaseClient() : window.supabaseClient;
            return !!client && !!window.supabaseBucket;
        };

        const downloadEpubByUrl = async (epubUrl, fileName) => {
            try {
                if (!epubUrl) {
                    throw new Error('EPUB sem URL remota.');
                }

                const response = await fetch(epubUrl);
                if (!response.ok) {
                    throw new Error('Não foi possível descarregar o EPUB do Supabase.');
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = fileName || 'livro.epub';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            } catch (err) {
                console.error('Erro ao baixar EPUB:', err);
                notifyUser('Erro ao baixar EPUB: ' + err.message, 'error');
            }
        };

        const deleteEpubFromCloud = async (epubPath) => {
            if (!epubPath) return;
            const isReady = await ensureSupabaseReady();
            if (!isReady) {
                throw new Error('Supabase Storage indisponível no navegador. Verifique a CDN, a URL e a anon key.');
            }

            const { error } = await window.supabaseClient
                .storage
                .from(window.supabaseBucket)
                .remove([epubPath]);

            if (error) {
                throw error;
            }
        };

        const uploadEpubToCloud = async (bookId, file, previousPath = null) => {
            if (!window.auth?.currentUser || !file) {
                throw new Error('Utilizador não autenticado.');
            }
            const isReady = await ensureSupabaseReady();
            if (!isReady) {
                throw new Error('Supabase Storage indisponível no navegador. Verifique a CDN, a URL e a anon key.');
            }
            const isEpub = (file.type === 'application/epub+zip') || /\.epub$/i.test(file.name || '');
            if (!isEpub) {
                throw new Error('Arquivo inválido. Envie apenas arquivos .epub');
            }
            const maxSizeBytes = 5 * 1024 * 1024; // 5MB limite
            if (file.size > maxSizeBytes) {
                throw new Error('Arquivo muito grande. Limite de 5MB para EPUBs.');
            }

            try {
                const safeFileName = sanitizeFileName(file.name || `livro-${bookId}.epub`);
                const epubPath = `users/${window.auth.currentUser.uid}/books/${bookId}/${Date.now()}-${safeFileName}`;

                const { error: uploadError } = await window.supabaseClient
                    .storage
                    .from(window.supabaseBucket)
                    .upload(epubPath, file, {
                        cacheControl: '3600',
                        upsert: false,
                        contentType: 'application/epub+zip'
                    });

                if (uploadError) {
                    throw uploadError;
                }

                if (previousPath && previousPath !== epubPath) {
                    try {
                        await deleteEpubFromCloud(previousPath);
                    } catch (cleanupError) {
                        console.warn('Não foi possível remover o EPUB antigo:', cleanupError);
                    }
                }

                const { data } = window.supabaseClient
                    .storage
                    .from(window.supabaseBucket)
                    .getPublicUrl(epubPath);

                return {
                    url: data?.publicUrl || '',
                    fileName: file.name || 'livro.epub',
                    epubKey: epubPath,
                    epubPath,
                    epubOrigin: 'supabase'
                };
            } catch (error) {
                throw new Error(error?.message || 'Falha ao processar EPUB.');
            }
        };

        const loadFromCloud = async (key, defaultValue = {}, setSyncStatus) => {
            try {
                console.log('[Cloud] Carregando', key);
                const [cloudSnapshot, localSnapshot] = await Promise.all([
                    readCloudSnapshot(key, defaultValue),
                    Promise.resolve(getLocalSnapshot(key, defaultValue))
                ]);

                const cloudReady = window.db || await waitForDb();
                if (!cloudReady && setSyncStatus) setSyncStatus("offline");
                else if (setSyncStatus) setSyncStatus("online");

                // Escolhe sempre o dado mais novo entre local e nuvem.
                if (localSnapshot.exists && localSnapshot.timestampMs > cloudSnapshot.timestampMs) {
                    console.log('[Cloud]', key, '- Usando local (mais novo):', localSnapshot.data);
                    markPendingSyncKey(key, true);
                    return localSnapshot.data;
                }

                if (cloudSnapshot.exists) {
                    console.log('[Cloud]', key, '- Usando nuvem, sincronizando local');
                    setLocalSnapshot(key, cloudSnapshot.data, cloudSnapshot.timestampMs || Date.now());
                    markPendingSyncKey(key, false);
                    return cloudSnapshot.data;
                }

                const result = localSnapshot.exists ? localSnapshot.data : defaultValue;
                console.log('[Cloud]', key, '- Retornando default ou local');
                return result;
            } catch (error) {
                console.error('[Cloud] Erro ao carregar', key, ':', error);
                if (setSyncStatus) setSyncStatus("offline");
                const localSnapshot = getLocalSnapshot(key, defaultValue);
                console.log('[Cloud]', key, '- Fallback para local em caso de erro');
                return localSnapshot.exists ? localSnapshot.data : defaultValue;
            }
        };

        const flushPendingCloudSync = async (setSyncStatus) => {
            const keys = getPendingSyncKeys();
            if (keys.length === 0) return;

            for (const key of keys) {
                const localSnapshot = getLocalSnapshot(key, null);
                if (!localSnapshot.exists) {
                    markPendingSyncKey(key, false);
                    continue;
                }
                await saveToCloud(key, localSnapshot.data, setSyncStatus);
            }

        const APP_TOAST_EVENT = 'libdb:toast';

        const normalizeText = (value = '') =>
            (value || '')

        const booksMatch = (left, right) =>
            normalizeText(left?.title) === normalizeText(right?.title) &&
            normalizeText(left?.author) === normalizeText(right?.author);

        const dedupeBooksByIdentity = (books = []) => {
            const seen = new Set();
            return (books || []).filter((book) => {
                const key = `${normalizeText(book?.title)}||${normalizeText(book?.author)}`;
                if (!key || key === '||' || seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        };

        const notifyUser = (message, tone = 'info', sub = '') => {
            if (!message) return;

                } catch (err) {
                    console.error('[Toast] Erro ao despachar evento:', err);

            console.warn('[Toast] Fallback - navegador não suporta CustomEvent:', message);
        };

        const withUiTimeout = (promise, ms, timeoutMessage) => Promise.race([
            promise,
            new Promise((_, reject) => setTimeout(() => reject(new Error(timeoutMessage)), ms))
        ]);

        function useTimeoutRegistry() {
            const registryRef = useRef([]);

            const registerTimeout = useCallback((callback, delay) => {
                const timeoutId = setTimeout(() => {
                    registryRef.current = registryRef.current.filter(id => id !== timeoutId);
                    callback();
                }, delay);
                registryRef.current.push(timeoutId);
                return timeoutId;
            }, []);

            const clearRegisteredTimeouts = useCallback(() => {
                registryRef.current.forEach(clearTimeout);
                registryRef.current = [];
            }, []);

            useEffect(() => clearRegisteredTimeouts, [clearRegisteredTimeouts]);

            return { registerTimeout, clearRegisteredTimeouts };
        }

        function useDebouncedEffect(effect, deps, delay) {
            useEffect(() => {
                const timeoutId = setTimeout(() => {
                    effect();
                }, delay);

                return () => clearTimeout(timeoutId);
            }, [...deps, delay]);
        }

        function useToastCenter() {
            const [toasts, setToasts] = useState([]);
            const { registerTimeout } = useTimeoutRegistry();

            const removeToast = useCallback((toastId) => {
                setToasts(prev => prev.filter(toast => toast.id !== toastId));
            }, []);

            useEffect(() => {
                const handler = (event) => {
                    const detail = event?.detail || {};
                    const message = String(detail.message || '').trim();
                    console.log('[Toast] Handler recebeu evento:', { message, tone: detail.tone, event });
                    if (!message) return;

                    const toastId = `toast-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
                    const nextToast = {
                        id: toastId,
                        tone: detail.tone || 'info',
                        message,
                        sub: String(detail.sub || '').trim()
                    };

                    console.log('[Toast] Adicionando toast ao estado:', nextToast);
                    setToasts(prev => {
                        const updated = [...prev, nextToast].slice(-4);
                        console.log('[Toast] Estado de toasts atualizado:', updated);
                        return updated;
                    });
                    registerTimeout(() => removeToast(toastId), 3600);
                };

                console.log('[Toast] Registrando event listener para', APP_TOAST_EVENT);
                window.addEventListener(APP_TOAST_EVENT, handler);
                return () => {
                    console.log('[Toast] Removendo event listener para', APP_TOAST_EVENT);
                    window.removeEventListener(APP_TOAST_EVENT, handler);
                };
            }, [registerTimeout, removeToast]);

            return { toasts, removeToast };
        }

                'um', 'uma', 'para', 'por', 'com', 'sem', 'ao', 'aos', 'à', 'às', 'the', 'of', 'and'
            ]);

            const buildNoiseTokenSet = (title = '', author = '') => {
                const source = `${title || ''} ${author || ''}`;
                const tokens = new Set();
                normalizeTag(source)
                    .split(' ')
                    .map(v => v.trim())
                    .filter(v => v.length >= 3 && !TAG_STOPWORDS.has(v))
                    .forEach(v => tokens.add(v));
                return tokens;
            };

            const sanitizeStoryTags = (values = [], title = '', author = '') => {
                const noiseTokens = buildNoiseTokenSet(title, author);
                return uniqueTags(values).filter((tag) => {
                    const key = normalizeTag(tag);
                    if (!key) return false;
                    if (GENERIC_TAG_BLOCKLIST.has(key)) return false;
                    if (noiseTokens.has(key)) return false;

                    const words = key.split(' ').filter(Boolean);
                    if (!words.length) return false;

                    const allNoise = words.every(word => noiseTokens.has(word) || TAG_STOPWORDS.has(word));
                    if (allNoise) return false;

                    return words.some(word => word.length >= 4 && !TAG_STOPWORDS.has(word));
                }).slice(0, 10);
            };

            const makeLeanSynopsis = (value = '') => {
                const text = stripHtml(value);
                if (!text) return '';
                const spoilerCue = /\b(final|finalmente|revela|revelado|revelação|descobre|descoberta|assassino|culpado|identidade|morre|morte de|desmascara|verdade por trás)\b/i;
                const sentences = text
                    .split(/(?<=[.!?])\s+/)
                    .map(part => part.trim())
                    .filter(Boolean);
                const safe = sentences.filter(sentence => !spoilerCue.test(sentence));
                return (safe.length ? safe : sentences).slice(0, 5).join(' ').slice(0, 800);
            };

            const inferTropeTags = (categories = [], synopsis = '', genre = '') => {
                const pool = `${(categories || []).join(' ')} ${synopsis || ''} ${genre || ''}`.toLowerCase();
                const checks = [
                    [/triangulo amoroso|triângulo amoroso|love triangle/, 'triângulo amoroso'],
                    [/plot twist|reviravolta/, 'plot twist'],
                    [/narrador nao confiavel|narrador não confiável|narrador misterioso/, 'narrador misterioso'],
                    [/enemies to lovers/, 'enemies to lovers'],
                    [/friends to lovers/, 'friends to lovers'],
                    [/slow burn/, 'slow burn'],
                    [/crime|investigacao|investigação|detetive|serial killer/, 'mistério investigativo'],
                    [/suspense|thriller/, 'suspense psicológico'],
                    [/podcast|true crime/, 'true crime'],
                    [/dark fantasy|fantasia sombria/, 'fantasia sombria'],
                    [/romantasy/, 'romantasy'],
                    [/distopia|dystopia/, 'distopia'],
                    [/ficcao cientifica|ficção científica|science fiction|sci-fi/, 'ficção científica'],
                    [/familia|família|segredos de familia|segredos de família/, 'segredos de família'],
                    [/passado|trauma|luto/, 'passado traumático'],
                    [/realeza|corte|principe|príncipe/, 'intriga de corte'],
                    [/magia|feitic|feitiç|bruxa|deus|deuses/, 'sistema de magia']
                ];
                const out = [];
                checks.forEach(([pattern, label]) => {
                    if (pattern.test(pool)) out.push(label);
                });
                return uniqueTags(out).slice(0, 10);
            };


            const inferGenreFromSignals = (categories = [], synopsis = '') => {
                const pool = `${(categories || []).join(' ')} ${synopsis || ''}`.toLowerCase();
                if (/romantasy/.test(pool)) return 'Romantasy';
                if (/thriller|suspense|crime|misterio|mistério|psicologico|psicológico/.test(pool)) return 'Thriller';
                if (/distopia|dystopia/.test(pool)) return 'Distopia';
                if (/ficcao cientifica|ficção científica|science fiction|sci-fi/.test(pool)) return 'Ficção Científica';
                if (/romance|love story|contemporaneo|contemporâneo/.test(pool)) return 'Romance Contemporâneo';
                if (/fantasia|fantasy|magia|reino|dragao|dragão/.test(pool)) return 'Fantasia';
                if (/literario|literário|literatura|literary/.test(pool)) return 'Ficção Literária';
                return '';
            };

            const sectionLabelFromGenre = (genre = '') => {
                const g = String(genre || '');
                if (g === 'Thriller') return 'Thriller & Suspense Psicológico';
                if (g === 'Romance Contemporâneo') return 'Romance Contemporâneo';
                if (g === 'Fantasia' || g === 'Romantasy' || g === 'Ficção Científica' || g === 'Distopia') return 'Fantasia';
                if (g === 'Ficção Literária') return 'Ficção Literária';
                return 'Literatura Geral';
            };

            // ── Open Library ─────────────────────────────────────────
            const olNormalize = (doc) => {
                const isbns = doc.isbn || [];
                const isbn13 = isbns.find(i => i.length === 13);
                const isbn10 = isbns.find(i => i.length === 10);
                const coverId = doc.cover_i;
                const coverUrl = coverId
                    ? `https://covers.openlibrary.org/b/id/${coverId}-L.jpg`
                    : (isbn13 ? `https://covers.openlibrary.org/b/isbn/${isbn13}-L.jpg`
                        : (isbn10 ? `https://covers.openlibrary.org/b/isbn/${isbn10}-L.jpg` : null));
                return {
                    title: doc.title || '',
                    author: (doc.author_name || [])[0] || '',
                    allAuthors: doc.author_name || [],
                    publisher: (doc.publisher || [])[0] || '',
                    publishYear: doc.first_publish_year || null,
                    pages: doc.number_of_pages_median || null,
                    synopsis: null,
                    coverUrl: coverUrl || null,
                    rawCategories: (doc.subject || []).slice(0, 8),
                    isbn13: isbn13 || null,
                    isbn10: isbn10 || null,
                };
            };

            const searchOpenLibrary = async (query) => {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 8000);
                try {
                    const params = new URLSearchParams({ title: query, limit: '5' });
                    const res = await fetch(`https://openlibrary.org/search.json?${params}`, { signal: controller.signal });
                    if (!res.ok) return [];
                    const data = await res.json();
                    return (data.docs || []).slice(0, 5).map(olNormalize);
                } catch { return []; }
                finally { clearTimeout(timeout); }
            };

            // ── Google Books ──────────────────────────────────────────
            const gbNormalize = (vol) => {
                const info = vol.volumeInfo || {};
                const ids = info.industryIdentifiers || [];
                const isbn13 = (ids.find(i => i.type === 'ISBN_13') || {}).identifier || null;
                const isbn10 = (ids.find(i => i.type === 'ISBN_10') || {}).identifier || null;
                const thumb = info.imageLinks?.thumbnail || info.imageLinks?.smallThumbnail || '';
                const coverUrl = thumb
                    ? thumb.replace('http://', 'https://').replace(/zoom=\d+/, 'zoom=3')
                    : null;
                return {
                    title: info.title || '',
                    author: (info.authors || [])[0] || '',
                    allAuthors: info.authors || [],
                    publisher: info.publisher || '',
                    publishYear: info.publishedDate ? parseInt(info.publishedDate.slice(0, 4)) : null,
                    pages: info.pageCount || null,
                    synopsis: (info.description || '').replace(/<[^>]+>/g, '').trim() || null,
                    coverUrl,
                    rawCategories: info.categories || [],
                    isbn13,
                    isbn10,
                };
            };

            const searchGoogleBooks = async (query) => {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 8000);
                try {
                    const q = `intitle:${encodeURIComponent(query)}`;
                    const res = await fetch(
                        `https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=5&orderBy=relevance`,
                        { signal: controller.signal }
                    );
                    if (!res.ok) return [];
                    const data = await res.json();
                    return (data.items || []).slice(0, 5).map(gbNormalize);
                } catch { return []; }
                finally { clearTimeout(timeout); }
            };

            // ── Deduplicate + score ───────────────────────────────────
            const scoreBook = (r) => {
                let s = 0;
                if (r.isbn13 || r.isbn10) s++;
                if (r.synopsis && r.synopsis.length > 50) s++;
                if (r.coverUrl) s++;
                if (r.pages) s++;
                if (r.publisher) s++;
                return s;
            };

            const deduplicateBooks = (list) => {
                const seen = new Map();
                for (const r of list) {
                    const key = r.isbn13 || r.isbn10 || `${r.title.toLowerCase()}|${(r.author || '').toLowerCase()}`;
                    if (!seen.has(key)) {
                        seen.set(key, r);
                    } else {
                        const ex = seen.get(key);
                        seen.set(key, {
                            ...ex,
                            synopsis:      ex.synopsis      || r.synopsis,
                            publisher:     ex.publisher     || r.publisher,
                            pages:         ex.pages         || r.pages,
                            coverUrl:      ex.coverUrl      || r.coverUrl,
                            rawCategories: uniqueTags([...ex.rawCategories, ...r.rawCategories]),
                            isbn13:        ex.isbn13        || r.isbn13,
                            isbn10:        ex.isbn10        || r.isbn10,
                        });
                    }
                }
                return [...seen.values()];
            };

            // ── Search handler ────────────────────────────────────────
            const handleBookSearch = async () => {
                const q = bookSearchQuery.trim();
                if (!q) return;
                setIsSearching(true);
                setSearchError('');
                setBookSearchResults([]);
                setClaudeError('');
                try {
                    const [ol, gb] = await Promise.all([
                        searchOpenLibrary(q),
                        searchGoogleBooks(q),
                    ]);
                    const merged = deduplicateBooks([...gb, ...ol])
                        .sort((a, b) => scoreBook(b) - scoreBook(a))
                        .slice(0, 5);
                    if (!merged.length) setSearchError(`Nenhum resultado para "${q}".`);
                    else setBookSearchResults(merged);
                } catch {
                    setSearchError('Erro ao buscar. Verifique sua conexão.');
                } finally {
                    setIsSearching(false);
                }
            };

            // ── Helpers para enriquecimento ───────────────────────────
            const applyProfileToForm = (p, result) => {
                const resolvedGenre = GENRES.includes(p.genre) ? p.genre
                    : inferGenreFromSignals(result.rawCategories, p.synopsis || result.synopsis || '')
                    || form.genre || 'Fantasia';
                const resolvedTags = sanitizeStoryTags([
                    ...(Array.isArray(p.tags) ? p.tags : []),
                    ...inferTropeTags(result.rawCategories, p.synopsis || '', resolvedGenre),
                ], p.title || result.title, p.author || result.author);
                setForm(prev => ({
                    ...prev,
                    title:     p.title     || result.title    || prev.title,
                    author:    p.author    || result.author   || prev.author,
                    publisher: p.publisher || result.publisher || prev.publisher,
                    pages:     p.pages     || result.pages    || prev.pages,
                    synopsis:  p.synopsis  || makeLeanSynopsis(result.synopsis || '') || prev.synopsis,
                    coverUrl:  toHttps(result.coverUrl || '') || prev.coverUrl,
                    genre:     resolvedGenre,
                    tags:      resolvedTags.join(', '),
                    isSeries:  !!p.isSeries,
                    series:    p.series || prev.series,
                    volume:    p.volume || prev.volume,
                }));
            };

            // Chama Anthropic diretamente do browser (fallback para GitHub Pages)
            const enrichBrowser = async (result, apiKey) => {
                const prompt = `Você é um especialista em literatura. Analise os dados brutos e retorne JSON enriquecido.\nResponda APENAS JSON válido, sem markdown.\n"synopsis": PT-BR, 3-5 frases sem spoilers.\n"genre": exatamente um de: Fantasia|Romantasy|Ficção Científica|Thriller|Romance Contemporâneo|Ficção Literária|Distopia\n"tags": array 4-8 strings (tropos e atmosfera)\n"publisher": editora brasileira se possível\n"isSeries": boolean, "series": string, "volume": number`;
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 20000);
                try {
                    const res = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        signal: controller.signal,
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': apiKey,
                            'anthropic-version': '2023-06-01',
                            'anthropic-dangerous-direct-browser-access': 'true',
                        },
                        body: JSON.stringify({
                            model: 'claude-haiku-4-5-20251001',
                            max_tokens: 1024,
                            messages: [{ role: 'user', content: JSON.stringify({
                                title: result.title, author: result.author,
                                publisher: result.publisher, pages: result.pages,
                                synopsis: result.synopsis, rawCategories: result.rawCategories,
                            }) }],
                        }),
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err?.error?.message || `HTTP ${res.status}`);
                    }
                    const data = await res.json();
                    const text = data?.content?.[0]?.text || '';
                    const match = text.match(/\{[\s\S]*\}/);
                    if (!match) throw new Error('Resposta inválida');
                    return JSON.parse(match[0]);
                } finally {
                    clearTimeout(timeout);
                }
            };

            // ── Apply result (tenta servidor → fallback browser) ──────
            const applyBookResult = async (result) => {
                setBookSearchResults([]);
                setSearchError('');
                setClaudeError('');
                setIsEnriching(true);

                try {
                    // 1) Tenta endpoint serverless (funciona no Vercel)
                    let serverOk = false;
                    try {
                        const res = await fetch('/api/claude-enrich', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                title: result.title, author: result.author,
                                publisher: result.publisher, publishYear: result.publishYear,
                                pages: result.pages, synopsis: result.synopsis,
                                rawCategories: result.rawCategories,
                            }),
                        });
                        if (res.ok) {
                            const data = await res.json();
                            if (data.ok && data.profile) {
                                applyProfileToForm(data.profile, result);
                                serverOk = true;
                                return;
                            }
                        }
                    } catch (_) { /* servidor indisponível — tenta browser */ }

                    // 2) Fallback: chama Anthropic direto do browser (GitHub Pages)
                    if (!serverOk && localApiKey) {
                        const profile = await enrichBrowser(result, localApiKey);
                        applyProfileToForm(profile, result);
                        return;
                    }

                    if (!serverOk && !localApiKey) {
                        setClaudeError('Configure uma chave Anthropic abaixo para enriquecer os dados.');
                    }
                } catch (err) {
                    setClaudeError(err.message || 'Erro ao enriquecer com IA.');
                } finally {
                    setIsEnriching(false);
                }

                // Fallback: apply raw data without AI enrichment
                const resolvedGenre = inferGenreFromSignals(result.rawCategories, result.synopsis || '') || form.genre || 'Fantasia';
                const resolvedSynopsis = makeLeanSynopsis(result.synopsis || '');
                const resolvedTags = sanitizeStoryTags(
                    inferTropeTags(result.rawCategories, resolvedSynopsis, resolvedGenre),
                    result.title, result.author
                );
                setForm(prev => ({
                    ...prev,
                    title:     result.title     || prev.title,
                    author:    result.author    || prev.author,
                    publisher: result.publisher || prev.publisher,
                    pages:     result.pages     || prev.pages,
                    synopsis:  resolvedSynopsis || prev.synopsis,
                    coverUrl:  toHttps(result.coverUrl || '') || prev.coverUrl,
                    genre:     resolvedGenre,
                    tags:      resolvedTags.join(', '),
                }));
            };

            const submit = async (e) => {
                e.preventDefault();
                if (!form.title.trim() || !form.author.trim()) return;

                const parsedTotalVolumes = Number(form.totalVolumes) || 0;
                const parsedVolume = Number(form.volume) || 0;
                const isBookInSeries = !!form.isSeries && parsedTotalVolumes > 1;
                const bookId = initialBook?.id || Date.now();
                const finalGenre = (customGenre.trim() || form.genre || "Fantasia").trim();

                let epubUrl = initialBook?.epubUrl || "";
                let epubFileName = initialBook?.epubFileName || "";
                let epubKey = initialBook?.epubKey || null;
                let epubPath = initialBook?.epubPath || initialBook?.epubKey || null;
                let epubOrigin = initialBook?.epubOrigin || null;

                if (epubFile) {
                    try {
                        setIsUploadingEpub(true);
                        setEpubMessage("A carregar EPUB...");
                        const uploaded = await withUiTimeout(
                            uploadEpubToCloud(bookId, epubFile, epubPath),
                            30000,
                            'Upload sem resposta. Verifique o bucket do Supabase e a conexão.'
                        );
                        epubUrl = uploaded.url;
                        epubFileName = uploaded.fileName;
                        epubKey = uploaded.epubKey;
                        epubPath = uploaded.epubPath;
                        epubOrigin = uploaded.epubOrigin;
                        setEpubMessage("EPUB enviado com sucesso.");
                    } catch (error) {
                        console.error(error);
                        setEpubMessage(error?.message || "Não foi possível enviar o EPUB. Verifique login, bucket e políticas do Supabase.");
                        return;
                    } finally {
                        setIsUploadingEpub(false);
                    }
                }

                onSave({
                    id: bookId,
                    addedAt: initialBook?.addedAt || Date.now(),
                    title: form.title.trim(),
                    author: form.author.trim(),
                    genre: finalGenre,
                    publisher: form.publisher.trim() || "Independente",
                    pages: Number(form.pages) || 0,
                    synopsis: form.synopsis.trim() || "Sem sinopse informada.",
                    coverUrl: form.coverUrl.trim() || "https://via.placeholder.com/300x450?text=Sem+Capa",
                    tags: form.tags.split(',').map(t => t.trim()).filter(Boolean),
                    series: isBookInSeries ? form.series.trim() : "",
                    volume: isBookInSeries ? parsedVolume : 0,
                    totalVolumes: isBookInSeries ? parsedTotalVolumes : 0,
                    isSeries: isBookInSeries,
                    epubUrl,
                    epubFileName,
                    epubKey,
                    epubPath,
                    epubOrigin,
                    isBrazilianAuthor: !!form.isBrazilianAuthor,
                    isDistopia: !!form.isDistopia
                });
            };

            const selectableGenres = (() => {
                const base = [...DEFAULT_GENRES];
                if (form.genre && !base.includes(form.genre)) base.unshift(form.genre);
                return base;
            })();

            const previewTags = uniqueTags((form.tags || '').split(',').map(t => t.trim())).slice(0, 10);
            const previewSection = sectionLabelFromGenre(form.genre || '');

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in">
                    <div className="absolute inset-0 bg-[#0F2240]/60 backdrop-blur-sm" onClick={onClose} />
                    <form onSubmit={submit} className="relative z-10 bg-white dark:bg-gray-900 w-full max-w-2xl rounded-3xl shadow-2xl border border-gray-100 dark:border-gray-800 p-6 md:p-8 max-h-[92vh] overflow-y-auto">
                        <h3 className="text-2xl font-serif font-bold text-[#1E3A5F] dark:text-teal-300 mb-6">{initialBook ? 'Editar Livro' : 'Adicionar Livro'}</h3>

                        <div className="mb-5 p-4 rounded-2xl border border-[#1E3A5F]/10 bg-[#1E3A5F]/[0.03]">
                            <div className="flex items-center justify-between mb-3">
                                <p className="text-[11px] uppercase tracking-widest text-[#1E3A5F] font-black">Buscar Livro</p>
                                <div className="flex flex-col items-end gap-1">
                                    {localApiKey ? (
                                        <div className="flex items-center gap-2">
                                            <span className="text-[10px] bg-[#14B8A6]/10 text-[#14B8A6] border border-[#14B8A6]/20 rounded-full px-2 py-0.5 font-bold flex items-center gap-1"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg> Claude ativo</span>
                                            <button type="button" onClick={removeLocalKey} className="text-[10px] text-red-400 hover:text-red-600">remover</button>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-end gap-1">
                                            <button type="button" onClick={() => setShowKeyInput(v => !v)} className="text-[10px] text-[#14B8A6] hover:underline">
                                                {showKeyInput ? (<span className="flex items-center gap-1"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg> cancelar</span>) : (<span className="flex items-center gap-1"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg> chave Anthropic</span>)}
                                            </button>
                                            {showKeyInput && (
                                                <div className="flex gap-1">
                                                    <input
                                                        type="password"
                                                        placeholder="sk-ant-..."
                                                        value={keyInput}
                                                        onChange={e => setKeyInput(e.target.value)}
                                                        onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), saveLocalKey())}
                                                        className="text-xs px-2 py-1 border border-gray-200 rounded-lg w-40 outline-none focus:ring-1 focus:ring-[#14B8A6]/40"
                                                    />
                                                    <button type="button" onClick={saveLocalKey} className="text-xs px-2 py-1 bg-[#14B8A6] text-white rounded-lg font-bold">Salvar</button>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <input
                                    className="flex-1 pl-4 pr-4 py-2.5 border border-gray-200 bg-white text-gray-900 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#14B8A6]/30 focus:border-[#14B8A6] transition-all"
                                    placeholder="Digite o título do livro..."
                                    value={bookSearchQuery}
                                    onChange={(e) => setBookSearchQuery(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && (e.preventDefault(), handleBookSearch())}
                                />
                                <button
                                    type="button"
                                    onClick={handleBookSearch}
                                    disabled={isSearching || !bookSearchQuery.trim()}
                                    className="px-4 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-semibold disabled:opacity-50 hover:bg-[#162d4a] transition-colors flex items-center justify-center"
                                >
                                    {isSearching ? (
                                        <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                                            <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
                                        </svg>
                                    )}
                                </button>
                            </div>
                            {isEnriching && (
                                <div className="mt-3 flex items-center gap-2 text-xs text-[#14B8A6]">
                                    <div className="w-3.5 h-3.5 border-2 border-[#14B8A6]/30 border-t-[#14B8A6] rounded-full animate-spin" />
                                    Organizando ficha com IA...
                                </div>
                            )}
                            {searchError && <p className="mt-2 text-xs text-red-500">{searchError}</p>}
                            {claudeError && <p className="mt-2 text-xs text-amber-600">IA indisponível ({claudeError}) — dados brutos aplicados.</p>}
                            {bookSearchResults.length > 0 && (
                                <div className="mt-3 space-y-2">
                                    <p className="text-[11px] uppercase tracking-widest text-gray-500 font-black">Selecione o resultado</p>
                                    {bookSearchResults.map((result, idx) => (
                                        <button
                                            key={`${result.title}-${result.author || idx}`}
                                            type="button"
                                            onClick={() => applyBookResult(result)}
                                            className="w-full text-left px-3 py-2.5 rounded-xl border border-gray-200 bg-white hover:border-[#14B8A6]/50 hover:bg-teal-50/50 transition-colors flex gap-3"
                                        >
                                            {result.coverUrl ? (
                                                <img src={result.coverUrl} alt="" className="w-9 h-12 object-cover rounded shrink-0" onError={(e) => e.target.style.display='none'} />
                                            ) : (
                                                <div className="w-9 h-12 rounded bg-gradient-to-br from-[#1E3A5F] to-[#14B8A6] shrink-0 flex items-center justify-center text-white text-[10px] font-bold">

        // --- 3. COMPONENTES DE UI ---

        function AnimatedStatCard({ label, value, variant = 'default' }) {
            const [dV, setDV] = useState(value);
            useEffect(() => {
                if (dV === value) return;
                const t = setInterval(() => setDV(p => (p < value ? p + 1 : p - 1)), 30);
                return () => clearInterval(t);
            }, [value, dV]);

            const isHighlight = variant === 'highlight';
            return (
                <div className={`backdrop-blur-md border p-2.5 md:p-3.5 rounded-2xl flex flex-col items-center justify-center min-w-[74px] md:min-w-[108px] transition-transform hover:scale-105 duration-300 ${isHighlight ? 'bg-[rgba(29,206,165,0.1)] border-[rgba(29,206,165,0.25)]' : 'bg-[rgba(255,255,255,0.06)] border-[rgba(255,255,255,0.1)]'}`}>
                    <span className={`font-serif font-bold leading-none mb-1 ${isHighlight ? 'text-[#1dcea5] text-[26px]' : 'text-white text-[22px]'}`}>{dV}</span>
                    <span className="text-[10px] uppercase tracking-[0.8px] text-white/45 font-bold text-center">{label}</span>
                </div>
            );
        }

        function CuratedCoverImage({ item }) {
            const [coverIndex, setCoverIndex] = useState(0);

            const createInlinePlaceholder = useCallback((title = '') => {
                const safeTitle = (title || 'Sem Capa').replace(/[&<>"']/g, '').slice(0, 36);
                const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='300' height='450' viewBox='0 0 300 450'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop offset='0%' stop-color='#1E3A5F'/><stop offset='100%' stop-color='#14B8A6'/></linearGradient></defs><rect width='300' height='450' fill='url(#g)'/><rect x='20' y='20' width='260' height='410' rx='18' fill='rgba(255,255,255,0.09)'/><text x='150' y='214' text-anchor='middle' fill='white' font-size='13' font-family='Arial, sans-serif' font-weight='700'>SEM CAPA</text><text x='150' y='238' text-anchor='middle' fill='rgba(255,255,255,0.92)' font-size='12' font-family='Arial, sans-serif'>${safeTitle}</text></svg>`;
                return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
            }, []);

            const improveCoverQuality = useCallback((inputUrl = '') => {
                let url = (inputUrl || '').trim();
                if (!url || url.startsWith('data:image/')) return url;

                url = url.replace(/^http:\/\//i, 'https://');

                // Prefer larger Open Library variants when available.
                url = url.replace(/-(S|M)\.jpg(\?|$)/i, '-L.jpg$2');

                // Promote Goodreads-style low-res suffixes.
                url = url
                    .replace(/_SX\d+_/gi, '_SX600_')
                    .replace(/_SY\d+_/gi, '_SY900_')
                    .replace(/_SL\d+_/gi, '_SL600_');

                // Google Books often returns tiny thumbnails; request higher zoom.
                try {
                    const parsed = new URL(url);
                    const host = parsed.hostname || '';
                    if (/google|gstatic|googleusercontent/i.test(host)) {
                        const currentZoom = Number(parsed.searchParams.get('zoom') || '0');
                        if (!Number.isNaN(currentZoom) && currentZoom < 3) parsed.searchParams.set('zoom', '3');
                        if (!parsed.searchParams.has('zoom')) parsed.searchParams.set('zoom', '3');
                        parsed.searchParams.delete('edge');
                        url = parsed.toString();
                    }
                } catch {
                    // If URL parsing fails, keep best-effort transformed URL.
                }

                return url;
            }, []);

            const coverSources = useMemo(() => {
                const fromItem = Array.isArray(item?.coverCandidates) ? item.coverCandidates : [];
                const titleCover = item?.title ? `https://covers.openlibrary.org/b/title/${encodeURIComponent(item.title)}-L.jpg?default=false` : '';
                const isbnCover = item?.isbn ? `https://covers.openlibrary.org/b/isbn/${encodeURIComponent(item.isbn)}-L.jpg?default=false` : '';
                const proxyBases = typeof window.getCoverProxyBases === 'function' ? window.getCoverProxyBases() : [];
                const proxyCoverUrls = item?.title
                    ? proxyBases.flatMap(base => ([
                        `${base}?source=skoob&title=${encodeURIComponent(item.title)}&author=${encodeURIComponent(item?.author || '')}`,
                        `${base}?source=goodreads&title=${encodeURIComponent(item.title)}&author=${encodeURIComponent(item?.author || '')}`
                    ]))
                    : [];
                const merged = [...fromItem, item?.coverUrl || '', isbnCover, titleCover]
                    .map(url => (url || '').trim())
                    .filter(Boolean)
                    .map(improveCoverQuality);
                // Keep localhost proxy URLs as http, but normalize other http links to https.
                const normalized = merged.map(url => (url.startsWith('http://localhost:') ? url : url.replace(/^http:\/\//i, 'https://')));
                // Use proxy covers as fallback because they can be smaller/compressed.
                const proxyAsFallback = proxyCoverUrls.map(improveCoverQuality);
                return [...new Set([...normalized, ...proxyAsFallback].filter(Boolean))];
            }, [item, improveCoverQuality]);

            useEffect(() => {
                setCoverIndex(0);
            }, [item?.id, item?.title]);

            const placeholderSrc = createInlinePlaceholder(item?.title || 'Sem Capa');
            const currentSrc = coverIndex < coverSources.length
                ? coverSources[coverIndex]
                : placeholderSrc;

            return (
                <img
                    src={currentSrc}
                    alt={item?.title || 'Capa do livro'}
                    className="w-full h-full object-cover"
                    loading="lazy"
                    referrerPolicy="no-referrer"
                    onLoad={(e) => {
                        const img = e.currentTarget;
                        const tooSmall = img.naturalWidth > 0 && (img.naturalWidth < 240 || img.naturalHeight < 340);
                        if (tooSmall && coverIndex < coverSources.length - 1) {
                            setCoverIndex(prev => prev + 1);
                        }
                    }}
                    onError={() => {
                        // Avanca para a proxima opcao e, no fim, cai no placeholder inline.
                        setCoverIndex(prev => prev + 1);
                    }}
                />
            );
        }

        // ─── Telegram View ────────────────────────────────────────────────────────
        function TelegramView({ onImportBook, notifyUser, catalogBooks = [], profileId }) {
            const WORKER_URL = ''; // usa /api/telegram-download (Vercel)

            const [query, setQuery]         = React.useState('');
            const [results, setResults]     = React.useState([]);
            const [loading, setLoading]     = React.useState(false);
            const [searched, setSearched]   = React.useState(false);
            const [error, setError]         = React.useState('');
            const [importing, setImporting] = React.useState({});
            const [imported, setImported]   = React.useState({});
            const inputRef                  = React.useRef(null);

            React.useEffect(() => { inputRef.current?.focus(); }, []);

            async function handleSearch(e) {
                e?.preventDefault();
                const q = query.trim();
                if (q.length < 2) return;
                setLoading(true);
                setError('');
                setResults([]);
                setSearched(false);
                try {
                    const r = await fetch(`/api/telegram-search?query=${encodeURIComponent(q)}`);
                    const data = await r.json();
                    if (!data.success) throw new Error(data.error || 'Erro na busca');
                    setResults(data.files || []);
                    setSearched(true);
                } catch (err) {
                    setError(err.message);
                    setSearched(true);
                } finally {
                    setLoading(false);
                }
            }

            async function handleImport(file) {
                setImporting(p => ({ ...p, [file.messageId]: true }));
                try {
                    const r = await fetch('/api/telegram-download', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messageId: file.messageId, fileName: file.fileName, chatId: file.chatId }),
                    });
                    const data = await r.json();
                    if (!data.success) throw new Error(data.error || 'Falha no download');
                    const guessTitle = file.fileName.replace(/\.epub$/i, '').replace(/[_-]+/g, ' ').trim();
                    const normalize = s => s.toLowerCase().replace(/[^a-z0-9]/g, '');
                    const normFile = normalize(guessTitle);
                    const match = catalogBooks.find(b => {
                        const normBook = normalize(b.title);
                        return normBook === normFile || normFile.includes(normBook) || normBook.includes(normFile);
                    });
                    onImportBook({ title: guessTitle, epubUrl: data.url, fileName: data.fileName, existingBookId: match?.id });
                    setImported(p => ({ ...p, [file.messageId]: true }));
                    const msg = match
                        ? `EPUB vinculado a "${match.title}" no catálogo!`
                        : `"${guessTitle}" adicionada ao catálogo!`;
                    notifyUser(msg, 'success', 'EPUB salvo no Supabase');
                } catch (err) {
                    notifyUser('Erro ao importar: ' + err.message, 'error');
                } finally {
                    setImporting(p => ({ ...p, [file.messageId]: false }));
                }
            }

            function FileCard({ file }) {
                const isImporting = importing[file.messageId];
                const isImported  = imported[file.messageId];
                const [kindleSending, setKindleSending] = React.useState(false);
                const [kindleSent, setKindleSent]       = React.useState(false);
                const date = file.date ? new Date(file.date).toLocaleDateString('pt-PT', { day: '2-digit', month: 'short', year: 'numeric' }) : '';

                async function handleSendToKindle() {
                    setKindleSending(true);
                    try {
                        const r = await fetch('/api/send-to-kindle', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ messageId: file.messageId, chatId: file.chatId, fileName: file.fileName, profileId }),
                        });
                        const data = await r.json();
                        if (!data.success) throw new Error(data.error || 'Falha no envio');
                        setKindleSent(true);
                        notifyUser('Enviado ao Kindle!', 'success', 'Verifique o dispositivo em alguns minutos');
                    } catch (err) {
                        notifyUser('Erro ao enviar: ' + err.message, 'error');
                    } finally {
                        setKindleSending(false);
                    }
                }

                return (
                    <div className="flex items-center gap-4 px-5 py-4 bg-white dark:bg-gray-800 rounded-2xl border-l-4 border border-gray-100 dark:border-gray-700 shadow-sm hover:shadow-md transition-all" style={{ borderLeftColor: '#2AABEE' }}>
                        <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={{ background: 'rgba(42,171,238,0.10)' }}>
                            <svg className="w-5 h-5" style={{ color: '#2AABEE' }} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        </div>
                        <div className="flex-1 min-w-0">
                            <p className="text-sm font-semibold text-[#1E3A5F] dark:text-teal-300 truncate leading-tight">{file.fileName}</p>
                            <div className="flex items-center gap-2 mt-1 flex-wrap">
                                <span className="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded border" style={{ background: 'rgba(42,171,238,0.08)', color: '#2AABEE', borderColor: 'rgba(42,171,238,0.25)' }}>EPUB</span>
                                <span className="text-[11px] text-gray-400">{file.sizeLabel}</span>
                                {date && <span className="text-[11px] text-gray-400">· {date}</span>}
                            </div>
                        </div>
                        <div className="flex gap-2 flex-shrink-0">
                            <button
                                onClick={handleSendToKindle}
                                disabled={kindleSending || kindleSent}
                                title="Enviar ao Kindle"
                                className={`px-3 py-2 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all flex items-center gap-1.5 border ${kindleSent ? 'bg-amber-900/30 text-amber-400 border-amber-800 cursor-default' : kindleSending ? 'bg-gray-700 text-gray-400 border-gray-600 cursor-wait' : 'bg-amber-900/20 text-amber-400 border-amber-800 hover:bg-amber-900/30'}`}
                            >
                                {kindleSending ? <span className="w-3 h-3 border-2 border-amber-700 border-t-amber-400 rounded-full animate-spin inline-block" /> : <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg>}
                                {kindleSent ? 'Enviado' : 'Kindle'}
                            </button>
                            <button
                                onClick={() => handleImport(file)}
                                disabled={isImporting || isImported}
                                className={`px-4 py-2 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all flex items-center gap-2 ${isImported ? 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 border border-emerald-200 dark:border-emerald-800 cursor-default' : isImporting ? 'bg-gray-50 dark:bg-gray-700 text-gray-400 border border-gray-200 dark:border-gray-600 cursor-wait' : 'bg-[#14B8A6] text-white hover:bg-[#0D9488] shadow-sm'}`}
                            >
                                {isImported ? (
                                    <React.Fragment><svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg> Importado</React.Fragment>
                                ) : isImporting ? (
                                    <React.Fragment><span className="w-3.5 h-3.5 border-2 border-gray-300 border-t-gray-500 rounded-full animate-spin inline-block" /> Baixando...</React.Fragment>
                                ) : (
                                    <React.Fragment><svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Importar</React.Fragment>
                                )}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-3xl mx-auto space-y-6">
                    <div className="flex items-center gap-3 mb-2">
                        <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={{ background: 'rgba(42,171,238,0.12)' }}>
                            <svg className="w-5 h-5" style={{ color: '#2AABEE' }} viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.96 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                        </div>
                        <div>
                            <h2 className="text-base font-bold text-[#1E3A5F] dark:text-teal-300">Buscar EPUBs no Telegram</h2>
                            <p className="text-xs text-gray-400">Pesquise no grupo e importe direto ao seu acervo</p>

        // ─── Send to Kindle Button ────────────────────────────────────────────────
        function SendToKindleButton({ epubUrl, fileName, messageId, chatId, profileId }) {
            const [sending, setSending] = React.useState(false);
            const [sent, setSent]       = React.useState(false);

            async function handleSend() {
                setSending(true);
                try {
                    const body = epubUrl
                        ? { epubUrl, fileName, profileId }
                        : { messageId, chatId, fileName, profileId };
                    const r = await fetch('/api/send-to-kindle', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                    });
                    const data = await r.json();
                    if (!data.success) throw new Error(data.error || 'Falha no envio');
                    setSent(true);
                    window.dispatchEvent(new CustomEvent('libdb:toast', { detail: { message: 'Enviado ao Kindle!', tone: 'success', sub: 'Verifique o dispositivo em alguns minutos' } }));
                } catch (err) {
                    window.dispatchEvent(new CustomEvent('libdb:toast', { detail: { message: 'Erro ao enviar: ' + err.message, tone: 'error' } }));
                } finally {
                    setSending(false);
                }
            }

            return (
                <button
                    onClick={handleSend}
                    disabled={sending || sent}
                    className={`w-full py-3 px-4 rounded-xl text-[10px] font-bold uppercase tracking-wider flex items-center justify-center gap-2 transition-all border ${sent ? 'bg-amber-900/30 text-amber-400 border-amber-800 cursor-default' : sending ? 'bg-gray-800 text-gray-400 border-gray-700 cursor-wait' : 'bg-amber-900/20 text-amber-400 border-amber-800 hover:bg-amber-900/30'}`}
                >
                    {sending
                        ? <React.Fragment><span className="w-3.5 h-3.5 border-2 border-amber-700 border-t-amber-400 rounded-full animate-spin" /> Enviando...</React.Fragment>
                        : sent
                            ? <React.Fragment><svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg> Enviado ao Kindle</React.Fragment>
                            : <React.Fragment><svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg> Enviar ao Kindle</React.Fragment>
                    }
                </button>
            );
        }

        function BookCard({ book, coverUrl, onClick, isQueueMode, queueIndex, totalInQueue, onMove, onRemoveFromQueue, onGenreClick, hasRemoteEpub, effectiveEpub, showImportButton, onImportToMine, isRead, isDownloaded, isInQueue, canQuickEdit, onQuickToggleRead, onQuickToggleDownload, onQuickToggleQueue, isHighlighted, commentsCount = 0, onDragReorder, isDragging, onDragOver, onDragLeave, userRating = 0, onRate }) {
            const styles = getGenreStyles(book.genre);
            const isMultiVolumeSeries = !!book.isSeries && Number(book.totalVolumes) > 1;
            const seriesLabel = isMultiVolumeSeries ? getSeriesLabel(Number(book.totalVolumes)) : "";
            if (isQueueMode) {
                return (
                    <div
