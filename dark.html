        }

        // --- 4. APP PRINCIPAL ---

        const PROFILE_OPTIONS = [
            { id: 'perfil-1', label: 'Gianny', allowedEmails: ['giannydornelas@gmail.com'] },
            { id: 'perfil-2', label: 'Laisa', allowedEmails: ['laisamgb@gmail.com'] }
        ];
        const PROFILE_STORAGE_VERSION = {
            'perfil-1': 'v1',
            'perfil-2': 'v3'
        };
        const ACTIVE_PROFILE_KEY = 'libdb-active-profile-v1';
        const CHAT_STORAGE_KEY = 'libdb-chat-v1-shared';
        const COMMENTS_STORAGE_KEY = 'libdb-comments-v1-shared';
        const NOTIFICATIONS_STORAGE_KEY = 'libdb-notifications-v1';
        const PROFILE_PREFERENCES_VERSION = 'v1';
        const BOOK_SORT_OPTIONS = [
            { value: 'added-desc', label: 'Mais recentes' },
            { value: 'alpha-asc', label: 'A-Z' },
            { value: 'genre-asc', label: 'Gênero' },
            { value: 'pages-desc', label: 'Mais páginas' },
            { value: 'rating-desc', label: 'Melhor avaliados' }
        ];

        const getBookKey = (book) => {
            const t = (book?.title || '').trim().toLowerCase().replace(/\s+/g, ' ');
            const a = (book?.author || '').trim().toLowerCase().replace(/\s+/g, ' ');
            return `${t}||${a}`;
        };

        const normalizeEmail = (value = '') => String(value || '').trim().toLowerCase();

        const getAllowedEmailsForProfile = (profile) => Array.isArray(profile?.allowedEmails)
            ? profile.allowedEmails.map(normalizeEmail).filter(Boolean)
            : [];

        const isAuthorizedGoogleUser = (user) => {
            const email = normalizeEmail(user?.email || '');
            if (!email) return false;
            return PROFILE_OPTIONS.some((profile) => getAllowedEmailsForProfile(profile).includes(email));
        };

        const resolveProfileForUser = (user) => {
            const email = normalizeEmail(user?.email || '');
            return PROFILE_OPTIONS.find((profile) => {
                const allowedEmails = getAllowedEmailsForProfile(profile);
                return allowedEmails.includes(email);
            }) || null;
        };

        const App = () => {
            const [readStatus, setReadStatus] = useState({});
            const [downloadStatus, setDownloadStatus] = useState({});
            const [customCovers, setCustomCovers] = useState({});
            const [customBooks, setCustomBooks] = useState([]);
            const [remoteEpubAvailability, setRemoteEpubAvailability] = useState({});
            const [removedInitialIds, setRemovedInitialIds] = useState([]);
            const [readingOrder, setReadingOrder] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeGenre, setActiveGenre] = useState("Todos");
            const [filterRead, setFilterRead] = useState(false);
            const [filterDownloaded, setFilterDownloaded] = useState(false);
            const [bookSortMode, setBookSortMode] = useState('added-desc');
            const [selectedBook, setSelectedBook] = useState(null);
            const [viewMode, setViewMode] = useState("grid");
            const [profileUids, setProfileUids] = useState({});
            const [isInitialized, setIsInitialized] = useState(false);
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [rememberLogin, setRememberLogin] = useState(true);
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const [showLoginPassword, setShowLoginPassword] = useState(false);
            const [isSendingReset, setIsSendingReset] = useState(false);
            const [canRequestReset, setCanRequestReset] = useState(true);
            const [showAddBook, setShowAddBook] = useState(false);
            const [addCardFlash, setAddCardFlash] = useState(false);
            const [editingBook, setEditingBook] = useState(null);
            const [showProfileMenu, setShowProfileMenu] = useState(false);
            const profileMenuRef = useRef(null);
            const notificationsPanelRef = useRef(null);
            const isProfileSwitchingRef = useRef(false);
            const [profileTransitionStage, setProfileTransitionStage] = useState('idle');
            const pendingProfileRef = useRef(null);
            const [chatMessages, setChatMessages] = useState([]);
            const [chatOpen, setChatOpen] = useState(false);
            const [chatInput, setChatInput] = useState('');
            const [chatInitialized, setChatInitialized] = useState(false);
            const [commentsByBook, setCommentsByBook] = useState({});
            const [commentsInitialized, setCommentsInitialized] = useState(false);
            const [notifications, setNotifications] = useState([]);
            const [notificationsInitialized, setNotificationsInitialized] = useState(false);
            const [notificationsOpen, setNotificationsOpen] = useState(false);
            const [bellRing, setBellRing] = useState(false);
            const [profileSwitchAnim, setProfileSwitchAnim] = useState(false);
            const [logoutFlash, setLogoutFlash] = useState(false);
            const [darkMode] = React.useState(() => localStorage.getItem('darkMode') === 'true');
            const [amazonHighlights, setAmazonHighlights] = useState([]);
            const [isLoadingAmazonHighlights, setIsLoadingAmazonHighlights] = useState(false);
            const [amazonHighlightsError, setAmazonHighlightsError] = useState('');
            const [highlightedBookId, setHighlightedBookId] = useState(null);
            const [dragSrcIndex, setDragSrcIndex] = useState(null);
            const [dragInsertIndex, setDragInsertIndex] = useState(null);
            const [userRatings, setUserRatings] = useState({});
            const [readTimestamps, setReadTimestamps] = useState({});
            const [readingGoal, setReadingGoal] = useState(0);
            const [showGoalInput, setShowGoalInput] = useState(false);
            const [goalInputVal, setGoalInputVal] = useState('');
            const previousChatUnreadRef = useRef(null);
            const chatMessagesContainerRef = useRef(null);
            const chatFromCloudRef = useRef(false);
            const commentsFromCloudRef = useRef(false);
            const notificationsFromCloudRef = useRef(false);
            const { toasts, removeToast } = useToastCenter();
            const { registerTimeout, clearRegisteredTimeouts } = useTimeoutRegistry();
            const [activeProfile, setActiveProfile] = useState(() => {
                const stored = localStorage.getItem(ACTIVE_PROFILE_KEY);
                return PROFILE_OPTIONS.some(profile => profile.id === stored) ? stored : PROFILE_OPTIONS[0].id;
            });

            const switchProfile = useCallback((profileId) => {
                if (profileId === activeProfile) return;
                clearRegisteredTimeouts();
                pendingProfileRef.current = profileId;
                setProfileTransitionStage('out');
                registerTimeout(() => {
                    setActiveProfile(pendingProfileRef.current);
                    setProfileTransitionStage('in');
                    registerTimeout(() => setProfileTransitionStage('idle'), 520);
                }, 420);
            }, [activeProfile, clearRegisteredTimeouts, registerTimeout]);

            const getProfileKeys = useCallback((profileId) => {
                const version = PROFILE_STORAGE_VERSION[profileId] || 'v1';
                return {
                    read: `libdb-read-${version}-${profileId}`,
                    download: `libdb-download-${version}-${profileId}`,
                    covers: `libdb-covers-${version}-${profileId}`,
                    custom: `libdb-custom-${version}-${profileId}`,
                    removed: `libdb-removed-${version}-${profileId}`,
                    queue: `libdb-queue-${version}-${profileId}`,
                    ratings: `libdb-ratings-v1-${profileId}`,
                    timestamps: `libdb-timestamps-v1-${profileId}`,
                    goal: `libdb-goal-v1-${profileId}`
                };
            }, []);

            const profileKeys = useMemo(() => getProfileKeys(activeProfile), [activeProfile, getProfileKeys]);

            const currentProfile = PROFILE_OPTIONS.find(profile => profile.id === activeProfile) || PROFILE_OPTIONS[0];
            const otherProfile = PROFILE_OPTIONS.find(profile => profile.id !== activeProfile);
            const loggedUserProfile = useMemo(() => resolveProfileForUser(user), [user]);
            const myProfileId = loggedUserProfile?.id || null;
            const viewerProfileId = myProfileId || activeProfile;
            const chatCurrentProfile = PROFILE_OPTIONS.find(profile => profile.id === viewerProfileId) || currentProfile;
            const chatOtherProfile = PROFILE_OPTIONS.find(profile => profile.id !== viewerProfileId) || otherProfile;

            // Atualiza o título do browser com o perfil ativo
            useEffect(() => {
                document.title = `Biblioteca | ${currentProfile.label}`;
            }, [currentProfile.label]);

            const profilePreferencesKey = useMemo(
                () => `libdb-preferences-${PROFILE_PREFERENCES_VERSION}-${activeProfile}`,
                [activeProfile]
            );
            const profileGenres = useMemo(() => {
                const available = new Set();
                customBooks.forEach(book => {
                    const genre = (book?.genre || '').trim();
                    if (genre) available.add(genre);
                    if (book?.isDistopia) available.add('Distopia');
                });

                const known = GENRES.filter(genre => genre !== 'Todos' && available.has(genre));
                const custom = [...available].filter(genre => !GENRES.includes(genre)).sort((a, b) => a.localeCompare(b, 'pt-BR'));
                return [...known, ...custom];
            }, [customBooks]);
            const genreMenuItems = useMemo(() => ['Todos', ...profileGenres], [profileGenres]);
            const sortedChatMessages = useMemo(
                () => [...chatMessages].sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)),
                [chatMessages]
            );
            const visibleChatMessages = useMemo(
                () => sortedChatMessages.filter(msg => !msg.hiddenFor?.[viewerProfileId]),
                [sortedChatMessages, viewerProfileId]
            );
            const chatUnreadCount = useMemo(
                () => visibleChatMessages.filter(m => m.to === viewerProfileId && !m.readBy?.[viewerProfileId]).length,
                [visibleChatMessages, viewerProfileId]
            );
            const sortedNotifications = useMemo(
                () => notifications
                    .filter(n => n.toProfileId === myProfileId)
                    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)),
                [notifications, myProfileId]
            );
            const notificationUnreadCount = useMemo(
                () => notifications.filter(n => n.toProfileId === myProfileId && !n.readBy?.[myProfileId]).length,
                [notifications, myProfileId]
            );
            const firstUnreadChatIndex = useMemo(
                () => visibleChatMessages.findIndex(msg => msg.to === viewerProfileId && !msg.readBy?.[viewerProfileId]),
                [visibleChatMessages, viewerProfileId]
            );
            const persistencePayload = useMemo(() => ({
                readStatus,
                downloadStatus,
                customCovers,
                customBooks,
                removedInitialIds,
                readingOrder
            }), [readStatus, downloadStatus, customCovers, customBooks, removedInitialIds, readingOrder]);

            const logActivity = useCallback(() => {}, []);

            const playSubtleMessageBeep = useCallback(() => {
                try {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (!AudioCtx) return;
                    const context = new AudioCtx();
                    const oscillator = context.createOscillator();
                    const gain = context.createGain();
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(820, context.currentTime);
                    gain.gain.setValueAtTime(0.0001, context.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.04, context.currentTime + 0.01);
                    gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.12);
                    oscillator.connect(gain);
                    gain.connect(context.destination);
                    oscillator.start();
                    oscillator.stop(context.currentTime + 0.13);
                    registerTimeout(() => context.close().catch(() => {}), 180);
                } catch {
                    // Falha silenciosa: audio não é crítico.
                }
            }, [registerTimeout]);

            const markChatAsRead = useCallback(() => {
                setChatMessages(prev => {
                    let changed = false;
                    const next = prev.map(msg => {
                        if (msg.hiddenFor?.[viewerProfileId]) return msg;
                        if (msg.to === viewerProfileId && !msg.readBy?.[viewerProfileId]) {
                            changed = true;
                            return {
                                ...msg,
                                readBy: {
                                    ...(msg.readBy || {}),
                                    [viewerProfileId]: true
                                }
                            };
                        }
                        return msg;
                    });
                    return changed ? next : prev;
                });
            }, [viewerProfileId]);

            const markNotificationsAsRead = useCallback(() => {
                if (!myProfileId) return;
                setNotifications(prev => {
                    let changed = false;
                    const next = prev.map(notification => {
                        if (notification.toProfileId === myProfileId && !notification.readBy?.[myProfileId]) {
                            changed = true;
                            return {
                                ...notification,
                                readBy: {
                                    ...(notification.readBy || {}),
                                    [myProfileId]: true
                                }
                            };
                        }
                        return notification;
                    });
                    return changed ? next : prev;
                });
            }, [myProfileId]);

            const pushNotification = useCallback(({ toProfileId, type, text, bookId, bookKey }) => {
                const fromId = myProfileId || activeProfile;
                const fromLabel = loggedUserProfile?.label || currentProfile.label;
                if (!toProfileId || toProfileId === fromId) return;
                const now = Date.now();
                const notification = {
                    id: `notif-${now}-${Math.random().toString(36).slice(2, 8)}`,
                    type: type || 'geral',
                    text: text || 'Nova notificação',
                    bookId: bookId || null,
                    bookKey: bookKey || null,
                    fromProfileId: fromId,
                    fromProfileLabel: fromLabel,
                    toProfileId,
                    createdAt: now,
                    readBy: {
                        [toProfileId]: false,
                        [fromId]: true
                    }
                };
                setNotifications(prev => [...prev, notification]);
            }, [activeProfile, myProfileId, loggedUserProfile, currentProfile.label]);

            const deleteNotification = useCallback((notificationId) => {
                if (!myProfileId) return;
                setNotifications(prev => prev.filter(notification =>
                    !(notification.id === notificationId && notification.toProfileId === myProfileId)
                ));
            }, [myProfileId]);

            const clearAllNotifications = useCallback(() => {
                if (!myProfileId) return;
                setNotifications(prev => prev.filter(n => n.toProfileId !== myProfileId));
            }, [myProfileId]);

            const openBookFromNotification = useCallback(async (notification) => {
                if (!notification.bookKey && !notification.bookId) return;
                setNotificationsOpen(false);
                
                // Tenta encontrar primeiro no perfil atual
                const match = notification.bookKey
                    ? customBooks.find(b => getBookKey(b) === notification.bookKey)
                    : customBooks.find(b => b.id === notification.bookId);
                    
                if (match) {
                    setSelectedBook(match);
                    setHighlightedBookId(match.id);
                    registerTimeout(() => setHighlightedBookId(null), 1800);
                    return;
                }
                
                // Se não encontrou, tenta no outro perfil
                if (!otherProfile) return;
                try {
                    const otherKeys = getProfileKeys(otherProfile.id);
                    // Carrega UIDs frescos para garantir acesso cross-profile
                    let otherUid = profileUids[otherProfile.id];
                    if (!otherUid) {
                        const uids = await loadProfileUids();
                        setProfileUids(uids);
                        otherUid = uids[otherProfile.id];
                    }
                    let otherBooks = [];
                    if (otherUid) {
                        const cloudSnapshot = await readCloudSnapshotForUid(otherKeys.custom, otherUid, []);
                        otherBooks = cloudSnapshot.data || [];
                    }
                    const otherMatch = notification.bookKey
                        ? otherBooks.find(b => getBookKey(b) === notification.bookKey)
                        : otherBooks.find(b => b.id === notification.bookId);
                    
                    if (otherMatch) {
                        setSelectedBook(otherMatch);
                        setHighlightedBookId(otherMatch.id);
                        registerTimeout(() => setHighlightedBookId(null), 1800);
                    }
                } catch (err) {
                    console.warn('Erro ao carregar livro do outro perfil:', err);
                }
            }, [customBooks, otherProfile, getProfileKeys, getBookKey, registerTimeout, profileUids]);

            const sendChatMessage = useCallback(() => {
                try {
                    const text = chatInput.trim();
                    console.log('[Chat] Enviando mensagem:', { text, otherProfile: chatOtherProfile?.id, viewerProfileId });
                    if (!text || !chatOtherProfile) {
                        console.warn('[Chat] Abortando: texto vazio ou sem perfil destino');
                        return;
                    }
                    const now = Date.now();
                    const newMessage = {
                        id: `msg-${now}-${Math.random().toString(36).slice(2, 8)}`,
                        from: viewerProfileId,
                        to: chatOtherProfile.id,
                        text,
                        createdAt: now,
                        readBy: {
                            [viewerProfileId]: true,
                            [chatOtherProfile.id]: false
                        }
                    };
                    console.log('[Chat] Mensagem criada:', newMessage);
                    setChatMessages(prev => {
                        const updated = [...prev, newMessage];
                        console.log('[Chat] Estado atualizado com', updated.length, 'mensagens');
                        return updated;
                    });
                    setChatInput('');
                    console.log('[Chat] Input limpo');
                } catch (err) {
                    console.error('[Chat] Erro ao enviar mensagem:', err);
                    notifyUser('Erro ao enviar mensagem: ' + err.message, 'error');
                }
            }, [chatInput, chatOtherProfile, viewerProfileId]);

            const formatChatTime = (timestamp) => {

                    if (candidate.includes(source) || source.includes(candidate)) return 70;

                    merged.forEach(book => {

                        const author = (book?.author || '').trim();
                        if (!title || !author) return;
                        const key = buildBookKey(title, author);
                        if (!uniqueMap.has(key)) uniqueMap.set(key, book);
                    });

                    let items = Array.from(uniqueMap.values());
                    if (profileGenres.length > 0) {
                        const filtered = items.filter(matchesProfileGenre);
                        if (filtered.length > 0) items = filtered;
                    }

                    return items
                        .map(book => {
                            const seed = simpleHash(`${book.title}|${book.author}`);
                            const avg = 4 + ((seed % 10) / 10); // 4.0-4.9
                            const count = 120 + (seed % 5000);
                            const brBoost = book?.isBrazilianAuthor ? 22 : 0;
                            const ptPublisherBoost = PT_BR_PUBLISHER_PATTERN.test(String(book?.publisher || '')) ? 10 : 0;
                            const safeCover = (book.coverUrl || '').replace(/^http:\/\//i, 'https://');
                            return {
                                id: `local-${seed}`,
                                title: book.title,
                                author: book.author,
                                genre: book.isDistopia ? 'Distopia' : (book.genre || profileGenres[0] || 'Livros'),
                                publisher: book.publisher || 'Curadoria Local',
                                pages: Number(book.pages) || 0,
                                averageRating: avg,
                                ratingsCount: count,
                                gbAverageRating: avg,
                                gbRatingsCount: count,
                                olAverageRating: 0,
                                olRatingsCount: 0,
                                olWantsCount: 0,
                                curationScore: (avg * 18) + Math.log10(count + 1) * 18 + brBoost + ptPublisherBoost,
                                coverUrl: safeCover,
                                coverCandidates: [
                                    `https://covers.openlibrary.org/b/title/${encodeURIComponent(book.title || '')}-L.jpg?default=false`,
                                    safeCover
                                ].filter(Boolean),
                                description: book.synopsis || 'Livro selecionado pela curadoria local.',
                                referenceUrl: `https://www.google.com/search?q=${encodeURIComponent(`${book.title} ${book.author} livro`)}`
                            };
                        })
                        .sort((a, b) => (b.curationScore || 0) - (a.curationScore || 0))
                        .slice(0, 18);
                };

                const findBestGoogleMatch = async (title) => {
                    const queryA = cleanSearchTitle(title) || title;
                    const queries = [
                        `intitle:${queryA} livro portugues brasil`,
                        `${queryA} livro edicao brasileira`,
                        `intitle:${queryA}`
                    ];

                    const candidates = [];
                    for (const query of queries) {
                        const endpoint = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&langRestrict=pt&country=BR&printType=books&orderBy=relevance&maxResults=12`;
                        const response = await fetch(endpoint);
                        if (!response.ok) continue;
                        const data = await response.json();
                        const items = Array.isArray(data?.items) ? data.items : [];
                        candidates.push(...items);
                    }

                    const ranked = candidates
                        .map(item => {
                            const volume = item?.volumeInfo || {};
                            const ptScore = getPtBrConfidence(volume);
                            return {
                                item,
                                ptScore,
                                score: scoreTitleMatch(title, volume?.title || '') + (ptScore * 6)
                            };
                        })
                        .filter(item => item.ptScore >= 4)
                        .sort((a, b) => b.score - a.score);
                    const best = ranked[0]?.item;
                    const bestScore = ranked[0]?.score || 0;
                    return { best, bestScore };
                };

                const fetchOpenLibrarySignals = async (title, author = '') => {
                    try {
                        const query = `https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}&limit=1`;
                        const response = await fetch(query);
                        if (!response.ok) return null;
                        const data = await response.json();
                        const doc = data?.docs?.[0];
                        if (!doc) return null;

                        const olCover = doc.cover_i ? `https://covers.openlibrary.org/b/id/${doc.cover_i}-L.jpg` : '';
                        const ratingsAverage = Number(doc.ratings_average) || 0;
                        const ratingsCount = Number(doc.ratings_count) || 0;
                        const wantsCount = Number(doc.want_to_read_count) || 0;
                        const olWorkKey = doc.key ? `https://openlibrary.org${doc.key}` : '';

                        return {
                            coverUrl: olCover,
                            ratingsAverage,
                            ratingsCount,
                            wantsCount,
                            editionCount: Number(doc.edition_count) || 0,
                            referenceUrl: olWorkKey
                        };
                    } catch {
                        return null;
                    }
                };

                const computeCurationScore = ({ gbAvg = 0, gbCount = 0, olAvg = 0, olCount = 0, wants = 0, editions = 0, publishedDate = '' }) => {
                    const log = (n) => Math.log10((Number(n) || 0) + 1);
                    const gbScore = (gbAvg * 18) + (log(gbCount) * 20);
                    const olScore = (olAvg * 15) + (log(olCount) * 16) + (log(wants) * 12) + ((Number(editions) || 0) * 0.6);
                    const hypeScore = (log(gbCount + olCount + wants) * 14) + getRecencyBoost(publishedDate);
                    return gbScore + olScore + hypeScore;
                };

                const fetchGenreCandidates = async (genre) => {
                    const queries = [
                        `subject:${genre} livro mais vendidos brasil`,
                        `subject:${genre} best seller brasil`,
                        `subject:${genre} livro`
                    ];

                    const collected = [];
                    for (const query of queries) {
                        const endpoint = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&langRestrict=pt&country=BR&printType=books&orderBy=relevance&maxResults=12`;
                        const response = await fetch(endpoint);
                        if (!response.ok) continue;
                        const data = await response.json();
                        const items = Array.isArray(data?.items) ? data.items : [];
                        collected.push(...items);
                    }

                    const seenIds = new Set();
                    const items = collected.filter(item => {
                        const id = item?.id || '';
                        if (!id || seenIds.has(id)) return false;
                        seenIds.add(id);
                        return true;
                    });

                    return items.map(item => {
                        const volume = item?.volumeInfo || {};
                        if (!isLikelyPtBrVolume(volume)) return null;
                        const title = (volume.title || '').trim();
                        const author = (volume.authors || [])[0] || 'Autor não informado';
                        if (!title || NON_BOOK_PATTERN.test(title)) return null;

                        const isbn = ((volume.industryIdentifiers || []).find(id => id?.identifier)?.identifier || '').trim();
                        const coverCandidates = [
                            volume.imageLinks?.extraLarge,
                            volume.imageLinks?.large,
                            volume.imageLinks?.medium,
                            volume.imageLinks?.thumbnail,
                            volume.imageLinks?.smallThumbnail,
                            isbn ? `https://covers.openlibrary.org/b/isbn/${encodeURIComponent(isbn)}-L.jpg?default=false` : '',
                            `https://covers.openlibrary.org/b/title/${encodeURIComponent(title)}-L.jpg?default=false`
                        ]
                            .map(url => (url || '').replace(/^http:\/\//i, 'https://').trim())
                            .filter(Boolean);
                        const uniqueCoverCandidates = [...new Set(coverCandidates)];
                        const cover = uniqueCoverCandidates[0] || '';
                        return {
                            id: item.id || `${genre}-${title}`,
                            title,
                            author,
                            isbn,
                            genre: detectGenre(volume.categories || [genre]),
                            publisher: volume.publisher || 'Google Books',
                            pages: volume.pageCount || 0,
                            gbAverageRating: Number(volume.averageRating) || 0,
                            gbRatingsCount: Number(volume.ratingsCount) || 0,
                            ptBrConfidence: getPtBrConfidence(volume),
                            coverUrl: cover,
                            coverCandidates: uniqueCoverCandidates,
                            description: volume.description || 'Sem descrição disponível.',
                            referenceUrl: `https://www.google.com/search?q=${encodeURIComponent(`${title} ${author} livro`)}`
                        };
                    }).filter(Boolean);
                };

                const enrichWithGoogleBooks = async (candidate) => {
                    try {
                        const { best, bestScore } = await findBestGoogleMatch(candidate.title);
                        const volume = best?.volumeInfo || {};

                        const ptBrConfidence = getPtBrConfidence(volume);
                        if (!best || bestScore < 28 || NON_BOOK_PATTERN.test(volume.title || '') || ptBrConfidence < 4) {
                            return null;
                        }

                        const author = (volume.authors || [])[0] || 'Autor não informado';
                        const openLibrary = await fetchOpenLibrarySignals(volume.title || candidate.title, author);
                        const isbn = ((volume.industryIdentifiers || []).find(id => id?.identifier)?.identifier || candidate?.isbn || '').trim();
                        const candidateCoverUrls = Array.isArray(candidate?.coverCandidates) ? candidate.coverCandidates : [];
                        const coverCandidates = [
                            volume.imageLinks?.extraLarge,
                            volume.imageLinks?.large,
                            volume.imageLinks?.medium,
                            volume.imageLinks?.thumbnail,
                            volume.imageLinks?.smallThumbnail,
                            openLibrary?.coverUrl || '',
                            ...candidateCoverUrls,
                            isbn ? `https://covers.openlibrary.org/b/isbn/${encodeURIComponent(isbn)}-L.jpg?default=false` : '',
                            `https://covers.openlibrary.org/b/title/${encodeURIComponent(volume.title || candidate.title)}-L.jpg?default=false`
                        ]
                            .map(url => (url || '').replace(/^http:\/\//i, 'https://').trim())
                            .filter(Boolean);
                        const uniqueCoverCandidates = [...new Set(coverCandidates)];
                        const coverUrl = uniqueCoverCandidates[0] || '';
                        if (!coverUrl || !author || author === 'Autor não informado') {
                            return null;
                        }

                        const olAverageRating = openLibrary?.ratingsAverage || 0;
                        const olRatingsCount = openLibrary?.ratingsCount || 0;
                        const olWantsCount = openLibrary?.wantsCount || 0;
                        const olEditionCount = openLibrary?.editionCount || 0;

                        const gbAverageRating = Number(volume.averageRating) || 0;
                        const gbRatingsCount = Number(volume.ratingsCount) || 0;
                        const communityCount = gbRatingsCount + olRatingsCount;
                        const communityRating = communityCount > 0
                            ? ((gbAverageRating * gbRatingsCount) + (olAverageRating * olRatingsCount)) / communityCount
                            : gbAverageRating || olAverageRating || 0;

                        const finalGenre = detectGenre(volume.categories || []);
                        return {
                            ...candidate,
                            id: best?.id || `${candidate.title}-${author}`,
                            title: volume.title || candidate.title,
                            author,
                            isbn,
                            genre: finalGenre,
                            publisher: volume.publisher || 'Amazon',
                            pages: volume.pageCount || 0,
                            averageRating: communityRating,
                            ratingsCount: communityCount,
                            gbAverageRating,
                            gbRatingsCount,
                            ptBrConfidence,
                            olAverageRating,
                            olRatingsCount,
                            olWantsCount,
                            publishedDate: volume.publishedDate || '',
                            curationScore: computeCurationScore({ gbAvg: gbAverageRating, gbCount: gbRatingsCount, olAvg: olAverageRating, olCount: olRatingsCount, wants: olWantsCount, editions: olEditionCount, publishedDate: volume.publishedDate || '' }),
                            coverUrl: coverUrl || openLibrary?.coverUrl || '',
                            coverCandidates: uniqueCoverCandidates,
                            description: volume.description || 'Sem descrição disponível.',
                            referenceUrl: openLibrary?.referenceUrl || `https://www.google.com/search?q=${encodeURIComponent(`${volume.title || candidate.title} ${author} livro`)}`
                        };
                    } catch {
                        return null;
                    }
                };

                const fetchHighlights = async () => {
                    setIsLoadingAmazonHighlights(true);
                    setAmazonHighlightsError('');
                    try {
                        const targetGenres = profileGenres.length > 0 ? profileGenres.slice(0, 6) : DEFAULT_GENRES.slice(0, 6);
                        const grouped = await Promise.all(targetGenres.map(fetchGenreCandidates));
                        const merged = grouped.flat();

                        const uniqueMap = new Map();
                        merged.forEach(book => {
                            const dedupeKey = buildBookKey(book.title || '', book.author || '');
                            if (!uniqueMap.has(dedupeKey)) uniqueMap.set(dedupeKey, book);
                        });

                        const baseBooks = Array.from(uniqueMap.values()).slice(0, 30);
                        const enrichedBooks = await Promise.all(baseBooks.map(enrichWithGoogleBooks));

                        const validBooks = enrichedBooks
                            .filter(Boolean)
                            .filter(book => {
                                const key = buildBookKey(book?.title || '', book?.author || '');
                                return key && key !== '|' && !catalogKeySet.has(key);
                            })
                            .filter(book => {
                                const popularity = (Number(book?.ratingsCount) || 0) + (Number(book?.olWantsCount) || 0);
                                return popularity >= 35;
                            })
                            .filter(book => Number(book?.ptBrConfidence) >= 4)
                            .sort((a, b) => (b.curationScore || 0) - (a.curationScore || 0));
                        if (validBooks.length === 0) {
                            const localFallback = buildLocalCuratedFallback();
                            if (localFallback.length > 0) {
                                if (!cancelled) {
                                    setAmazonHighlights(localFallback);
                                    setAmazonHighlightsError('');
                                }
                                return;
                            }
                            throw new Error('Nenhum livro validado para curadoria.');
                        }

                        if (!cancelled) setAmazonHighlights(validBooks.slice(0, 18));
                    } catch (error) {
                        if (!cancelled) {
                            console.error('Erro ao buscar livros em alta:', error);
                            const localFallback = buildLocalCuratedFallback();
                            if (localFallback.length > 0) {
                                setAmazonHighlights(localFallback);
                                setAmazonHighlightsError('');
                            } else {
                                setAmazonHighlightsError('Não foi possível carregar a curadoria de livros agora. Tente novamente em instantes.');
                            }
                        }
                    } finally {
                        if (!cancelled) setIsLoadingAmazonHighlights(false);
                    }
                };

                fetchHighlights();
                return () => {
                    cancelled = true;
                };
            }, [user, isInitialized, viewMode, profileGenres, activeProfile, customBooks]);

            const loginWithEmailPassword = async (e) => {
                if (e?.preventDefault) e.preventDefault();
                const email = loginEmail.trim().toLowerCase();
                const password = loginPassword;

                if (!email || !password) {
                    notifyUser('Preencha email e senha para entrar.', 'warning');
                    return;
                }

                try {
                    setIsLoggingIn(true);
                    await window.setPersistence(
                        window.auth,
                        rememberLogin ? window.browserLocalPersistence : window.browserSessionPersistence
                    );
                    await window.signInWithEmailAndPassword(window.auth, email, password);
                } catch (error) {
                    console.error('Erro no login:', error);
                    const code = error?.code || 'erro-desconhecido';
                    const message = error?.message || 'Falha ao autenticar com email e senha.';

                    if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') {
                        notifyUser('Email ou senha incorretos.', 'error');
                        return;
                    }

                    if (code === 'auth/too-many-requests') {
                        notifyUser('Muitas tentativas. Aguarde um pouco e tente novamente.', 'warning');
                        return;
                    }

                    notifyUser(`Erro no login (${code}): ${message}`, 'error');
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const logout = async () => {
                try {
                    await window.signOut(window.auth);
                    window.location.href = 'login.html';
                } catch (error) {
                    console.error('Erro no logout:', error);
                }
            };

            const handlePasswordReset = async () => {
                const email = loginEmail.trim().toLowerCase();
                if (!email) {
                    notifyUser('Digite seu email para receber o link de redefinição.', 'warning');
                    return;
                }

                try {
                    setIsSendingReset(true);
                    await window.sendPasswordResetEmail(window.auth, email);
                    setCanRequestReset(false);
                    registerTimeout(() => setCanRequestReset(true), 60000);
                    notifyUser('Link enviado. Use apenas o e-mail mais recente para redefinir a senha.', 'success');
                } catch (error) {
                    console.error('Erro ao enviar redefinição de senha:', error);
                    const code = error?.code || 'erro-desconhecido';
                    if (code === 'auth/user-not-found' || code === 'auth/invalid-email') {
                        notifyUser('Email não encontrado ou inválido.', 'error');
                        return;
                    }
                    if (code === 'auth/too-many-requests') {
                        notifyUser('Muitas tentativas. Aguarde alguns minutos e tente de novo.', 'warning');
                        return;
                    }
                    notifyUser('Não foi possível enviar o link de redefinição agora.', 'error');
                } finally {
                    setIsSendingReset(false);
                }
            };

            // Carregamento inicial e Sanitização
            useEffect(() => {
                if (!user) return; // Só carrega dados se estiver logado

                setIsInitialized(false);
                let cancelled = false;

                const loadData = async () => {
                    // Quando você visita outro perfil, sempre carrega do Firestore para garantir dados frescos
                    const isVisitingOtherProfile = !!myProfileId && activeProfile !== myProfileId;
                    
                    // Resolve o UID do perfil visitado para leitura cross-profile
                    let targetUid = null;
                    if (isVisitingOtherProfile) {
                        const uids = await loadProfileUids();
                        setProfileUids(uids);
                        targetUid = uids[activeProfile];
                    }
                    
                    const r = (isVisitingOtherProfile && targetUid)
                        ? (await readCloudSnapshotForUid(profileKeys.read, targetUid, {})).data
                        : await loadFromCloud(profileKeys.read, {});
                    const d = (isVisitingOtherProfile && targetUid)
                        ? (await readCloudSnapshotForUid(profileKeys.download, targetUid, {})).data
                        : await loadFromCloud(profileKeys.download, {});
                    const c = (isVisitingOtherProfile && targetUid)
                        ? (await readCloudSnapshotForUid(profileKeys.covers, targetUid, {})).data
                        : await loadFromCloud(profileKeys.covers, {});
                    
                    // Se visitando outro perfil, lê direto do Firestore do perfil alvo usando seu UID
                    let cb = (isVisitingOtherProfile && targetUid)
                        ? (await readCloudSnapshotForUid(profileKeys.custom, targetUid, [])).data
                        : await loadFromCloud(profileKeys.custom, []);
                    let rem = [];
                    const q = (isVisitingOtherProfile && targetUid)
                        ? (await readCloudSnapshotForUid(profileKeys.queue, targetUid, [])).data
                        : await loadFromCloud(profileKeys.queue, []);
                    
                    // Se não há livros no banco, carrega SEED_BOOKS só para o perfil principal (Gianny)
                    if (!cb || cb.length === 0) {
                        if (activeProfile === 'perfil-1') {
                            // Recupera catálogo legado da Gianny (antes da separação por perfis), se existir
                            const legacyCustomCandidates = ['libdb-custom-v1', 'libdb-custom'];
                            let recoveredLegacy = [];
                            for (const legacyKey of legacyCustomCandidates) {
                                const legacyBooks = await loadFromCloud(legacyKey, []);
                                if (Array.isArray(legacyBooks) && legacyBooks.length > 0) {
                                    recoveredLegacy = dedupeBooksByIdentity(legacyBooks);
                                    console.log('📚 Catálogo legado da Gianny recuperado da chave:', legacyKey);
                                    break;
                                }
                            }

                            if (recoveredLegacy.length > 0) {
                                cb = recoveredLegacy;
                                await saveToCloud(profileKeys.custom, cb);
                                localStorage.setItem(profileKeys.custom, JSON.stringify(cb));
                            } else {
                                cb = dedupeBooksByIdentity(SEED_BOOKS);
                                console.log('📚 Carregando ' + SEED_BOOKS.length + ' livros iniciais no banco de dados...');
                            }
                        } else {
                            cb = dedupeBooksByIdentity(LAISA_DEMO_BOOKS);
                            console.log('📚 Carregando livro de demonstração para o perfil da Laisa.');
                        }
                    } else {
                        cb = dedupeBooksByIdentity(cb);
                        console.log('📚 Exibindo ' + cb.length + ' livros do banco de dados...');
                    }

                    if (cancelled) return;

                    const ratings = JSON.parse(localStorage.getItem(profileKeys.ratings) || '{}');
                    const timestamps = JSON.parse(localStorage.getItem(profileKeys.timestamps) || '{}');
                    const goal = Number(localStorage.getItem(profileKeys.goal) || '0');
                    setReadStatus(r); setDownloadStatus(d); setCustomCovers(c);
                    setCustomBooks(cb); setRemovedInitialIds(rem); setReadingOrder(q);
                    setUserRatings(ratings); setReadTimestamps(timestamps); setReadingGoal(goal);
                    setIsInitialized(true);
                    isProfileSwitchingRef.current = false;
                };
                loadData();

                return () => {
                    cancelled = true;
                };
            }, [user, profileKeys, myProfileId, activeProfile]);

            useProfilePersistence({
                isInitialized,
                user,
                isProfileSwitchingRef,
                profileKeys,
                payload: persistencePayload
            });

            // Mapa de EPUBs do outro perfil por identidade (título||autor)
            const [otherProfileEpubMap, setOtherProfileEpubMap] = useState({});

            useEffect(() => {
                if (!otherProfile || !user || !window.db) return;
                let cancelled = false;
                
                // Se está visitando outro perfil, monitora EPUBs do perfil VISITADO, não do "outro"
                const isVisitingOtherProfile = !!myProfileId && activeProfile !== myProfileId;
                const epubSourceProfileId = isVisitingOtherProfile ? activeProfile : otherProfile.id;
                const epubSourceProfile = PROFILE_OPTIONS.find(p => p.id === epubSourceProfileId);
                
                if (!epubSourceProfile) return;
                
                // Usa o UID correto do perfil fonte para acessar dados no Firestore
                let targetUid = profileUids[epubSourceProfileId];
                
                const setupListener = (uid) => {
                    const otherKeys = getProfileKeys(epubSourceProfileId);
                    const docRef = doc(window.db, 'users', uid, 'data', otherKeys.custom);
                    
                    return window.onSnapshot(docRef, (docSnap) => {
                        if (cancelled) return;
                        const books = (docSnap.data()?.data) || [];
                        if (!Array.isArray(books)) return;
                        
                        const map = {};
                        books.forEach(b => {
                            if (b.epubUrl) {
                                map[getBookKey(b)] = { epubUrl: b.epubUrl, epubFileName: b.epubFileName, epubPath: b.epubPath, epubKey: b.epubKey };
                            }
                        });
                        setOtherProfileEpubMap(map);
                    }, (error) => {
                        console.warn('Erro ao sincronizar EPUBs:', error);
                    });
                };
                
                let unsubscribe = null;
                
                if (targetUid) {
                    unsubscribe = setupListener(targetUid);
                } else {
                    // Carrega UIDs inline se ainda não disponíveis
                    loadProfileUids().then(uids => {
                        if (cancelled) return;
                        setProfileUids(uids);
                        const uid = uids[epubSourceProfileId];
                        if (uid) {
                            unsubscribe = setupListener(uid);
                        }
                    });
                }
                
                return () => { 
                    cancelled = true;
                    if (unsubscribe) unsubscribe();
                };
            }, [otherProfile, user, getProfileKeys, myProfileId, activeProfile, PROFILE_OPTIONS, profileUids]);

            useEffect(() => {
                const availability = {};
                customBooks.forEach(book => {
                    if (book.epubUrl) {
                        availability[book.id] = true;
                    } else {
                        const key = getBookKey(book);
                        availability[book.id] = !!otherProfileEpubMap[key]?.epubUrl;
                    }
                });
                setRemoteEpubAvailability(availability);
            }, [customBooks, otherProfileEpubMap]);

            // Retorna a epubUrl efetiva de um livro (própria ou do outro perfil)
            const getEffectiveEpub = useCallback((book) => {
                if (book.epubUrl) return { epubUrl: book.epubUrl, epubFileName: book.epubFileName };
                const other = otherProfileEpubMap[getBookKey(book)];
                if (other?.epubUrl) return { epubUrl: other.epubUrl, epubFileName: other.epubFileName };

            }, [otherProfileEpubMap]);

            const allBooksCombined = useMemo(() => {
                // Todos os livros agora vêm do banco de dados (customBooks)

            const handleAddBook = useCallback((book) => {

                setShowAddBook(false);
                setEditingBook(null);

                setViewMode("grid");
                notifyUser(`Livro ${book.title || 'novo'} adicionado.`, 'success');
                logActivity(`Adicionou o livro ${book.title || 'novo'}.`, 'catalog');

            const addAmazonHighlightToCatalog = useCallback((item) => {
                if (!ensureOwnProfileWrite('Você não pode adicionar livros diretamente na biblioteca do outro perfil.')) return;
                if (!item?.title || !item?.author) {
                    notifyUser('Não foi possível adicionar este livro agora.', 'warning');

                const alreadyExists = customBooks.some(book => booksMatch(book, item));

                const normalizedGenre = (item.genre || 'Fantasia').trim();

                const newBook = {
                    id: `${activeProfile}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,

                    pages: Number(item.pages) || 0,

                    series: '',
                    volume: 0,
                    totalVolumes: 0,
                    isSeries: false,
                    epubUrl: '',
                    epubFileName: '',
                    epubKey: null,
                    epubPath: null,
                    epubOrigin: null,
                    isBrazilianAuthor: false,

            const syncEpubToOtherProfile = useCallback(async (sourceBook, epubData) => {

                    const matchIdx = otherBooks.findIndex(b => booksMatch(b, sourceBook));

                    prev && prev.id === bookId

                    syncEpubToOtherProfile(currentBook, epubFields);

            const handleQuickToggleRead = useCallback((book) => {

                    setReadTimestamps(prev => ({ ...prev, [book.id]: new Date().toISOString() }));

                    setReadTimestamps(prev => { const n = {...prev}; delete n[book.id]; return n; });

                notifyUser(isNextRead ? `${book.title} marcado como lido` : `${book.title} desmarcado`, isNextRead ? 'success' : 'info', isNextRead ? 'Avalie o livro com as estrelas' : '');

                            onDeleteComment={(bookId, commentId) => {
                                const book = customBooks.find(b => b.id === bookId) || selectedBook;
                                deleteBookComment(getBookKey(book), commentId);
                            }}
                            currentProfileLabel={loggedUserProfile?.label || currentProfile.label}
                            userRating={userRatings[selectedBook.id] || 0}
                            onRate={(rating) => handleRateBook(selectedBook.id, rating)}
                            currentProfileId={myProfileId || activeProfile}
                            onEdit={() => { setEditingBook(selectedBook); setShowAddBook(true); }}
                            onUploadEpub={(file) => {
                                return handleUploadEpubForBook(selectedBook.id, file);
                            }}
                            onDeleteEpub={(bookId) => {
                                const deletedBook = customBooks.find(b => b.id === bookId);
                                const clearEpub = { epubKey: null, epubPath: null, epubFileName: null, epubUrl: null, epubOrigin: null };
                                const updatedBooks = customBooks.map(b => (
                                    b.id === bookId ? { ...b, ...clearEpub } : b
                                ));
                                setCustomBooks(updatedBooks);
                                setSelectedBook(prev => (
                                    prev && prev.id === bookId ? { ...prev, ...clearEpub } : prev
                                ));
                                // Salva no Firestore imediatamente
                                saveToCloud(profileKeys.custom, updatedBooks);
                                // Sincroniza remoção do EPUB no outro perfil
                                if (deletedBook) syncEpubToOtherProfile(deletedBook, clearEpub);
                            }}
                            onDelete={() => { if (!ensureOwnProfileWrite()) return; deleteBookFromCatalog(selectedBook.id); }}
                            onGenreClick={handleGenreFilter}
                        />
                    )}

                    {showAddBook && (
                        <AddBookModal
                            initialBook={editingBook}
                            onClose={() => { setShowAddBook(false); setEditingBook(null); }}
                            onSave={editingBook ? handleEditBook : handleAddBook}
                        />
                    )}

                    <div className="fixed right-4 sm:right-6 bottom-4 sm:bottom-6 z-40 flex flex-col items-end gap-3">
                        {chatOpen && (
                            <div className="w-[92vw] sm:w-[360px] h-[68vh] sm:h-[460px] bg-white dark:bg-gray-900 rounded-3xl border border-gray-100 dark:border-gray-800 shadow-2xl shadow-[#1E3A5F]/10 overflow-hidden flex flex-col">
                                <div className="px-4 pt-3.5 pb-3 border-b border-gray-100/80 dark:border-gray-700 bg-white/95 dark:bg-gray-900/95 backdrop-blur-sm flex items-center justify-between">
                                    <div className="flex items-center gap-2.5 min-w-0">
                                        <div className="relative flex-shrink-0">
                                            <img
                                                src={chatOtherProfile?.id === 'perfil-2' ? 'https://i.imgur.com/o6KllQ2.png' : 'https://i.imgur.com/ewWnZWm.png'}
                                                alt={chatOtherProfile?.label}
                                                className="w-8 h-8 rounded-full object-cover border border-gray-100 shadow-sm"
                                                referrerPolicy="no-referrer"
                                            />
                                            <span className="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full bg-emerald-400 border-2 border-white"></span>
                                        </div>
                                        <div className="min-w-0">
                                            <p className="text-[9px] uppercase tracking-[0.22em] text-gray-400 font-black leading-none mb-0.5">Mensagem privada</p>
                                            <p className="text-[13px] font-bold text-[#1E3A5F] leading-none truncate">{chatOtherProfile?.label || 'Outro perfil'}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-0.5 flex-shrink-0">
                                        <button
                                            onClick={clearChatConversation}
                                            className="p-1.5 rounded-lg text-gray-400 hover:text-red-400 hover:bg-red-50 transition-all"
                                            title="Limpar conversa"
                                        >
                                            <Icon name="trash" className="w-3.5 h-3.5" />
                                        </button>
                                        <button
                                            onClick={() => setChatOpen(false)}
                                            className="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-all"
                                            aria-label="Fechar chat"
                                        >
                                            <Icon name="x" className="w-3.5 h-3.5" />
                                        </button>
                                    </div>
                                </div>

                                <div ref={chatMessagesContainerRef} className="flex-1 overflow-y-auto px-3 py-3 bg-[#F8F9FB] dark:bg-gray-800 space-y-2">
                                    {visibleChatMessages.length === 0 ? (
                                        <div className="h-full flex items-center justify-center text-center text-xs text-gray-400 px-6">
                                            Envie a primeira mensagem para começar a conversa entre os perfis.
                                        </div>
                                    ) : (
                                        visibleChatMessages.map((msg, idx) => {
                                            const isMine = msg.from === viewerProfileId;
                                            const senderImgSrc = msg.from === 'perfil-2' ? 'https://i.imgur.com/o6KllQ2.png' : 'https://i.imgur.com/ewWnZWm.png';
                                            return (
                                                <React.Fragment key={msg.id}>
                                                    {firstUnreadChatIndex > -1 && idx === firstUnreadChatIndex && (
                                                        <div className="flex items-center gap-2 py-1">
                                                            <div className="h-px flex-1 bg-violet-200" />
                                                            <span className="text-[9px] font-black uppercase tracking-wider text-violet-500">Não lidas</span>
                                                            <div className="h-px flex-1 bg-violet-200" />
                                                        </div>
                                                    )}
                                                    <div className={`flex items-end gap-1.5 ${isMine ? 'justify-end' : 'justify-start'}`}>
                                                        {!isMine && (
                                                            <img src={senderImgSrc} alt="" className="w-6 h-6 rounded-full object-cover border border-gray-100 flex-shrink-0 mb-0.5" referrerPolicy="no-referrer" />
                                                        )}
                                                        <div className={`max-w-[78%] flex flex-col ${isMine ? 'items-end' : 'items-start'}`}>
                                                            <div className={`rounded-2xl px-3 py-2 shadow-sm ${isMine ? 'bg-[#1E3A5F] text-white rounded-br-md' : 'bg-[#E6FFFB] text-[#0F766E] border border-[#99F6E4] rounded-bl-md'}`}>
                                                                <p className="text-sm leading-snug whitespace-pre-wrap">{msg.text}</p>
                                                                <p className={`mt-1 text-[10px] ${isMine ? 'text-white/70' : 'text-[#0F766E]/70'}`}>{formatChatTime(msg.createdAt)}</p>
                                                            </div>
                                                        </div>
                                                        {isMine && (
                                                            <img src={senderImgSrc} alt="" className="w-6 h-6 rounded-full object-cover border border-gray-100 flex-shrink-0 mb-0.5" referrerPolicy="no-referrer" />
                                                        )}
                                                    </div>
                                                </React.Fragment>
                                            );
                                        })
                                    )}
                                </div>

                                <form
                                    onSubmit={(e) => {
                                        e.preventDefault();
                                        sendChatMessage();
                                    }}
                                    className="p-3 border-t border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-900 flex items-center gap-2"
                                >
                                    <input
                                        value={chatInput}
                                        onChange={(e) => setChatInput(e.target.value)}
                                        maxLength={400}
                                        placeholder={`Mensagem de ${chatCurrentProfile.label} para ${chatOtherProfile?.label || 'o outro perfil'}...`}
                                        className="flex-1 px-3 py-2 rounded-xl border border-gray-200  bg-white  text-sm text-gray-900   outline-none focus:ring-2 focus:ring-[#14B8A6]/30"
                                    />
                                    <button
                                        type="submit"
                                        className="px-4 py-2 rounded-xl bg-[#14B8A6] text-white text-sm font-bold hover:bg-[#0fae9d] transition-colors"
                                    >
                                        Enviar
                                    </button>
                                </form>
                            </div>
                        )}

                        <button
                            type="button"
                            onClick={() => {
                                const nextOpen = !chatOpen;
                                setChatOpen(nextOpen);
                                if (nextOpen) markChatAsRead();
                            }}
                            className="relative w-14 h-14 rounded-full bg-[#14B8A6] text-white shadow-xl shadow-[#14B8A6]/35 hover:scale-105 active:scale-95 transition-all flex items-center justify-center"
                            title="Abrir chat entre perfis"
                        >
                            <Icon name="messageCircle" className="w-6 h-6" />
                            {chatUnreadCount > 0 && (
                                <span className="absolute -top-1 -right-1 min-w-[20px] h-5 px-1 rounded-full bg-violet-600 text-white text-[10px] font-black flex items-center justify-center border-2 border-white">
                                    {chatUnreadCount > 99 ? '99+' : chatUnreadCount}
                                </span>
                            )}
                        </button>
                    </div>

                    <footer className="max-w-7xl mx-auto px-6 pb-12 border-t border-gray-100 dark:border-gray-800 text-center pt-8">
                        <p className="text-gray-400 dark:text-gray-600 text-[10px] tracking-widest uppercase font-black">Biblioteca do Amanhã &copy; 2024</p>
                    </footer>
                    </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
