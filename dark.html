<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Biblioteca do Amanhã</title>
  <script>
    (function() {
      var current = localStorage.getItem('darkMode') === 'true';
      localStorage.setItem('darkMode', String(!current));
      var back = document.referrer && document.referrer.indexOf(location.hostname) !== -1
        ? document.referrer
        : 'index.html';
      location.replace(back);
    })();
  </script>
</head>
<body></body>
</html>
