            { id: 42, title: "Despertar da Chama Eterna", author: "Penn Cole", publisher: "Independente", pages: 384, genre: "Fantasia", series: "Chama Eterna", volume: 1, isSeries: true, totalVolumes: 4, isbn: "9786555657784", coverUrl: "https://m.media-amazon.com/images/I/8160XsjSJoL.jpg", synopsis: "Diem Bellator é curandeira num mundo de deuses. O desaparecimento da mãe a lança num mundo sombrio de realeza.", tags: ["romantasy", "enemies to lovers", "slow burn", "realeza"] },
            { id: 43, title: "Uma Janela Sombria", author: "Rachel Gillig", publisher: "Alt", pages: 424, genre: "Romantasy", series: "O Rei Pastor", volume: 1, isSeries: true, totalVolumes: 2, isbn: "9786588131978", coverUrl: "https://m.media-amazon.com/images/I/81UUGTUvPKL.jpg", synopsis: "Para quebrar a maldição do reino, Elspeth precisa confiar no monstro em sua mente e nas Cartas da Providência.", tags: ["fantasia gótica", "sistema de magia", "dark romantasy"] },
            { id: 44, title: "Duas Coroas Retorcidas", author: "Rachel Gillig", publisher: "Alt", pages: 448, genre: "Romantasy", series: "O Rei Pastor", volume: 2, isSeries: true, totalVolumes: 2, isbn: "9786555323948", coverUrl: "https://m.media-amazon.com/images/I/91I5pEHHpNL.jpg", synopsis: "O Pesadelo tomou a cabeça de Elspeth. A conclusão da duologia do Rei Pastor e a busca pela última carta.", tags: ["dark fantasy", "conclusão", "dual POV"] },
            { id: 45, title: "Magia Oculta (Metal Slinger)", author: "Rachel Schneider", publisher: "Independente", pages: 520, genre: "Fantasia", series: "Fogo e Metal", volume: 1, isSeries: true, totalVolumes: 2, isbn: "9798324986469", coverUrl: "https://m.media-amazon.com/images/I/81K7kIHIr4L._UF1000,1000_QL80_.jpg", synopsis: "Brynn descobre ter poderes raros de manipulação de metal e se envolve num conflito com soldados inimigos.", tags: ["fantasia", "xamanismo", "plot twist", "powers proibidos"] }
        ];

        const GENRES = ["Todos", "Fantasia", "Romantasy", "Ficção Científica", "Thriller", "Romance Contemporâneo", "Ficção Literária", "Distopia", "Autores Brasileiros"];

        const getSeriesLabel = (total) => {
            if (total === 2) return "Duologia";
            if (total === 3) return "Trilogia";
            if (total === 4) return "Tetralogia";
            if (total > 4) return `Série (${total} vols)`;
            return "Série";
        };

        // --- COMPONENTS ---

        const AnimatedStatCard = ({ label, value }) => {
            const [displayValue, setDisplayValue] = useState(value);
            useEffect(() => {
                let start = displayValue;
                const end = value;
                if (start === end) return;
                const timer = setInterval(() => {
                    if (start < end) start += 1;
                    else if (start > end) start -= 1;
                    setDisplayValue(start);
                    if (start === end) clearInterval(timer);
                }, 20);
                return () => clearInterval(timer);
            }, [value]);
            return (
                <div className="bg-white/5 backdrop-blur-md border border-white/10 p-4 md:p-5 rounded-3xl flex flex-col items-center justify-center min-w-[90px] md:min-w-[140px] transition-transform hover:scale-105 duration-300">
                    <span className="text-2xl md:text-5xl font-serif font-bold text-[#14B8A6] leading-none mb-2">{displayValue}</span>
                    <span className="text-[9px] md:text-[11px] uppercase tracking-widest text-white/40 font-bold text-center">{label}</span>
                </div>
            );
        };

        const BookCard = ({ book, isRead, isDownloaded, coverUrl, onClick, getGenreColor, isQueueMode, queueIndex, totalInQueue, onMove, onRemoveFromQueue }) => {
            const styles = getGenreColor(book.genre);
            
            if (isQueueMode) {
                return (
                    <div className="bg-white p-4 rounded-[28px] border border-gray-100 flex items-center gap-4 md:gap-6 shadow-sm hover:shadow-md transition-all group animate-fade-in">
                        <div className="text-xl md:text-2xl font-serif font-black text-gray-200 group-hover:text-[#14B8A6] transition-colors w-6 md:w-8 text-center">{queueIndex + 1}</div>
                        <div className="w-12 h-18 md:w-16 md:h-24 rounded-lg overflow-hidden shrink-0 shadow-md">
                            <img src={coverUrl} className="w-full h-full object-cover" alt={book.title} />
                        </div>
                        <div className="flex-1 min-w-0 cursor-pointer" onClick={onClick}>
                            <h4 className="font-bold text-sm text-[#1E3A5F] truncate">{book.title}</h4>
                            <p className="text-xs text-gray-400 truncate">{book.author}</p>
                            <span className={`inline-block mt-2 text-[8px] font-black uppercase tracking-widest px-2 py-0.5 rounded border ${styles.bg} ${styles.text} ${styles.border}`}>{book.genre}</span>
                        </div>
                        <div className="flex items-center gap-1 md:gap-2">
                            <div className="flex flex-col gap-1">
                                <button onClick={() => onMove(queueIndex, -1)} disabled={queueIndex === 0} className="p-1.5 md:p-2 bg-gray-50 rounded-lg text-gray-400 hover:text-[#14B8A6] disabled:opacity-20"><i data-lucide="chevron-up" className="w-4 h-4"></i></button>
                                <button onClick={() => onMove(queueIndex, 1)} disabled={queueIndex === totalInQueue - 1} className="p-1.5 md:p-2 bg-gray-50 rounded-lg text-gray-400 hover:text-[#14B8A6] disabled:opacity-20"><i data-lucide="chevron-down" className="w-4 h-4"></i></button>
                            </div>
                            <button onClick={onRemoveFromQueue} className="p-2 md:p-3 bg-red-50 text-red-400 rounded-xl hover:bg-red-100 transition-colors"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                        </div>
                    </div>
                );
            }

            return (
                <div onClick={onClick} className="group relative bg-white rounded-[24px] overflow-hidden border border-transparent hover:border-[#14B8A6] hover:shadow-2xl hover:shadow-[#14B8A6]/10 transform hover:-translate-y-1 transition-all duration-200 cursor-pointer flex flex-col h-full animate-fade-in">
                    <div className="relative aspect-[3/4.2] overflow-hidden bg-gray-50">
                        {coverUrl ? (
                            <img src={coverUrl} alt={book.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" loading="lazy" />
                        ) : (
                            <div className="w-full h-full flex flex-col items-center justify-center p-6 bg-gradient-to-br from-gray-100 to-gray-200">
                                <i data-lucide="book-marked" className="w-12 h-12 text-gray-300 mb-4"></i>
                                <span className="text-[10px] font-black uppercase tracking-[0.2em] text-center text-gray-400">{book.genre}</span>
                            </div>
                        )}
                        <div className="absolute top-3 left-3 right-3 flex flex-wrap gap-1.5 pointer-events-none z-10 justify-between">
                            <div className="flex flex-col gap-1.5">
                                {book.isDistopia && <span className="bg-[#EF4444] text-white text-[9px] font-black px-2.5 py-1 rounded shadow-lg uppercase tracking-wider">DISTOPIA</span>}
                                {book.isBrazilianAuthor && <span className="bg-[#14B8A6] text-white text-[9px] font-black px-2.5 py-1 rounded shadow-lg uppercase tracking-wider">NACIONAL</span>}
                            </div>
                            {book.isSeries && (
                                <span className="bg-[#FAEEDA] text-[#633806] border border-[#FAC775] text-[9px] font-bold px-2 py-1 rounded-full shadow-sm flex items-center gap-1 h-fit">
                                    <i data-lucide="layers" class="w-2.5 h-2.5"></i>
                                    {getSeriesLabel(book.totalVolumes)}
                                </span>
                            )}
                        </div>
                        <div className="absolute inset-0 bg-[#1E3A5F]/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center backdrop-blur-[2px] z-20">
                            <span className="bg-white text-[#1E3A5F] px-5 py-2.5 rounded-full text-[11px] font-black shadow-xl transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500">VER DETALHES</span>
                        </div>
                    </div>
                    <div className="p-4 flex-1 flex flex-col bg-white">
                        <h3 className="font-bold text-[13px] md:text-sm leading-[1.4] line-clamp-2 mb-1 group-hover:text-[#14B8A6] transition-colors">{book.title}</h3>
                        <p className="text-gray-400 text-[10px] md:text-[11px] font-medium truncate mb-3">{book.author}</p>
                        <div className="flex flex-wrap gap-1 mt-auto">
                            <span className={`text-[8px] md:text-[9px] font-black uppercase tracking-widest px-2 py-0.5 rounded border ${styles.bg} ${styles.text} ${styles.border}`}>{book.genre}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const DetailModal = ({ book, onClose, isRead, isDownloaded, isInQueue, coverUrl, onToggleRead, onToggleDownload, onToggleQueue, onSetCover, onRemoveCover, getGenreColor, hasCustomCover }) => {
            const styles = getGenreColor(book.genre);
            const [isEditingCover, setIsEditingCover] = useState(false);
            const [tempUrl, setTempUrl] = useState("");

            useEffect(() => { lucide.createIcons(); }, []);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => { onSetCover(book.id, reader.result); setIsEditingCover(false); };
                    reader.readAsDataURL(file);
                }
            };

            const handleUrlSubmit = (e) => {
                e.preventDefault();
                if (tempUrl) { onSetCover(book.id, tempUrl); setTempUrl(""); setIsEditingCover(false); }
            };

            return (
                <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-6 overflow-hidden animate-fade-in">
                    <div className="absolute inset-0 bg-[#0F2240]/70 backdrop-blur-md" onClick={onClose} />
                    <div className="relative bg-white w-full max-w-4xl max-h-[92vh] overflow-y-auto sm:rounded-[40px] rounded-t-[32px] shadow-2xl flex flex-col animate-slide-up z-10">
                        <div className="flex justify-between items-center px-6 md:px-10 py-5 border-b border-gray-50 sticky top-0 bg-white/95 backdrop-blur-md z-20">
                            <div className="flex items-center gap-3">
                                <span className="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Ficha Técnica</span>
                                {book.isSeries && <span className="bg-[#FAEEDA] text-[#633806] text-[9px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">{getSeriesLabel(book.totalVolumes)}</span>}
                            </div>
                            <button onClick={onClose} className="p-2.5 rounded-full hover:bg-gray-100 text-gray-400 transition-all hover:rotate-90"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>

                        <div className="px-6 py-8 md:px-14 md:py-16">
                            <div className="flex flex-col md:flex-row gap-10 md:gap-16">
                                <div className="w-full md:w-80 shrink-0">
                                    <div className="relative">
                                        <div className="aspect-[3/4.2] rounded-[32px] shadow-2xl overflow-hidden bg-gray-50 border-[10px] border-white ring-1 ring-gray-100">
                                            <img src={coverUrl || ''} alt={book.title} className="w-full h-full object-cover" />
                                        </div>
                                        <button onClick={() => setIsEditingCover(!isEditingCover)} className="absolute -bottom-2 right-4 bg-white shadow-xl border border-gray-100 p-3 rounded-full text-[#1E3A5F] hover:text-[#14B8A6]"><i data-lucide="image" class="w-5 h-5"></i></button>
                                    </div>

                                    <button onClick={onToggleQueue} className={`w-full mt-6 py-4 px-6 rounded-2xl text-[11px] font-black uppercase tracking-widest flex items-center justify-center gap-3 transition-all border-2 ${isInQueue ? 'bg-amber-50 text-amber-600 border-amber-200' : 'bg-white text-gray-400 border-gray-100 hover:border-teal-200 hover:text-teal-600'}`}>
                                        <i data-lucide="list-ordered" class="w-4 h-4"></i> {isInQueue ? 'Na Fila de Leitura' : 'Planear Leitura'}
                                    </button>

                                    {isEditingCover && (
                                        <div className="mt-6 p-5 bg-gray-50 rounded-[24px] border border-gray-100 animate-fade-in">
                                            <h5 className="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-4">Atualizar Capa</h5>
                                            <div className="flex flex-col gap-3">
                                                <label className="flex items-center gap-3 px-4 py-3 bg-white rounded-xl border border-dashed border-gray-300 text-gray-500 hover:bg-gray-100 cursor-pointer text-xs font-bold">
                                                    <i data-lucide="upload" class="w-4 h-4"></i> Upload Arquivo
                                                    <input type="file" accept="image/*" className="hidden" onChange={handleFileUpload} />
                                                </label>
                                                <form onSubmit={handleUrlSubmit} className="flex flex-col gap-2">
                                                    <input type="url" placeholder="URL da imagem..." className="w-full px-4 py-3 bg-white rounded-xl border border-gray-200 text-xs outline-none" value={tempUrl} onChange={(e) => setTempUrl(e.target.value)} />
                                                    <button type="submit" className="bg-[#14B8A6] text-white py-2.5 rounded-xl text-xs font-bold shadow-lg shadow-[#14B8A6]/20">Salvar URL</button>
                                                </form>
                                                {hasCustomCover && <button onClick={() => { onRemoveCover(book.id); setIsEditingCover(false); }} className="text-[10px] font-bold text-red-400 hover:text-red-600">Remover Capa</button>}
                                            </div>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-2 gap-4 mt-6">
                                        <button onClick={() => onToggleDownload(book.id)} className={`py-5 px-6 rounded-2xl text-[11px] font-black uppercase tracking-wider flex items-center justify-center gap-3 transition-all ${isDownloaded ? 'bg-[#14B8A6] text-white shadow-lg' : 'bg-gray-100 text-gray-400'}`}><i data-lucide="download" class="w-4.5 h-4.5"></i> {isDownloaded ? 'Baixado' : 'Baixar'}</button>
                                        <button onClick={() => onToggleRead(book.id)} className={`py-5 px-6 rounded-2xl text-[11px] font-black uppercase tracking-wider flex items-center justify-center gap-3 transition-all ${isRead ? 'bg-[#1E3A5F] text-white shadow-lg' : 'bg-gray-100 text-gray-400'}`}><i data-lucide="check-circle-2" class="w-4.5 h-4.5"></i> {isRead ? 'Lido' : 'Lido?'}</button>
                                    </div>
                                </div>

                                <div className="flex-1 min-w-0">
                                    <div className="mb-10">
                                        <div className="flex flex-wrap gap-2 mb-6">
                                            <span className={`text-[10px] uppercase font-black tracking-widest px-4 py-1.5 rounded-full border ${styles.bg} ${styles.text} ${styles.border}`}>{book.genre}</span>
                                            {book.isDistopia && <span className="bg-red-50 text-red-600 border border-red-100 text-[10px] uppercase font-black tracking-widest px-4 py-1.5 rounded-full">Distopia</span>}
                                            {book.isBrazilianAuthor && <span className="bg-teal-50 text-[#14B8A6] border border-[#14B8A6]/20 text-[10px] uppercase font-black tracking-widest px-4 py-1.5 rounded-full">Nacional</span>}
                                        </div>
                                        <h3 className="text-3xl md:text-5xl font-serif font-bold text-[#1E3A5F] mb-4 leading-tight">{book.title}</h3>
                                        <p className="text-xl text-gray-400 italic font-serif">por {book.author}</p>
                                    </div>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-6 mb-12">
                                        <div className="flex flex-col gap-1"><span className="text-[10px] text-gray-300 uppercase font-black tracking-widest">Editora</span><span className="font-bold text-[#1E3A5F]">{book.publisher || "Independente"}</span></div>
                                        <div className="flex flex-col gap-1"><span className="text-[10px] text-gray-300 uppercase font-black tracking-widest">Páginas</span><span className="font-bold text-[#1E3A5F]">{book.pages}p</span></div>
                                        {book.isSeries && <div className="flex flex-col gap-1"><span className="text-[10px] text-gray-300 uppercase font-black tracking-widest">Série</span><span className="font-bold text-[#1E3A5F]">{book.series} vol.{book.volume}</span></div>}
                                    </div>
                                    <div className="mb-12 relative">
                                        <div className={`absolute -left-6 top-0 bottom-0 w-1 rounded-full opacity-10 ${styles.text} bg-current`} />
                                        <h4 className={`text-[10px] font-black uppercase tracking-[0.3em] ${styles.text} mb-6`}>Sinopse da Obra</h4>
                                        <p className="text-gray-600 leading-[1.9] text-lg max-w-2xl whitespace-pre-wrap">{book.synopsis}</p>
                                    </div>
                                    <div className="pt-8 border-t border-gray-100 flex flex-wrap gap-2">
                                        {book.tags?.map(tag => (
                                            <span key={tag} className="text-[11px] font-semibold text-gray-400 lowercase bg-gray-50 px-4 py-2 rounded-xl border border-gray-100 transition-colors hover:text-[#14B8A6]">#{tag}</span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---

        const App = () => {
            const [readStatus, setReadStatus] = useState({});
            const [downloadStatus, setDownloadStatus] = useState({});
            const [customCovers, setCustomCovers] = useState({});
            const [readingOrder, setReadingOrder] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeGenre, setActiveGenre] = useState("Todos");
            const [filterRead, setFilterRead] = useState(false);
            const [filterDownloaded, setFilterDownloaded] = useState(false);
            const [selectedBook, setSelectedBook] = useState(null);
            const [viewMode, setViewMode] = useState("grid");

            useEffect(() => { lucide.createIcons(); }, []);

            useEffect(() => {
                const savedRead = JSON.parse(localStorage.getItem('lib-read') || '{}');
                const savedDownload = JSON.parse(localStorage.getItem('lib-download') || '{}');
                const savedCovers = JSON.parse(localStorage.getItem('lib-covers') || '{}');
                const savedQueue = JSON.parse(localStorage.getItem('lib-queue') || '[]');
                setReadStatus(savedRead);
                setDownloadStatus(savedDownload);
                setCustomCovers(savedCovers);
                setReadingOrder(savedQueue);
                lucide.createIcons();
            }, []);

            useEffect(() => {
                localStorage.setItem('lib-read', JSON.stringify(readStatus));
                localStorage.setItem('lib-download', JSON.stringify(downloadStatus));
                localStorage.setItem('lib-covers', JSON.stringify(customCovers));
                localStorage.setItem('lib-queue', JSON.stringify(readingOrder));
                lucide.createIcons();
            }, [readStatus, downloadStatus, customCovers, readingOrder, viewMode]);

            const toggleRead = (id) => setReadStatus(prev => ({ ...prev, [id]: !prev[id] }));
            const toggleDownload = (id) => setDownloadStatus(prev => ({ ...prev, [id]: !prev[id] }));
            const setCustomCover = (id, url) => setCustomCovers(prev => ({ ...prev, [id]: url }));
            const removeCustomCover = (id) => setCustomCovers(prev => { const n = { ...prev }; delete n[id]; return n; });
            const toggleQueue = (id) => setReadingOrder(prev => prev.includes(id) ? prev.filter(bId => bId !== id) : [...prev, id]);
            const moveInQueue = (index, dir) => {
                const n = [...readingOrder];
                const target = index + dir;
                if (target < 0 || target >= n.length) return;
                const [moved] = n.splice(index, 1);
                n.splice(target, 0, moved);
                setReadingOrder(n);
            };

            const filteredBooks = useMemo(() => {
                if (viewMode === "queue") return readingOrder.map(id => BOOKS_DATA.find(b => b.id === id)).filter(Boolean);
                return BOOKS_DATA.filter(book => {
                    const matchesSearch = book.title.toLowerCase().includes(searchQuery.toLowerCase()) || book.author.toLowerCase().includes(searchQuery.toLowerCase());
                    let matchesGenre = true;
                    if (activeGenre === "Autores Brasileiros") matchesGenre = book.isBrazilianAuthor;
                    else if (activeGenre === "Distopia") matchesGenre = book.isDistopia;
                    else if (activeGenre !== "Todos") matchesGenre = book.genre === activeGenre;
                    const matchesRead = filterRead ? readStatus[book.id] : true;
                    const matchesDownloaded = filterDownloaded ? downloadStatus[book.id] : true;
                    return matchesSearch && matchesGenre && matchesRead && matchesDownloaded;
                });
            }, [searchQuery, activeGenre, filterRead, filterDownloaded, readStatus, downloadStatus, viewMode, readingOrder]);

            const stats = {
                total: BOOKS_DATA.length,
                read: Object.values(readStatus).filter(Boolean).length,
                downloaded: Object.values(downloadStatus).filter(Boolean).length
            };

            const getGenreColor = (genre) => {
                switch (genre) {
                    case "Fantasia": return { text: "text-[#14B8A6]", bg: "bg-teal-50", border: "border-teal-100", gradient: "from-teal-100 to-[#14B8A6]/20" };
                    case "Romantasy": return { text: "text-[#7C3AED]", bg: "bg-purple-50", border: "border-purple-100", gradient: "from-purple-100 to-[#7C3AED]/20" };
                    case "Ficção Científica": return { text: "text-[#1E3A5F]", bg: "bg-slate-100", border: "border-slate-200", gradient: "from-slate-200 to-[#1E3A5F]/20" };
                    case "Thriller": return { text: "text-[#EF4444]", bg: "bg-red-50", border: "border-red-100", gradient: "from-red-100 to-red-200" };
                    case "Romance Contemporâneo": return { text: "text-rose-600", bg: "bg-rose-50", border: "border-rose-100", gradient: "from-rose-100 to-rose-200" };
                    default: return { text: "text-gray-600", bg: "bg-gray-50", border: "border-gray-100", gradient: "from-gray-100 to-gray-200" };
                }
            };

            const getCoverUrl = (book) => customCovers[book.id] || book.coverUrl || `https://covers.openlibrary.org/b/isbn/${book.isbn}-L.jpg`;

            return (
                <div className="min-h-screen">
                    {/* Hero */}
                    <header className="bg-[#1E3A5F] text-white pt-20 pb-16 px-6 relative overflow-hidden text-center md:text-left">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-12 relative z-10">
                            <div>
                                <h1 className="text-5xl md:text-7xl font-serif font-bold tracking-tight leading-tight">Biblioteca do Amanhã</h1>
                                <span className="text-[#14B8A6] text-sm md:text-lg font-medium tracking-widest uppercase italic block mt-1">By Meiyka</span>
                                <p className="text-white/60 text-base md:text-xl font-light mt-4 max-w-lg">Catálogo pessoal de leituras e referências visuais.</p>
                            </div>
                            <div className="grid grid-cols-3 gap-3 md:gap-6 w-full md:w-auto">
                                <AnimatedStatCard label="Total" value={stats.total} />
                                <AnimatedStatCard label="Lidos" value={stats.read} />
                                <AnimatedStatCard label="Baixados" value={stats.downloaded} />
                            </div>
                        </div>
                        <div className="absolute top-0 right-0 w-[600px] h-[600px] bg-[#14B8A6] rounded-full blur-[160px] opacity-[0.07] -mr-64 -mt-64"></div>
                        <div className="absolute bottom-0 left-0 w-96 h-96 bg-[#7C3AED] rounded-full blur-[140px] opacity-[0.05] -ml-48 -mb-48"></div>
                    </header>

                    {/* Filter Bar */}
                    <nav className="sticky top-0 z-40 bg-white/90 backdrop-blur-xl border-b border-gray-100 shadow-sm">
                        <div className="max-w-7xl mx-auto px-6 py-5 flex flex-col xl:flex-row gap-6 items-center">
                            <div className="flex bg-gray-100 p-1 rounded-xl shrink-0">
                                <button onClick={() => setViewMode('grid')} className={`flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all ${viewMode === 'grid' ? 'bg-white text-[#1E3A5F] shadow-sm' : 'text-gray-400'}`}>
                                    <i data-lucide="grid-3x3" class="w-3.5 h-3.5"></i> Catálogo
                                </button>
                                    <i data-lucide="layout-grid" class="w-3.5 h-3.5"></i> Catálogo
                                </button>
                                <button onClick={() => setViewMode('queue')} className={`flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all ${viewMode === 'queue' ? 'bg-[#14B8A6] text-white shadow-sm' : 'text-gray-400'}`}>
                                    <i data-lucide="list-ordered" class="w-3.5 h-3.5"></i> Minha Fila
                                </button>
                            </div>

                            <div className="relative w-full xl:w-80">
                                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                                <input type="text" placeholder="Pesquisar..." className="w-full pl-11 pr-4 py-3 bg-[#F8F9FB] border border-gray-200 rounded-2xl text-sm focus:ring-2 focus:ring-[#14B8A6]/20 outline-none" value={searchQuery} disabled={viewMode === 'queue'} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>

                            <div className="flex overflow-x-auto w-full xl:flex-1 no-scrollbar gap-2 pb-1 items-center">
                                {GENRES.map(genre => (
                                    <button key={genre} onClick={() => setActiveGenre(genre)} disabled={viewMode === 'queue'} className={`px-5 py-2.5 rounded-full text-xs font-semibold whitespace-nowrap transition-all border ${activeGenre === genre ? "bg-[#14B8A6] text-white border-[#14B8A6]" : "bg-white text-gray-500 border-gray-200"} ${viewMode === 'queue' ? 'opacity-30' : ''}`}>{genre}</button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Content */}
                    <main className="max-w-7xl mx-auto px-6 py-12">
                        {filteredBooks.length === 0 ? (
                            <div className="text-center py-24 bg-white rounded-[32px] border border-dashed border-gray-200">
                                <i data-lucide="library" class="w-16 h-16 mx-auto text-gray-200 mb-6"></i>
                                <h3 className="text-xl font-serif font-bold text-gray-400">Nada por aqui...</h3>
                            </div>
                        ) : (
                            <div className={viewMode === 'queue' ? "flex flex-col gap-6 max-w-3xl mx-auto" : "grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-8"}>
                                {filteredBooks.map((book, index) => (
                                    <BookCard 
                                        key={book.id} book={book} isRead={readStatus[book.id]} isDownloaded={downloadStatus[book.id]} 
                                        coverUrl={getCoverUrl(book)} onClick={() => setSelectedBook(book)} getGenreColor={getGenreColor}
                                        isQueueMode={viewMode === 'queue'} queueIndex={index} totalInQueue={readingOrder.length}
                                        onMove={moveInQueue} onRemoveFromQueue={() => toggleQueue(book.id)}
                                    />
                                ))}
                            </div>
                        )}
                    </main>

                    {selectedBook && (
                        <DetailModal 
                            book={selectedBook} onClose={() => setSelectedBook(null)} 
                            isRead={readStatus[selectedBook.id]} isDownloaded={downloadStatus[selectedBook.id]} isInQueue={readingOrder.includes(selectedBook.id)}
                            coverUrl={getCoverUrl(selectedBook)} onToggleRead={() => toggleRead(selectedBook.id)}
                            onToggleDownload={() => toggleDownload(selectedBook.id)} onToggleQueue={() => toggleQueue(selectedBook.id)}
                            onSetCover={setCustomCover} onRemoveCover={removeCustomCover} getGenreColor={getGenreColor}
                            hasCustomCover={!!customCovers[selectedBook.id]}
                        />
                    )}

                    <footer className="max-w-7xl mx-auto px-6 pb-20 pt-12 border-t border-gray-100 text-center">
                        <p className="text-gray-400 text-xs tracking-widest uppercase font-semibold">Biblioteca do Amanhã &copy; 2024 • By Meiyka</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
