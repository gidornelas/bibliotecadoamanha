                                        )}
                                        {book.epubKey && !book.epubUrl && isViewingOwnProfile && (
                                            <div className="w-full rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-[10px] font-semibold text-amber-700 leading-relaxed">
                                                Este livro ainda usa o formato antigo de EPUB local. Reenvie o arquivo para migrar ao Supabase Storage.
                                            </div>
                                        )}
                                        {!hasRemoteEpub && isViewingOwnProfile && (
                                            <>
                                                <label htmlFor={`epub-upload-${book.id}`} className="w-full py-3 px-4 rounded-xl text-[10px] font-bold uppercase tracking-wider flex items-center justify-center gap-2 transition-all border bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100 cursor-pointer">
                                                    <Icon name="bookMarked" className="w-3.5 h-3.5" />
                                                    {isUploadingEpub ? 'Enviando EPUB...' : 'Enviar EPUB'}
                                                </label>
                                                <input
                                                    id={`epub-upload-${book.id}`}
                                                    type="file"
                                                    accept=".epub,application/epub+zip"
                                                    className="hidden"
                                                    disabled={isUploadingEpub}
                                                    onChange={(e) => {
                                                        try {
                                                            const file = e.target.files?.[0];
                                                            if (!file) return;

                                                            // Apenas guarda arquivo, processa no próximo evento
                                                            setTimeout(async () => {
                                                                const withUiTimeout = (promise, ms, timeoutMessage) => Promise.race([
                                                                    promise,
                                                                    new Promise((_, reject) => setTimeout(() => reject(new Error(timeoutMessage)), ms))
                                                                ]);
                                                                try {
                                                                    setIsUploadingEpub(true);
                                                                    setUploadMessage('A carregar EPUB...');
                                                                    await withUiTimeout(
                                                                        onUploadEpub(file),
                                                                        30000,
                                                                        'Upload sem resposta. Verifique bucket, políticas e conexão do Supabase.'
                                                                    );
                                                                    setUploadMessage(`✅ EPUB enviado: ${file.name}`);
                                                                } catch (error) {
                                                                    console.error(error);
                                                                    setUploadMessage(`❌ ${error?.message || 'Falha ao enviar EPUB.'}`);
                                                                } finally {
                                                                    setIsUploadingEpub(false);
                                                                    e.target.value = '';
                                                                }
                                                            }, 0);
                                                        } catch (err) {
                                                            console.error('Erro ao selecionar arquivo:', err);
                                                            setUploadMessage(`❌ Erro: ${err.message}`);
                                                        }
                                                    }}
                                                />
                                            </>
                                        )}
                                        {uploadMessage && <p className="text-[10px] text-gray-500">{uploadMessage}</p>}
                                        {(book.epubPath || book.epubKey) && isViewingOwnProfile && (
                                            <>
                                                {!isConfirmingDeleteEpub ? (
                                                    <button onClick={() => setIsConfirmingDeleteEpub(true)} className="w-full mt-2 py-2 text-[10px] font-bold text-red-300 uppercase tracking-widest hover:text-red-500 flex items-center justify-center gap-2 transition-colors">
                                                        <Icon name="trash" className="w-3.5 h-3.5" /> Remover EPUB
                                                    </button>
                                                ) : (
                                                    <div className="bg-red-50 p-3 rounded-xl animate-fade-in mt-2">
                                                        <p className="text-[9px] font-black text-red-500 uppercase tracking-widest mb-2">Confirmar remoção do EPUB?</p>
                                                        <div className="flex gap-2 w-full">
                                                            <button onClick={handleDeleteEpub} className="flex-1 py-2 bg-red-500 text-white rounded-lg text-[9px] font-bold uppercase tracking-widest">Sim</button>
                                                            <button onClick={() => setIsConfirmingDeleteEpub(false)} className="flex-1 py-2 bg-white text-gray-400 border border-gray-200 rounded-lg text-[9px] font-bold uppercase tracking-widest">Não</button>
                                                        </div>
                                                    </div>
                                                )}
                                            </>
                                        )}
                                        {isViewingOwnProfile && (
                                        <div className="mt-2 pt-4 border-t border-gray-100 text-center">
                                            <button onClick={onEdit} className="w-full py-2 mb-2 text-[10px] font-bold text-[#1E3A5F] uppercase tracking-widest hover:text-[#14B8A6] flex items-center justify-center gap-2 transition-colors">
                                                <Icon name="edit" className="w-3.5 h-3.5" /> Editar Obra
                                            </button>
                                            {!isConfirmingDelete ? (
                                                <button onClick={() => setIsConfirmingDelete(true)} className="w-full py-2 text-[10px] font-bold text-gray-300 uppercase tracking-widest hover:text-red-400 flex items-center justify-center gap-2 transition-colors">
                                                    <Icon name="trash" className="w-3.5 h-3.5" /> Eliminar Obra
                                                </button>
                                            ) : (
                                                <div className="bg-red-50 p-4 rounded-2xl animate-fade-in">
                                                    <p className="text-[10px] font-black text-red-500 uppercase tracking-widest mb-3">Tem a certeza?</p>
                                                    <div className="flex gap-2 w-full">
                                                        <button onClick={onDelete} className="flex-1 py-2 bg-red-500 text-white rounded-lg text-[10px] font-bold uppercase tracking-widest shadow-sm">Sim</button>
                                                        <button onClick={() => setIsConfirmingDelete(false)} className="flex-1 py-2 bg-white text-gray-400 border border-gray-200 rounded-lg text-[10px] font-bold uppercase tracking-widest">Não</button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                        )}
                                        <div className="mt-4 pt-4 border-t border-gray-100 text-left">
                                            <p className="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Comentários dos Perfis</p>
                                            <div className="max-h-40 overflow-y-auto pr-1 space-y-2 mb-2">
                                                {bookComments.length === 0 ? (
                                                    <p className="text-[11px] text-gray-400 leading-relaxed">Nenhum comentário ainda. Deixe o primeiro comentário deste livro.</p>
                                                ) : (
                                                    bookComments.map((comment) => (
                                                        <div key={comment.id} className="rounded-xl border border-gray-100 bg-gray-50 px-2.5 py-2">
                                                            <p className="text-[10px] text-gray-400 lowercase font-semibold">{comment.authorProfileLabel}</p>
                                                            <p className="text-[11px] text-[#1E3A5F] leading-relaxed whitespace-pre-wrap">{comment.text}</p>
                                                            <div className="mt-1.5">
                                                                <button
                                                                    type="button"
                                                                    onClick={() => onDeleteComment(book.id, comment.id)}
                                                                    className="text-[10px] font-bold text-red-400 hover:text-red-500 transition-colors"
                                                                >
                                                                    Excluir
                                                                </button>
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                            <form
                                                onSubmit={(e) => {
                                                    e.preventDefault();
                                                    if (!commentDraft.trim()) return;
                                                    onAddComment(book.id, commentDraft.trim());
                                                    setCommentDraft("");
                                                }}
                                                className="flex gap-2"
                                            >
                                                <input
                                                    value={commentDraft}
                                                    onChange={(e) => setCommentDraft(e.target.value)}
                                                    maxLength={220}
                                                    placeholder={`Comentar como ${currentProfileLabel.toLowerCase()}...`}
                                                    className="flex-1 px-2.5 py-2 rounded-xl border border-gray-200 text-[11px] outline-none focus:ring-2 focus:ring-[#14B8A6]/25"
                                                />
                                                <button type="submit" className="px-3 py-2 rounded-xl bg-[#14B8A6] text-white text-[10px] font-black uppercase tracking-wide hover:bg-[#0fae9d] transition-colors">Enviar</button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex-1 min-w-0">
                                    <div className="mb-10">
                                        <div className="flex flex-wrap gap-2 mb-6">
                                            <span onClick={() => { onGenreClick(book.genre); onClose(); }} className={`text-[10px] uppercase font-black tracking-widest px-4 py-1.5 rounded-full border cursor-pointer hover:shadow-sm transition-all ${styles.bg} ${styles.text} ${styles.border}`}>{book.genre}</span>
                                            {book.isBrazilianAuthor && (
                                                <span className="bg-teal-50 text-[#14B8A6] border border-[#14B8A6]/20 text-[10px] uppercase font-black tracking-widest px-4 py-1.5 rounded-full shadow-sm flex items-center gap-1.5">
                                                    <span>🇧🇷</span> Nacional
                                                </span>
                                            )}
                                            {isMultiVolumeSeries && (
                                                <span className="bg-amber-50 text-amber-700 border border-amber-200 text-[10px] uppercase font-black tracking-widest px-4 py-1.5 rounded-full shadow-sm">
                                                    {seriesLabel}
                                                </span>
                                            )}
                                        </div>
                                        <h3 className="text-3xl md:text-5xl font-serif font-bold text-[#1E3A5F] mb-4 leading-tight">{book.title}</h3>
                                        <p className="text-xl text-gray-400 italic font-serif">por {book.author}</p>
                                    </div>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-6 mb-12 text-sm">
                                        <div className="flex flex-col gap-1"><span className="text-[10px] text-gray-300 uppercase font-black tracking-widest">Editora</span><span className="font-bold text-[#1E3A5F]">{book.publisher || "Independente"}</span></div>
                                        <div className="flex flex-col gap-1"><span className="text-[10px] text-gray-300 uppercase font-black tracking-widest">Páginas</span><span className="font-bold text-[#1E3A5F]">{book.pages}p</span></div>
                                        {isMultiVolumeSeries && (
                                            <div className="flex flex-col gap-1"><span className="text-[10px] text-gray-300 uppercase font-black tracking-widest">Série</span><span className="font-bold text-[#1E3A5F]">{book.series || seriesLabel}</span></div>
                                        )}
                                        {isMultiVolumeSeries && (
                                            <div className="flex flex-col gap-1"><span className="text-[10px] text-gray-300 uppercase font-black tracking-widest">Volume</span><span className="font-bold text-[#1E3A5F]">Vol. {book.volume || 1} de {book.totalVolumes}</span></div>
                                        )}
                                    </div>
                                    <div className="mb-12 relative">
                                        <div className={`absolute -left-6 top-0 bottom-0 w-1 rounded-full opacity-10 ${styles.text} bg-current`} />
                                        <h4 className={`text-[10px] font-black uppercase tracking-[0.3em] ${styles.text} mb-6`}>Sinopse da Obra</h4>
                                        <p className="text-gray-600 leading-[1.9] text-lg max-w-2xl whitespace-pre-wrap">{book.synopsis}</p>
                                    </div>
                                    <div className="pt-8 border-t border-gray-100 flex flex-wrap gap-2">
                                        {book.tags?.map(t => (
                                            <span key={t} className="text-[11px] font-semibold text-gray-400 lowercase bg-gray-50 px-4 py-2 rounded-xl border border-gray-100">#{t}</span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 4. APP PRINCIPAL ---

        const PROFILE_OPTIONS = [
            { id: 'perfil-1', label: 'Gianny' },
            { id: 'perfil-2', label: 'Laisa' }
        ];
        const PROFILE_STORAGE_VERSION = {
            'perfil-1': 'v1',
            'perfil-2': 'v2'
        };
        const ACTIVE_PROFILE_KEY = 'libdb-active-profile-v1';
        const CHAT_STORAGE_KEY = 'libdb-chat-v1-shared';
        const COMMENTS_STORAGE_KEY = 'libdb-comments-v1-shared';
        const NOTIFICATIONS_STORAGE_KEY = 'libdb-notifications-v1-shared';

        const getBookKey = (book) => {
            const t = (book?.title || '').trim().toLowerCase().replace(/\s+/g, ' ');
            const a = (book?.author || '').trim().toLowerCase().replace(/\s+/g, ' ');
            return `${t}||${a}`;
        };

        const App = () => {
            const [readStatus, setReadStatus] = useState({});
            const [downloadStatus, setDownloadStatus] = useState({});
            const [customCovers, setCustomCovers] = useState({});
            const [customBooks, setCustomBooks] = useState([]);
            const [remoteEpubAvailability, setRemoteEpubAvailability] = useState({});
            const [removedInitialIds, setRemovedInitialIds] = useState([]);
            const [readingOrder, setReadingOrder] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeGenre, setActiveGenre] = useState("Todos");
            const [filterRead, setFilterRead] = useState(false);
            const [filterDownloaded, setFilterDownloaded] = useState(false);
            const [selectedBook, setSelectedBook] = useState(null);
            const [viewMode, setViewMode] = useState("grid");
            const [isInitialized, setIsInitialized] = useState(false);
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [showAddBook, setShowAddBook] = useState(false);
            const [editingBook, setEditingBook] = useState(null);
            const [showProfileMenu, setShowProfileMenu] = useState(false);
            const profileMenuRef = useRef(null);
            const notificationsPanelRef = useRef(null);
            const isProfileSwitchingRef = useRef(false);
            const [profileTransitionStage, setProfileTransitionStage] = useState('idle');
            const pendingProfileRef = useRef(null);
            const [chatMessages, setChatMessages] = useState([]);
            const [chatOpen, setChatOpen] = useState(false);
            const [chatInput, setChatInput] = useState('');
            const [chatInitialized, setChatInitialized] = useState(false);
            const [commentsByBook, setCommentsByBook] = useState({});
            const [commentsInitialized, setCommentsInitialized] = useState(false);
            const [notifications, setNotifications] = useState([]);
            const [notificationsInitialized, setNotificationsInitialized] = useState(false);
            const [notificationsOpen, setNotificationsOpen] = useState(false);
            const [amazonHighlights, setAmazonHighlights] = useState([]);
            const [isLoadingAmazonHighlights, setIsLoadingAmazonHighlights] = useState(false);
            const [amazonHighlightsError, setAmazonHighlightsError] = useState('');
            const previousChatUnreadRef = useRef(null);
            const [activeProfile, setActiveProfile] = useState(() => {
                const stored = localStorage.getItem(ACTIVE_PROFILE_KEY);
                return PROFILE_OPTIONS.some(profile => profile.id === stored) ? stored : PROFILE_OPTIONS[0].id;
            });

            const switchProfile = useCallback((profileId) => {
                if (profileId === activeProfile) return;
                pendingProfileRef.current = profileId;
                setProfileTransitionStage('out');
                setTimeout(() => {
                    setActiveProfile(pendingProfileRef.current);
                    setProfileTransitionStage('in');
                    setTimeout(() => setProfileTransitionStage('idle'), 520);
                }, 420);
            }, [activeProfile]);

            const getProfileKeys = useCallback((profileId) => {
                const version = PROFILE_STORAGE_VERSION[profileId] || 'v1';
                return {
                    read: `libdb-read-${version}-${profileId}`,
                    download: `libdb-download-${version}-${profileId}`,
                    covers: `libdb-covers-${version}-${profileId}`,
                    custom: `libdb-custom-${version}-${profileId}`,
                    removed: `libdb-removed-${version}-${profileId}`,
                    queue: `libdb-queue-${version}-${profileId}`
                };
            }, []);

            const profileKeys = useMemo(() => getProfileKeys(activeProfile), [activeProfile, getProfileKeys]);

            const currentProfile = PROFILE_OPTIONS.find(profile => profile.id === activeProfile) || PROFILE_OPTIONS[0];
            const otherProfile = PROFILE_OPTIONS.find(profile => profile.id !== activeProfile);
            const loggedUserProfile = useMemo(() => {
                const firstName = (user?.displayName || user?.email || '').trim().split(' ')[0].toLowerCase();
                return PROFILE_OPTIONS.find(profile => profile.label.toLowerCase() === firstName) || null;
            }, [user]);
            const myProfileId = loggedUserProfile?.id || null;
            const profileGenres = useMemo(() => {
                const available = new Set();
                customBooks.forEach(book => {
                    const genre = (book?.genre || '').trim();
                    if (genre) available.add(genre);
                    if (book?.isDistopia) available.add('Distopia');
                });

                const known = GENRES.filter(genre => genre !== 'Todos' && available.has(genre));
                const custom = [...available].filter(genre => !GENRES.includes(genre)).sort((a, b) => a.localeCompare(b, 'pt-BR'));
                return [...known, ...custom];
            }, [customBooks]);
            const genreMenuItems = useMemo(() => ['Todos', ...profileGenres], [profileGenres]);
            const sortedChatMessages = useMemo(
                () => [...chatMessages].sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)),
                [chatMessages]
            );
            const chatUnreadCount = useMemo(
                () => chatMessages.filter(m => m.to === activeProfile && !m.readBy?.[activeProfile]).length,
                [chatMessages, activeProfile]
            );
            const sortedNotifications = useMemo(
                () => notifications
                    .filter(n => n.toProfileId === myProfileId)
                    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)),
                [notifications, myProfileId]
            );
            const notificationUnreadCount = useMemo(
                () => notifications.filter(n => n.toProfileId === myProfileId && !n.readBy?.[myProfileId]).length,
                [notifications, myProfileId]
            );

            const playSubtleMessageBeep = useCallback(() => {
                try {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (!AudioCtx) return;
                    const context = new AudioCtx();
                    const oscillator = context.createOscillator();
                    const gain = context.createGain();
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(820, context.currentTime);
                    gain.gain.setValueAtTime(0.0001, context.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.04, context.currentTime + 0.01);
                    gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.12);
                    oscillator.connect(gain);
                    gain.connect(context.destination);
                    oscillator.start();
                    oscillator.stop(context.currentTime + 0.13);
                    setTimeout(() => context.close().catch(() => {}), 180);
                } catch {
                    // Falha silenciosa: audio não é crítico.
                }
            }, []);

            const markChatAsRead = useCallback(() => {
                setChatMessages(prev => {
                    let changed = false;
                    const next = prev.map(msg => {
                        if (msg.to === activeProfile && !msg.readBy?.[activeProfile]) {
                            changed = true;
                            return {
                                ...msg,
                                readBy: {
                                    ...(msg.readBy || {}),
                                    [activeProfile]: true
                                }
                            };
                        }
                        return msg;
                    });
                    return changed ? next : prev;
                });
            }, [activeProfile]);

            const markNotificationsAsRead = useCallback(() => {
                if (!myProfileId) return;
                setNotifications(prev => {
                    let changed = false;
                    const next = prev.map(notification => {
                        if (notification.toProfileId === myProfileId && !notification.readBy?.[myProfileId]) {
                            changed = true;
                            return {
                                ...notification,
                                readBy: {
                                    ...(notification.readBy || {}),
                                    [myProfileId]: true
                                }
                            };
                        }
                        return notification;
                    });
                    return changed ? next : prev;
                });
            }, [myProfileId]);

            const pushNotification = useCallback(({ toProfileId, type, text, bookId }) => {
                const fromId = myProfileId || activeProfile;
                const fromLabel = loggedUserProfile?.label || currentProfile.label;
                if (!toProfileId || toProfileId === fromId) return;
                const now = Date.now();
                const notification = {
                    id: `notif-${now}-${Math.random().toString(36).slice(2, 8)}`,
                    type: type || 'geral',
                    text: text || 'Nova notificação',
                    bookId: bookId || null,
                    fromProfileId: fromId,
                    fromProfileLabel: fromLabel,
                    toProfileId,
                    createdAt: now,
                    readBy: {
                        [toProfileId]: false,
                        [fromId]: true
                    }
                };
                setNotifications(prev => [...prev, notification]);
            }, [activeProfile, myProfileId, loggedUserProfile, currentProfile.label]);

            const deleteNotification = useCallback((notificationId) => {
                if (!myProfileId) return;
                setNotifications(prev => prev.filter(notification =>
                    !(notification.id === notificationId && notification.toProfileId === myProfileId)
                ));
            }, [myProfileId]);

            const clearAllNotifications = useCallback(() => {
                if (!myProfileId) return;
                setNotifications(prev => prev.filter(n => n.toProfileId !== myProfileId));
            }, [myProfileId]);

            const openBookFromNotification = useCallback((notification) => {
                if (!notification.bookKey && !notification.bookId) return;
                setNotificationsOpen(false);
                const match = notification.bookKey
                    ? customBooks.find(b => getBookKey(b) === notification.bookKey)
                    : customBooks.find(b => b.id === notification.bookId);
                if (match) setSelectedBook(match);
            }, [customBooks]);

            const sendChatMessage = useCallback(() => {
                const text = chatInput.trim();
                if (!text || !otherProfile) return;
                const now = Date.now();
                const newMessage = {
                    id: `msg-${now}-${Math.random().toString(36).slice(2, 8)}`,
                    from: activeProfile,
                    to: otherProfile.id,
                    text,
                    createdAt: now,
                    readBy: {
                        [activeProfile]: true,
                        [otherProfile.id]: false
                    }
                };
                setChatMessages(prev => [...prev, newMessage]);
                setChatInput('');
            }, [chatInput, otherProfile, activeProfile]);

            const formatChatTime = (timestamp) => {
                if (!timestamp) return '';
                try {
                    return new Date(timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                } catch {
                    return '';
                }
            };

            const addBookComment = useCallback((bookId, text) => {
                const cleanText = (text || '').trim();
                if (!cleanText) return;
                const targetBook = customBooks.find(book => book.id === bookId);
                const bookKey = targetBook ? getBookKey(targetBook) : bookId;
                const bookTitle = targetBook?.title || 'um livro';
                const commenterLabel = loggedUserProfile?.label || currentProfile.label;
                const newComment = {
                    id: `comment-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
                    authorProfileId: myProfileId || activeProfile,
                    authorProfileLabel: commenterLabel,
                    text: cleanText,
                    createdAt: Date.now()
                };

                setCommentsByBook(prev => {
                    const currentComments = Array.isArray(prev[bookKey]) ? prev[bookKey] : [];
                    return {
                        ...prev,
                        [bookKey]: [...currentComments, newComment]
                    };
                });
                if (myProfileId) {
                    const recipientProfile = PROFILE_OPTIONS.find(p => p.id !== myProfileId);
                    if (recipientProfile) {
                        pushNotification({
                            toProfileId: recipientProfile.id,
                            type: 'comment',
                            bookId,
                            bookKey,
                            text: `${commenterLabel} comentou em ${bookTitle}`
                        });
                    }
                }
            }, [activeProfile, myProfileId, loggedUserProfile, currentProfile.label, otherProfile, customBooks, pushNotification]);

            const deleteBookComment = useCallback((bookKey, commentId) => {
                setCommentsByBook(prev => {
                    const currentComments = Array.isArray(prev[bookKey]) ? prev[bookKey] : [];
                    const filtered = currentComments.filter(comment => comment.id !== commentId);
                    const next = { ...prev };
                    if (filtered.length === 0) {
                        delete next[bookKey];
                    } else {
                        next[bookKey] = filtered;
                    }
                    return next;
                });
            }, []);

            const clearChatConversation = useCallback(async () => {
                if (!window.confirm('Tem certeza que deseja limpar toda a conversa do chat?')) return;
                setChatMessages([]);
                setChatInput('');
                if (user) {
                    await saveToCloud(CHAT_STORAGE_KEY, []);
                    localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify([]));
                }
            }, [user]);

            useEffect(() => {
                localStorage.setItem(ACTIVE_PROFILE_KEY, activeProfile);
                isProfileSwitchingRef.current = true;
                // Reseta estados para forçar reload limpo ao trocar perfil
                setIsInitialized(false);
                setCustomBooks([]);
                setReadStatus({});
                setDownloadStatus({});
                setCustomCovers({});
                setRemovedInitialIds([]);
                setReadingOrder([]);
            }, [activeProfile]);

            useEffect(() => {
                if (!showProfileMenu) return;

                const handleOutsideClick = (event) => {
                    if (profileMenuRef.current && !profileMenuRef.current.contains(event.target)) {
                        setShowProfileMenu(false);
                    }
                };

                document.addEventListener('mousedown', handleOutsideClick);
                return () => document.removeEventListener('mousedown', handleOutsideClick);
            }, [showProfileMenu]);

            useEffect(() => {
                if (!notificationsOpen) return;

                const handleOutsideClick = (event) => {
                    if (notificationsPanelRef.current && !notificationsPanelRef.current.contains(event.target)) {
                        setNotificationsOpen(false);
                    }
                };

                document.addEventListener('mousedown', handleOutsideClick);
                return () => document.removeEventListener('mousedown', handleOutsideClick);
            }, [notificationsOpen]);

            // Auto-detecta perfil com base no nome da conta Google apenas no login inicial
            const hasAutoDetected = useRef(false);
            useEffect(() => {
                if (!user) {

                const matched = PROFILE_OPTIONS.find(p => p.label.toLowerCase() === firstName);
                if (matched) {
                    setActiveProfile(matched.id);
                }
            }, [user]);

            // Monitora estado de autenticação
            useEffect(() => {
                if (!window.auth) {
                    setAuthLoading(false);
                    return;
                }

                const unsubscribe = window.onAuthStateChanged(window.auth, (user) => {
                    setUser(user);
                    setAuthLoading(false);
                });

                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) {
                    setChatMessages([]);
                    setChatInitialized(false);
                    setChatOpen(false);
                    setCommentsByBook({});
                    setCommentsInitialized(false);
                    setNotifications([]);
                    setNotificationsInitialized(false);
                    setNotificationsOpen(false);
                    return;
                }

                let active = true;
                (async () => {
                    const loadedChat = await loadFromCloud(CHAT_STORAGE_KEY, []);
                    const loadedComments = await loadFromCloud(COMMENTS_STORAGE_KEY, {});
                    const loadedNotifications = await loadFromCloud(NOTIFICATIONS_STORAGE_KEY, []);
                    if (!active) return;
                    setChatMessages(Array.isArray(loadedChat) ? loadedChat : []);
                    setChatInitialized(true);
                    setCommentsByBook(loadedComments && typeof loadedComments === 'object' ? loadedComments : {});
                    setCommentsInitialized(true);
                    setNotifications(Array.isArray(loadedNotifications) ? loadedNotifications : []);
                    setNotificationsInitialized(true);
                })();

                return () => {
                    active = false;
                };
            }, [user]);

            useEffect(() => {
                if (!user || !chatInitialized) return;
                saveToCloud(CHAT_STORAGE_KEY, chatMessages);
            }, [chatMessages, user, chatInitialized]);

            useEffect(() => {
                if (!user || !commentsInitialized) return;
                saveToCloud(COMMENTS_STORAGE_KEY, commentsByBook);
            }, [commentsByBook, user, commentsInitialized]);

            useEffect(() => {
                if (!user || !notificationsInitialized) return;

            }, [notifications, user, notificationsInitialized]);

            useEffect(() => {

            }, [chatOpen, activeProfile, markChatAsRead]);

            useEffect(() => {
                if (!notificationsOpen) return;
                markNotificationsAsRead();
            }, [notificationsOpen, myProfileId, markNotificationsAsRead]);

            useEffect(() => {
                if (previousChatUnreadRef.current === null) {

            }, [chatUnreadCount, playSubtleMessageBeep]);

            useEffect(() => {
                if (!genreMenuItems.includes(activeGenre)) {
                    setActiveGenre('Todos');
                }
            }, [genreMenuItems, activeGenre]);

            useEffect(() => {
                if (!user || !isInitialized || viewMode !== 'amazon') return;

                let cancelled = false;
                const NON_BOOK_PATTERN = /(r\$\s*\d|figurinhas|album de figurinhas|kit|envelopes|copa do mundo|xbox|playstation|camiseta|funko|caneca|caderno|agenda|calendario|poster)/i;
                const normalizeText = (value = '') =>
                    value
                        .toLowerCase()
                        .normalize('NFD')
                        .replace(/[\u0300-\u036f]/g, '')
                        .replace(/[^a-z0-9\s]/g, ' ')
                        .replace(/\s+/g, ' ')
                        .trim();

                const buildBookKey = (title = '', author = '') => `${normalizeText(title)}|${normalizeText(author)}`;
                const catalogKeySet = new Set(
                    customBooks
                        .map(book => buildBookKey(book?.title || '', book?.author || ''))
                        .filter(key => key && key !== '|')
                );

                const detectGenre = (categories = []) => {
                    if (!Array.isArray(categories) || categories.length === 0) {
                        return profileGenres[0] || 'Livros';
                    }
                    const normalizedCategories = categories.map(category => (category || '').toLowerCase());
                    const pool = profileGenres.length ? profileGenres : DEFAULT_GENRES;
                    const matched = pool.find(genre => {
                        const normalizedGenre = (genre || '').toLowerCase();
                        return normalizedCategories.some(category => category.includes(normalizedGenre));
                    });
                    return matched || (profileGenres[0] || 'Livros');
                };

                const scoreTitleMatch = (sourceTitle, candidateTitle) => {
                    const source = normalizeText(sourceTitle);
                    const candidate = normalizeText(candidateTitle);
                    if (!source || !candidate) return 0;
                    if (source === candidate) return 100;
                    if (candidate.includes(source) || source.includes(candidate)) return 70;
                    const sourceTokens = source.split(' ').filter(token => token.length > 2);
                    const candidateTokens = new Set(candidate.split(' ').filter(token => token.length > 2));
                    const common = sourceTokens.filter(token => candidateTokens.has(token)).length;
                    return common * 10;
                };

                const cleanSearchTitle = (title = '') =>
                    title
                        .replace(/\b(edicao|edição|capa dura|brochura|colecao|coleção|comemorativa|box)\b.*$/i, '')
                        .replace(/[:\-].*$/g, '')
                        .trim();

                const simpleHash = (value = '') => {
                    let hash = 0;
                    for (let i = 0; i < value.length; i += 1) {
                        hash = ((hash << 5) - hash) + value.charCodeAt(i);
                        hash |= 0;
                    }
                    return Math.abs(hash);
                };

                const GLOBAL_FALLBACK_CURATION = [
                    { title: '1984', author: 'George Orwell', genre: 'Distopia', publisher: 'Companhia das Letras', coverUrl: 'https://m.media-amazon.com/images/I/71kxa1-0mfL.jpg' },

                    { title: 'Neuromancer', author: 'William Gibson', genre: 'Ficção Científica', publisher: 'Aleph', coverUrl: 'https://m.media-amazon.com/images/I/81zmA8xMr-L.jpg' },
                    { title: 'Assassinato no Expresso do Oriente', author: 'Agatha Christie', genre: 'Thriller', publisher: 'HarperCollins', coverUrl: 'https://m.media-amazon.com/images/I/81ew8x6BfPL.jpg' },
                    { title: 'A Garota no Trem', author: 'Paula Hawkins', genre: 'Thriller', publisher: 'Record', coverUrl: 'https://m.media-amazon.com/images/I/81AFocW+xwL.jpg' },
                    { title: 'Garota Exemplar', author: 'Gillian Flynn', genre: 'Thriller', publisher: 'Intrinseca', coverUrl: 'https://m.media-amazon.com/images/I/81VStYnDGrL.jpg' },
                    { title: 'A Biblioteca da Meia-Noite', author: 'Matt Haig', genre: 'Ficção Literária', publisher: 'Bertrand Brasil', coverUrl: 'https://m.media-amazon.com/images/I/71ls-I6A5KL.jpg' },
                    { title: 'A Vida Invisivel de Addie LaRue', author: 'V.E. Schwab', genre: 'Ficção Literária', publisher: 'Galera', coverUrl: 'https://m.media-amazon.com/images/I/71oeGkR9Q+L.jpg' },
                    { title: 'Pachinko', author: 'Min Jin Lee', genre: 'Ficção Literária', publisher: 'Intrinseca', coverUrl: 'https://m.media-amazon.com/images/I/91a4fTRm4fL.jpg' },
                    { title: 'A Song of Achilles', author: 'Madeline Miller', genre: 'Ficção Literária', publisher: 'Bloomsbury', coverUrl: 'https://m.media-amazon.com/images/I/91fR2x6I3nL.jpg' },
                    { title: 'Orgulho e Preconceito', author: 'Jane Austen', genre: 'Romance Contemporâneo', publisher: 'Principis', coverUrl: 'https://m.media-amazon.com/images/I/81aZ6yP8LUL.jpg' },
                    { title: 'E assim que acaba', author: 'Colleen Hoover', genre: 'Romance Contemporâneo', publisher: 'Galera', coverUrl: 'https://m.media-amazon.com/images/I/91r5G8RxqfL.jpg' },
                    { title: 'Pessoas Normais', author: 'Sally Rooney', genre: 'Romance Contemporâneo', publisher: 'Companhia das Letras', coverUrl: 'https://m.media-amazon.com/images/I/71otnTfW9CL.jpg' },
                    { title: 'Quarta Asa', author: 'Rebecca Yarros', genre: 'Romantasy', publisher: 'Planeta Minotauro', coverUrl: 'https://m.media-amazon.com/images/I/81M8xQnwxvL.jpg' },
                    { title: 'A Serpente e as Asas Feitas de Noite', author: 'Carissa Broadbent', genre: 'Romantasy', publisher: 'Planeta Minotauro', coverUrl: 'https://m.media-amazon.com/images/I/81N4B4Q2JxL.jpg' },
                    { title: 'De Sangue e Cinzas', author: 'Jennifer L. Armentrout', genre: 'Romantasy', publisher: 'Galera', coverUrl: 'https://m.media-amazon.com/images/I/81tmkVf6EFL.jpg' },
                    { title: 'O Nome do Vento', author: 'Patrick Rothfuss', genre: 'Fantasia', publisher: 'Arqueiro', coverUrl: 'https://m.media-amazon.com/images/I/91b0C2YNSrL.jpg' },
                    { title: 'Priory da Laranjeira', author: 'Samantha Shannon', genre: 'Fantasia', publisher: 'Rocco', coverUrl: 'https://m.media-amazon.com/images/I/91-1I6SxzsL.jpg' },
                    { title: 'A Guerra dos Tronos', author: 'George R.R. Martin', genre: 'Fantasia', publisher: 'Suma', coverUrl: 'https://m.media-amazon.com/images/I/91+1SUO3vUL.jpg' }
                ];

                const matchesProfileGenre = (book) => {
                    if (profileGenres.length === 0) return true;
                    const genre = (book?.genre || '').trim();
                    const isDistopia = !!book?.isDistopia;
                    return profileGenres.includes(genre) || (isDistopia && profileGenres.includes('Distopia'));
                };

                const buildLocalCuratedFallback = () => {
                    const onlyNotInCatalog = (items) =>
                        items.filter(book => {
                            const key = buildBookKey(book?.title || '', book?.author || '');
                            return key && key !== '|' && !catalogKeySet.has(key);
                        });

                    const externalPool = onlyNotInCatalog(GLOBAL_FALLBACK_CURATION);
                    const seedPool = onlyNotInCatalog(SEED_BOOKS);
                    const merged = [...externalPool, ...seedPool];
                    const uniqueMap = new Map();
                    merged.forEach(book => {
                        const title = (book?.title || '').trim();
                        const author = (book?.author || '').trim();
                        if (!title || !author) return;
                        const key = buildBookKey(title, author);
                        if (!uniqueMap.has(key)) uniqueMap.set(key, book);
                    });

                    let items = Array.from(uniqueMap.values());
                    if (profileGenres.length > 0) {
                        const filtered = items.filter(matchesProfileGenre);
                        if (filtered.length > 0) items = filtered;
                    }

                    return items
                        .map(book => {
                            const seed = simpleHash(`${book.title}|${book.author}`);
                            const avg = 4 + ((seed % 10) / 10); // 4.0-4.9
                            const count = 120 + (seed % 5000);
                            const safeCover = (book.coverUrl || '').replace(/^http:\/\//i, 'https://');
                            return {
                                id: `local-${seed}`,
                                title: book.title,
                                author: book.author,
                                genre: book.isDistopia ? 'Distopia' : (book.genre || profileGenres[0] || 'Livros'),
                                publisher: book.publisher || 'Curadoria Local',
                                pages: Number(book.pages) || 0,
                                averageRating: avg,
                                ratingsCount: count,
                                gbAverageRating: avg,
                                gbRatingsCount: count,
                                olAverageRating: 0,
                                olRatingsCount: 0,
                                olWantsCount: 0,
                                curationScore: (avg * 18) + Math.log10(count + 1) * 18,
                                coverUrl: safeCover,
                                coverCandidates: [
                                    `https://covers.openlibrary.org/b/title/${encodeURIComponent(book.title || '')}-L.jpg?default=false`,
                                    safeCover
                                ].filter(Boolean),
                                description: book.synopsis || 'Livro selecionado pela curadoria local.',
                                referenceUrl: `https://www.google.com/search?q=${encodeURIComponent(`${book.title} ${book.author} livro`)}`
                            };
                        })
                        .sort((a, b) => (b.curationScore || 0) - (a.curationScore || 0))
                        .slice(0, 18);
                };

                const findBestGoogleMatch = async (title) => {
                    const queryA = cleanSearchTitle(title) || title;
                    const queries = [
                        `intitle:${queryA}`,
                        queryA
                    ];

                    const candidates = [];
                    for (const query of queries) {
                        const endpoint = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&langRestrict=pt&country=BR&printType=books&maxResults=8`;
                        const response = await fetch(endpoint);
                        if (!response.ok) continue;
                        const data = await response.json();
                        const items = Array.isArray(data?.items) ? data.items : [];
                        candidates.push(...items);
                    }

                    const ranked = candidates
                        .map(item => ({ item, score: scoreTitleMatch(title, item?.volumeInfo?.title || '') }))
                        .sort((a, b) => b.score - a.score);
                    const best = ranked[0]?.item;
                    const bestScore = ranked[0]?.score || 0;
                    return { best, bestScore };
                };

                const fetchOpenLibrarySignals = async (title, author = '') => {
                    try {
                        const query = `https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}&limit=1`;
                        const response = await fetch(query);
                        if (!response.ok) return null;
                        const data = await response.json();
                        const doc = data?.docs?.[0];
                        if (!doc) return null;

                        const olCover = doc.cover_i ? `https://covers.openlibrary.org/b/id/${doc.cover_i}-L.jpg` : '';
                        const ratingsAverage = Number(doc.ratings_average) || 0;
                        const ratingsCount = Number(doc.ratings_count) || 0;
                        const wantsCount = Number(doc.want_to_read_count) || 0;
                        const olWorkKey = doc.key ? `https://openlibrary.org${doc.key}` : '';

                        return {
                            coverUrl: olCover,
                            ratingsAverage,
                            ratingsCount,
                            wantsCount,
                            editionCount: Number(doc.edition_count) || 0,
                            referenceUrl: olWorkKey
                        };
                    } catch {
                        return null;
                    }
                };

                const computeCurationScore = ({ gbAvg = 0, gbCount = 0, olAvg = 0, olCount = 0, wants = 0, editions = 0 }) => {
                    const log = (n) => Math.log10((Number(n) || 0) + 1);
                    const gbScore = (gbAvg * 18) + (log(gbCount) * 20);
                    const olScore = (olAvg * 15) + (log(olCount) * 16) + (log(wants) * 12) + ((Number(editions) || 0) * 0.6);
                    return gbScore + olScore;
                };

                const fetchGenreCandidates = async (genre) => {
                    const endpoint = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(`subject:${genre}`)}&langRestrict=pt&country=BR&printType=books&orderBy=relevance&maxResults=10`;
                    const response = await fetch(endpoint);
                    if (!response.ok) return [];
                    const data = await response.json();
                    const items = Array.isArray(data?.items) ? data.items : [];
                    return items.map(item => {
                        const volume = item?.volumeInfo || {};
                        const title = (volume.title || '').trim();
                        const author = (volume.authors || [])[0] || 'Autor não informado';
                        if (!title || NON_BOOK_PATTERN.test(title)) return null;

                        const isbn = ((volume.industryIdentifiers || []).find(id => id?.identifier)?.identifier || '').trim();
                        const coverCandidates = [
                            volume.imageLinks?.extraLarge,
                            volume.imageLinks?.large,
                            volume.imageLinks?.medium,
                            volume.imageLinks?.thumbnail,
                            volume.imageLinks?.smallThumbnail,
                            isbn ? `https://covers.openlibrary.org/b/isbn/${encodeURIComponent(isbn)}-L.jpg?default=false` : '',
                            `https://covers.openlibrary.org/b/title/${encodeURIComponent(title)}-L.jpg?default=false`
                        ]
                            .map(url => (url || '').replace(/^http:\/\//i, 'https://').trim())
                            .filter(Boolean);
                        const uniqueCoverCandidates = [...new Set(coverCandidates)];
                        const cover = uniqueCoverCandidates[0] || '';
                        return {
                            id: item.id || `${genre}-${title}`,
                            title,
                            author,
                            isbn,
                            genre: detectGenre(volume.categories || [genre]),
                            publisher: volume.publisher || 'Google Books',
                            pages: volume.pageCount || 0,
                            gbAverageRating: Number(volume.averageRating) || 0,
                            gbRatingsCount: Number(volume.ratingsCount) || 0,
                            coverUrl: cover,
                            coverCandidates: uniqueCoverCandidates,
                            description: volume.description || 'Sem descrição disponível.',
                            referenceUrl: `https://www.google.com/search?q=${encodeURIComponent(`${title} ${author} livro`)}`
                        };
                    }).filter(Boolean);
                };

                const enrichWithGoogleBooks = async (candidate) => {
                    try {
                        const { best, bestScore } = await findBestGoogleMatch(candidate.title);
                        const volume = best?.volumeInfo || {};

                        if (!best || bestScore < 28 || NON_BOOK_PATTERN.test(volume.title || '')) {
                            return null;
                        }

                        const author = (volume.authors || [])[0] || 'Autor não informado';
                        const openLibrary = await fetchOpenLibrarySignals(volume.title || candidate.title, author);
                        const isbn = ((volume.industryIdentifiers || []).find(id => id?.identifier)?.identifier || candidate?.isbn || '').trim();
                        const candidateCoverUrls = Array.isArray(candidate?.coverCandidates) ? candidate.coverCandidates : [];
                        const coverCandidates = [
                            volume.imageLinks?.extraLarge,
                            volume.imageLinks?.large,
                            volume.imageLinks?.medium,
                            volume.imageLinks?.thumbnail,
                            volume.imageLinks?.smallThumbnail,
                            openLibrary?.coverUrl || '',
                            ...candidateCoverUrls,
                            isbn ? `https://covers.openlibrary.org/b/isbn/${encodeURIComponent(isbn)}-L.jpg?default=false` : '',
                            `https://covers.openlibrary.org/b/title/${encodeURIComponent(volume.title || candidate.title)}-L.jpg?default=false`
                        ]
                            .map(url => (url || '').replace(/^http:\/\//i, 'https://').trim())
                            .filter(Boolean);
                        const uniqueCoverCandidates = [...new Set(coverCandidates)];
                        const coverUrl = uniqueCoverCandidates[0] || '';
                        if (!coverUrl || !author || author === 'Autor não informado') {
                            return null;
                        }

                        const olAverageRating = openLibrary?.ratingsAverage || 0;
                        const olRatingsCount = openLibrary?.ratingsCount || 0;
                        const olWantsCount = openLibrary?.wantsCount || 0;
                        const olEditionCount = openLibrary?.editionCount || 0;

                        const gbAverageRating = Number(volume.averageRating) || 0;
                        const gbRatingsCount = Number(volume.ratingsCount) || 0;
                        const communityCount = gbRatingsCount + olRatingsCount;
                        const communityRating = communityCount > 0
                            ? ((gbAverageRating * gbRatingsCount) + (olAverageRating * olRatingsCount)) / communityCount
                            : gbAverageRating || olAverageRating || 0;

                        const finalGenre = detectGenre(volume.categories || []);
                        return {
                            ...candidate,
                            id: best?.id || `${candidate.title}-${author}`,
                            title: volume.title || candidate.title,
                            author,
                            isbn,
                            genre: finalGenre,
                            publisher: volume.publisher || 'Amazon',
                            pages: volume.pageCount || 0,
                            averageRating: communityRating,
                            ratingsCount: communityCount,
                            gbAverageRating,
                            gbRatingsCount,
                            olAverageRating,
                            olRatingsCount,
                            olWantsCount,
                            curationScore: computeCurationScore({ gbAvg: gbAverageRating, gbCount: gbRatingsCount, olAvg: olAverageRating, olCount: olRatingsCount, wants: olWantsCount, editions: olEditionCount }),
                            coverUrl: coverUrl || openLibrary?.coverUrl || '',
                            coverCandidates: uniqueCoverCandidates,
                            description: volume.description || 'Sem descrição disponível.',
                            referenceUrl: openLibrary?.referenceUrl || `https://www.google.com/search?q=${encodeURIComponent(`${volume.title || candidate.title} ${author} livro`)}`
                        };
                    } catch {
                        return null;
                    }
                };

                const fetchHighlights = async () => {
                    setIsLoadingAmazonHighlights(true);
                    setAmazonHighlightsError('');
                    try {
                        const targetGenres = profileGenres.length > 0 ? profileGenres.slice(0, 6) : DEFAULT_GENRES.slice(0, 6);
                        const grouped = await Promise.all(targetGenres.map(fetchGenreCandidates));
                        const merged = grouped.flat();

                        const uniqueMap = new Map();
                        merged.forEach(book => {
                            const dedupeKey = buildBookKey(book.title || '', book.author || '');
                            if (!uniqueMap.has(dedupeKey)) uniqueMap.set(dedupeKey, book);
                        });

                        const baseBooks = Array.from(uniqueMap.values()).slice(0, 30);
                        const enrichedBooks = await Promise.all(baseBooks.map(enrichWithGoogleBooks));

                        const validBooks = enrichedBooks
                            .filter(Boolean)
                            .filter(book => {
                                const key = buildBookKey(book?.title || '', book?.author || '');
                                return key && key !== '|' && !catalogKeySet.has(key);
                            })
                            .sort((a, b) => (b.curationScore || 0) - (a.curationScore || 0));
                        if (validBooks.length === 0) {
                            const localFallback = buildLocalCuratedFallback();
                            if (localFallback.length > 0) {
                                if (!cancelled) {
                                    setAmazonHighlights(localFallback);
                                    setAmazonHighlightsError('');
                                }
                                return;
                            }
                            throw new Error('Nenhum livro validado para curadoria.');
                        }

                        if (!cancelled) setAmazonHighlights(validBooks.slice(0, 18));
                    } catch (error) {
                        if (!cancelled) {
                            console.error('Erro ao buscar livros em alta:', error);
                            const localFallback = buildLocalCuratedFallback();
                            if (localFallback.length > 0) {
                                setAmazonHighlights(localFallback);
                                setAmazonHighlightsError('');
                            } else {
                                setAmazonHighlightsError('Não foi possível carregar a curadoria de livros agora. Tente novamente em instantes.');
                            }
                        }
                    } finally {
                        if (!cancelled) setIsLoadingAmazonHighlights(false);
                    }
                };

                fetchHighlights();
                return () => {
                    cancelled = true;
                };
            }, [user, isInitialized, viewMode, profileGenres, activeProfile, customBooks]);

            const loginWithGoogle = async () => {
                try {
                    await window.signInWithPopup(window.auth, window.provider);
                } catch (error) {
                    console.error('Erro no login:', error);
                    const code = error?.code || 'erro-desconhecido';
                    const message = error?.message || 'Falha ao autenticar com Google.';

                    if (code === 'auth/unauthorized-domain') {
                        alert(
                            'Domínio não autorizado no Firebase.\n\n' +
                            'Adicione estes domínios em Authentication > Settings > Authorized domains:\n' +
                            '- localhost\n' +
                            '- 127.0.0.1\n\n' +
                            'Depois recarregue a página e tente novamente.'
                        );
                        return;
                    }

                    if (code === 'auth/popup-blocked' || code === 'auth/popup-closed-by-user') {
                        alert('O popup de login foi bloqueado/fechado. Permita popups para este site e tente novamente.');
                        return;
                    }

                    alert(`Erro no login (${code}): ${message}`);

            useEffect(() => {
                if (!user) return; // Só carrega dados se estiver logado

                setIsInitialized(false);

                const loadData = async () => {
                    const r = await loadFromCloud(profileKeys.read, {});
                    const d = await loadFromCloud(profileKeys.download, {});
                    const c = await loadFromCloud(profileKeys.covers, {});
                    let cb = await loadFromCloud(profileKeys.custom, []);
                    let rem = [];
                    const q = await loadFromCloud(profileKeys.queue, []);
                    
                    // Se não há livros no banco, carrega SEED_BOOKS só para o perfil principal (Gianny)
                    if (!cb || cb.length === 0) {
                        if (activeProfile === 'perfil-1') {
                            // Recupera catálogo legado da Gianny (antes da separação por perfis), se existir
                            const legacyCustomCandidates = ['libdb-custom-v1', 'libdb-custom'];
                            let recoveredLegacy = [];
                            for (const legacyKey of legacyCustomCandidates) {
                                const legacyBooks = await loadFromCloud(legacyKey, []);
                                if (Array.isArray(legacyBooks) && legacyBooks.length > 0) {
                                    recoveredLegacy = legacyBooks;
                                    console.log('📚 Catálogo legado da Gianny recuperado da chave:', legacyKey);
                                    break;
                                }
                            }

                            if (recoveredLegacy.length > 0) {
                                cb = recoveredLegacy;
                                await saveToCloud(profileKeys.custom, cb);
                                localStorage.setItem(profileKeys.custom, JSON.stringify(cb));
                            } else {
                                cb = SEED_BOOKS;
                                console.log('📚 Carregando ' + SEED_BOOKS.length + ' livros iniciais no banco de dados...');
                            }
                        } else {
                            cb = LAISA_DEMO_BOOKS;
                            console.log('📚 Carregando livro de demonstração para o perfil da Laisa.');
                        }
                    } else {
                        console.log('📚 Exibindo ' + cb.length + ' livros do banco de dados...');
                    }
                    
                    setReadStatus(r); setDownloadStatus(d); setCustomCovers(c); 
                    setCustomBooks(cb); setRemovedInitialIds(rem); setReadingOrder(q);
                    setIsInitialized(true);
                    isProfileSwitchingRef.current = false;
                };
                loadData();
            }, [user, profileKeys]);

            // Persistência Automática (Nuvem + LocalStorage)
            useEffect(() => {
                if (!isInitialized || !user || isProfileSwitchingRef.current) return; // Só salva se estiver logado, inicializado e sem troca em andamento

                // Salva na nuvem
                saveToCloud(profileKeys.read, readStatus);
                saveToCloud(profileKeys.download, downloadStatus);
                saveToCloud(profileKeys.covers, customCovers);
                saveToCloud(profileKeys.custom, customBooks);
                saveToCloud(profileKeys.removed, removedInitialIds);
                saveToCloud(profileKeys.queue, readingOrder);
                
                // Backup no localStorage
                localStorage.setItem(profileKeys.read, JSON.stringify(readStatus));
                localStorage.setItem(profileKeys.download, JSON.stringify(downloadStatus));
                localStorage.setItem(profileKeys.covers, JSON.stringify(customCovers));
                localStorage.setItem(profileKeys.custom, JSON.stringify(customBooks));
                localStorage.setItem(profileKeys.removed, JSON.stringify(removedInitialIds));
                localStorage.setItem(profileKeys.queue, JSON.stringify(readingOrder));

                const alreadyExists = customBooks.some(book =>
                    (book.title || '').trim().toLowerCase() === (item.title || '').trim().toLowerCase() &&
                    (book.author || '').trim().toLowerCase() === (item.author || '').trim().toLowerCase()
                );

                if (alreadyExists) {
                    alert('Esse livro já existe no catálogo deste perfil.');
                    return;
                }

                const normalizedGenre = (item.genre || 'Fantasia').trim();
                const isDistopia = normalizedGenre.toLowerCase() === 'distopia';

                const newBook = {
                    id: `${activeProfile}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
                    title: item.title.trim(),
                    author: item.author.trim(),
                    genre: normalizedGenre,
                    publisher: item.publisher || 'Amazon',
                    pages: Number(item.pages) || 0,
                    synopsis: item.description || 'Livro adicionado a partir de Em Alta Amazon.',
                    coverUrl: item.coverUrl || 'https://via.placeholder.com/300x450?text=Sem+Capa',
                    tags: ['amazon', 'em alta'],
                    series: '',
                    volume: 0,
                    totalVolumes: 0,
                    isSeries: false,
                    epubUrl: '',
                    epubFileName: '',
                    epubKey: null,
                    epubPath: null,
                    epubOrigin: null,
                    isBrazilianAuthor: false,
                    isDistopia
                };

                setCustomBooks(prev => [newBook, ...prev]);
                setViewMode('grid');
                setActiveGenre('Todos');
                alert('Livro adicionado ao catálogo com sucesso.');
            }, [ensureOwnProfileWrite, customBooks, activeProfile]);

            const handleEditBook = useCallback((updatedBook) => {
                setCustomBooks(prev => prev.map(book => (book.id === updatedBook.id ? { ...book, ...updatedBook } : book)));
                setShowAddBook(false);
                setEditingBook(null);
                setSelectedBook(null);
            }, []);

            const handleUploadEpubForBook = useCallback(async (bookId, file) => {
                const currentBook = customBooks.find(book => book.id === bookId);
                const uploaded = await uploadEpubToCloud(bookId, file, currentBook?.epubPath || currentBook?.epubKey || null);
                setCustomBooks(prev => prev.map(book => (
                    book.id === bookId
                        ? { ...book, epubKey: uploaded.epubKey, epubPath: uploaded.epubPath, epubFileName: uploaded.fileName, epubUrl: uploaded.url, epubOrigin: uploaded.epubOrigin }

                )));
                setSelectedBook(prev => (
                    prev && prev.id === bookId
                        ? { ...prev, epubKey: uploaded.epubKey, epubPath: uploaded.epubPath, epubFileName: uploaded.fileName, epubUrl: uploaded.url, epubOrigin: uploaded.epubOrigin }

                ));
                return uploaded;
            }, [customBooks]);

            const handleToggleRead = useCallback((id) => setReadStatus(p => ({ ...p, [id]: !p[id] })), []);

            const handleToggleQueue = useCallback((id) => setReadingOrder(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]), []);

                if (isCustom) setCustomBooks(p => p.filter(b => b.id !== id));

                setReadingOrder(p => p.filter(bId => bId !== id));
                // Remove o status de leitura e download quando deleta o livro

                    if (activeGenre === "Distopia") matchesGenre = b.isDistopia;
                    else if (activeGenre !== "Todos") matchesGenre = b.genre === activeGenre;

                    const matchesRead = filterRead ? readStatus[b.id] : true;
                    const matchesDownloaded = filterDownloaded ? downloadStatus[b.id] : true;
                    return matchesSearch && matchesGenre && matchesRead && matchesDownloaded;

            }, [searchQuery, activeGenre, filterRead, filterDownloaded, readStatus, downloadStatus, viewMode, readingOrder, allBooksCombined]);

                .map(part => part[0].toUpperCase())
                .join('') || 'L';

            const getCoverUrl = (b) => customCovers[b.id] || b.coverUrl || `https://covers.openlibrary.org/b/isbn/${b.isbn}-L.jpg`;

            return (

                                <p className="text-gray-600">Carregando...</p>
                            </div>

                                        src="https://i.imgur.com/FGFYV7A.png"
                                        alt="Biblioteca do Amanhã"
                                        className="animate-fade-in mx-auto"
                                        referrerPolicy="no-referrer"
                                        crossOrigin="anonymous"
                                        onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/260x86/1E3A5F/FFFFFF?text=Biblioteca+do+Amanh%C3%A3'; }}
                                    />

                                        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                    </svg>

                            </div>

                    <header className={`${activeProfile === 'perfil-2' ? 'bg-[#3B0764]' : 'bg-[#1E3A5F]'} text-white pt-16 md:pt-24 pb-10 md:pb-12 px-6 relative text-center md:text-left`}>
                        <div className="absolute inset-0 overflow-hidden pointer-events-none">
