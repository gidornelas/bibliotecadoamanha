                                                    ) : (
                                                        sortedNotifications.slice(0, 30).map((notification) => {
                                                            const isUnread = notification.toProfileId === myProfileId && !notification.readBy?.[myProfileId];
                                                            const isClickable = notification.type === 'comment' && (notification.bookKey || notification.bookId);
                                                            return (
                                                                <div key={notification.id}
                                                                    className={`rounded-xl border px-2.5 py-2 ${isUnread ? 'border-violet-200 bg-violet-50/50' : 'border-gray-100 bg-gray-50'} ${isClickable ? 'cursor-pointer hover:border-violet-300 transition-colors' : ''}`}
                                                                    onClick={isClickable ? () => openBookFromNotification(notification) : undefined}
                                                                >
                                                                    <div className="flex items-start justify-between gap-2">
                                                                        <div className="min-w-0 flex-1">
                                                                            <p className="text-[10px] text-gray-400 lowercase font-semibold">{notification.fromProfileLabel || 'perfil'}</p>
                                                                            <p className={`text-[11px] text-[#1E3A5F] leading-relaxed ${isClickable ? 'underline decoration-dotted underline-offset-2' : ''}`}>{notification.text}</p>
                                                                            <p className="mt-1 text-[10px] text-gray-400">{formatChatTime(notification.createdAt)}</p>
                                                                        </div>
                                                                        <button
                                                                            type="button"
                                                                            onClick={(e) => { e.stopPropagation(); deleteNotification(notification.id); }}
                                                                            className="shrink-0 p-1 rounded-md text-gray-300 hover:text-red-400 hover:bg-red-50 transition-colors"
                                                                            title="Apagar notificação"
                                                                        >
                                                                            <Icon name="x" className="w-3.5 h-3.5" />
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>)}
                                    <button disabled={viewMode === 'amazon'} onClick={() => setFilterRead(!filterRead)} className={`flex-1 xl:flex-none px-6 py-2.5 rounded-xl text-xs font-bold transition-all border disabled:opacity-50 ${filterRead ? 'bg-[#1E3A5F] text-white border-transparent' : 'bg-white text-gray-400 border-gray-100'}`}>Lido</button>
                                    <button disabled={viewMode === 'amazon'} onClick={() => setFilterDownloaded(!filterDownloaded)} className={`flex-1 xl:flex-none px-6 py-2.5 rounded-xl text-xs font-bold transition-all border disabled:opacity-50 ${filterDownloaded ? 'bg-[#14B8A6] text-white border-transparent' : 'bg-white text-gray-400 border-gray-100'}`}>Baixado</button>
                                </div>
                            </div>

                            <div className="genre-nav-row no-scrollbar">
                                {genreMenuItems.map(g => (
                                    <button key={g} onClick={() => handleGenreFilter(g)} className={`px-5 py-2 rounded-full text-[11px] font-black uppercase tracking-widest whitespace-nowrap transition-all border ${activeGenre === g ? "bg-[#14B8A6] text-white border-[#14B8A6] shadow-md shadow-[#14B8A6]/20" : "bg-white text-gray-400 border-gray-100 hover:border-teal-100 hover:text-teal-600"}`}>{g}</button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    <main key={activeProfile + viewMode} className={`max-w-7xl mx-auto px-6 py-12 ${profileTransitionStage === 'out' ? 'profile-transition-out' : ''} ${profileTransitionStage === 'in' ? 'profile-transition-in' : ''}`} style={{ pointerEvents: profileTransitionStage === 'out' ? 'none' : 'auto' }}>
                        {viewMode === 'amazon' ? (
                            <div className="max-w-6xl mx-auto">
                                <div className="mb-6 rounded-2xl border border-[#1E3A5F]/10 bg-[#1E3A5F]/[0.03] p-4 md:p-5">
                                    <h3 className="text-[12px] md:text-sm font-black uppercase tracking-widest text-[#1E3A5F]">Livros Em Alta no Geral</h3>
                                    <p className="text-xs text-gray-500 mt-2">Curadoria baseada em recomendação e avaliação (Google Books + Open Library), alinhada aos gêneros do perfil: {profileGenres.length ? profileGenres.join(', ') : 'sem gêneros cadastrados ainda'}.</p>
                                </div>

                                {isLoadingAmazonHighlights ? (
                                    <div className="py-16 text-center text-sm text-gray-500">Carregando curadoria de livros...</div>
                                ) : amazonHighlightsError ? (
                                    <div className="py-16 text-center text-sm text-red-400">{amazonHighlightsError}</div>
                                ) : amazonHighlights.length === 0 ? (
                                    <div className="py-16 text-center text-sm text-gray-500">Nenhuma sugestão encontrada no momento.</div>
                                ) : (
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4">
                                        {amazonHighlights.map((item) => (
                                            <div key={item.id} className="bg-white rounded-xl border border-gray-100 overflow-hidden shadow-sm hover:shadow-md transition-shadow flex flex-col">
                                                <div className="aspect-[3/4] bg-gray-100 overflow-hidden">
                                                    <CuratedCoverImage item={item} />
                                                </div>
                                                <div className="p-2.5 flex-1 flex flex-col">
                                                    <span className="text-[9px] font-black uppercase tracking-widest text-[#14B8A6]">{item.genre}</span>
                                                    <h4 className="mt-1 min-h-[2.25rem] text-[12px] font-bold text-[#1E3A5F] line-clamp-2">{item.title}</h4>
                                                    <p className="min-h-[1rem] text-[10px] text-gray-500 line-clamp-1">{item.author}</p>
                                                    <div className="min-h-[1rem] mt-1">
                                                        {item.averageRating > 0 && (
                                                            <p className="text-[10px] text-amber-500 font-bold">
                                                                {'★'.repeat(Math.round(item.averageRating)).padEnd(5, '☆')}
                                                                <span className="text-gray-400 font-semibold ml-1">{item.averageRating.toFixed(1)}{item.ratingsCount ? ` (${item.ratingsCount})` : ''}</span>
                                                            </p>
                                                        )}
                                                    </div>
                                                    <div className="mt-auto pt-2.5">
                                                        <button
                                                            type="button"
                                                            onClick={() => window.open(item.referenceUrl || `https://www.google.com/search?q=${encodeURIComponent(`${item.title} ${item.author} livro`)}`, '_blank')}
                                                            className="w-full px-2.5 py-1.5 rounded-lg bg-[#1E3A5F] text-white text-[10px] font-bold hover:bg-[#162f4d] transition-colors"
                                                        >
                                                            Ver Referencia
                                                        </button>
                                                        <button
                                                            type="button"
                                                            onClick={() => addAmazonHighlightToCatalog(item)}
                                                            className="mt-1.5 w-full px-2.5 py-1.5 rounded-lg bg-[#14B8A6] text-white text-[10px] font-bold hover:bg-[#0fae9d] transition-colors"
                                                        >
                                                            Adicionar ao Catalogo
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ) : (
                        <>
                        {viewMode === 'queue' && (
                            <div className="max-w-3xl mx-auto mb-6 bg-white border border-gray-100 rounded-2xl p-4 md:p-5 shadow-sm">
                                <div className="flex items-center justify-between mb-2">
                                    <h3 className="text-[11px] md:text-xs font-black uppercase tracking-widest text-[#1E3A5F]">Progresso da Lista</h3>
                                    <span className="text-[11px] font-bold text-gray-500">{queueRead}/{queueTotal} lidos</span>
                                </div>
                                <div className="w-full h-2.5 bg-gray-100 rounded-full overflow-hidden">
                                    <div
                                        className="h-full bg-gradient-to-r from-[#14B8A6] to-[#1E3A5F] transition-all duration-500"
                                        style={{ width: `${queueProgress}%` }}
                                    />
                                </div>
                                <p className="mt-2 text-[11px] text-gray-400">{queueProgress}% concluido</p>
                            </div>
                        )}
                        <div className={viewMode === 'queue' ? "flex flex-col gap-6 max-w-3xl mx-auto" : "grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-8"}>
                            {viewMode === 'grid' && !filterRead && !filterDownloaded && isViewingOwnProfile && (
                                <button
                                    onClick={() => { setEditingBook(null); setShowAddBook(true); }}
                                    className="book-card-hover group relative rounded-[24px] border-2 border-dashed border-[#14B8A6]/35 bg-white/80 hover:bg-white cursor-pointer flex flex-col items-center justify-center min-h-[300px] md:min-h-[360px] transition-all hover:border-[#14B8A6] hover:shadow-xl"
                                >
                                    <div className="w-14 h-14 rounded-full bg-[#14B8A6] text-white flex items-center justify-center shadow-lg shadow-[#14B8A6]/30 mb-4">
                                        <Icon name="plus" className="w-7 h-7" />
                                    </div>
                                    <p className="text-sm md:text-base font-black tracking-wide text-[#1E3A5F] uppercase">Adicionar Livro</p>
                                    <p className="text-xs text-gray-400 mt-2 px-6">Crie uma nova ficha e salve direto no banco</p>
                                </button>
                            )}

                            {filteredBooks.map((b, idx) => b && (
                                <BookCard 
                                    key={b.id} book={b} isRead={readStatus[b.id]} isDownloaded={downloadStatus[b.id]} 
                                    coverUrl={getCoverUrl(b)} onClick={() => setSelectedBook(b)}
                                    hasRemoteEpub={!!remoteEpubAvailability[b.id]}
                                    commentsCount={(commentsByBook[getBookKey(b)] || []).length}
                                    isQueueMode={viewMode === 'queue'} queueIndex={idx} totalInQueue={readingOrder.length}
                                    onMove={(idx, dir) => {
                                        const n = [...readingOrder];
                                        const t = idx + dir;
                                        if (t >= 0 && t < n.length) {
                                            const [m] = n.splice(idx, 1);
                                            n.splice(t, 0, m);
                                            setReadingOrder(n);
                                        }
                                    }} 
                                    onRemoveFromQueue={() => handleToggleQueue(b.id)} 
                                    onGenreClick={handleGenreFilter}
                                    showImportButton={canImportFromViewedProfile}
                                    onImportToMine={importBookToMyProfile}
                                />
                            ))}
                        </div>
                        </>
                        )}
                    </main>

                    {selectedBook && (
                        <DetailModal 
                            book={selectedBook} onClose={() => setSelectedBook(null)} 
                            isRead={readStatus[selectedBook.id]} isDownloaded={downloadStatus[selectedBook.id]} isInQueue={readingOrder.includes(selectedBook.id)}
                            hasRemoteEpub={!!remoteEpubAvailability[selectedBook.id]}
                            coverUrl={getCoverUrl(selectedBook)} 
                            onToggleRead={() => { if (!ensureOwnProfileWrite()) return; handleToggleRead(selectedBook.id); }}
                            onToggleDownload={() => { if (!ensureOwnProfileWrite()) return; handleToggleDownload(selectedBook.id); }} 
                            onToggleQueue={() => { if (!ensureOwnProfileWrite()) return; handleToggleQueue(selectedBook.id); }}
                            onSetCover={(id, u) => setCustomCovers(p => ({ ...p, [id]: u }))} 
                            onRemoveCover={(id) => setCustomCovers(p => { const n = { ...p }; delete n[id]; return n; })} 
                            hasCustomCover={!!customCovers[selectedBook.id]}
                            isViewingOwnProfile={isViewingOwnProfile}
                            bookComments={(commentsByBook[getBookKey(selectedBook)] || []).slice().sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0))}
                            onAddComment={addBookComment}
                            onDeleteComment={(bookId, commentId) => {
                                const book = customBooks.find(b => b.id === bookId) || selectedBook;
                                deleteBookComment(getBookKey(book), commentId);
                            }}
                            currentProfileLabel={loggedUserProfile?.label || currentProfile.label}
                            currentProfileId={myProfileId || activeProfile}
                            onEdit={() => { if (!ensureOwnProfileWrite()) return; setEditingBook(selectedBook); setShowAddBook(true); }}
                            onUploadEpub={(file) => {
                                if (!ensureOwnProfileWrite()) {
                                    return Promise.resolve();
                                }
                                return handleUploadEpubForBook(selectedBook.id, file);
                            }}
                            onDeleteEpub={(bookId) => {
                                if (!ensureOwnProfileWrite()) return;
                                const updatedBooks = customBooks.map(b => (
                                    b.id === bookId
                                        ? { ...b, epubKey: null, epubPath: null, epubFileName: null, epubUrl: null, epubOrigin: null }
                                        : b
                                ));
                                setCustomBooks(updatedBooks);
                                setSelectedBook(prev => (
                                    prev && prev.id === bookId
                                        ? { ...prev, epubKey: null, epubPath: null, epubFileName: null, epubUrl: null, epubOrigin: null }
                                        : prev
                                ));
                                // Salva no Firestore imediatamente
                                saveToCloud(profileKeys.custom, updatedBooks);
                            }}
                            onDelete={() => { if (!ensureOwnProfileWrite()) return; deleteBookFromCatalog(selectedBook.id); }}
                            onGenreClick={handleGenreFilter}
                        />
                    )}

                    {showAddBook && (
                        <AddBookModal
                            initialBook={editingBook}
                            onClose={() => { setShowAddBook(false); setEditingBook(null); }}
                            onSave={editingBook ? handleEditBook : handleAddBook}
                        />
                    )}

                    <div className="fixed right-4 sm:right-6 bottom-4 sm:bottom-6 z-40 flex flex-col items-end gap-3">
                        {chatOpen && (
                            <div className="w-[92vw] sm:w-[360px] h-[68vh] sm:h-[460px] bg-white rounded-3xl border border-gray-200 shadow-2xl shadow-[#1E3A5F]/20 overflow-hidden flex flex-col">
                                <div className="px-4 py-3 border-b border-gray-100 bg-[#1E3A5F] text-white flex items-center justify-between">
                                    <div>
                                        <p className="text-[10px] uppercase tracking-[0.2em] text-white/70 font-black">Chat Entre Perfis</p>
                                        <p className="text-sm font-bold">{currentProfile.label} e {otherProfile?.label || 'Outro perfil'}</p>
                                    </div>
                                    <div className="flex items-center gap-1">
                                        <button
                                            onClick={clearChatConversation}
                                            className="px-2.5 py-1 rounded-md text-[10px] font-black uppercase tracking-wide text-white/85 hover:text-white hover:bg-white/15 transition-colors inline-flex items-center gap-1"
                                            title="Limpar conversa"
                                        >
                                            <Icon name="trash" className="w-3 h-3" />
                                            Limpar
                                        </button>
                                        <button
                                            onClick={() => setChatOpen(false)}
                                            className="p-2 rounded-full hover:bg-white/15 transition-colors"
                                            aria-label="Fechar chat"
                                        >
                                            <Icon name="x" className="w-4 h-4" />
                                        </button>
                                    </div>
                                </div>

                                <div className="flex-1 overflow-y-auto px-3 py-3 bg-[#F8F9FB] space-y-2">
                                    {sortedChatMessages.length === 0 ? (
                                        <div className="h-full flex items-center justify-center text-center text-xs text-gray-400 px-6">
                                            Envie a primeira mensagem para começar a conversa entre os perfis.
                                        </div>
                                    ) : (
                                        sortedChatMessages.map(msg => {
                                            const isMine = msg.from === activeProfile;
                                            const senderLabel = PROFILE_OPTIONS.find(p => p.id === msg.from)?.label || 'Perfil';
                                            return (
                                                <div key={msg.id} className={`flex ${isMine ? 'justify-end' : 'justify-start'}`}>
                                                    <div className={`max-w-[82%] flex flex-col ${isMine ? 'items-end' : 'items-start'}`}>
                                                        <p className="text-[10px] font-semibold lowercase tracking-wide mb-1 px-1 text-gray-400">{senderLabel}</p>
                                                        <div className={`rounded-2xl px-3 py-2 shadow-sm ${isMine ? 'bg-[#1E3A5F] text-white rounded-br-md' : 'bg-[#E6FFFB] text-[#0F766E] border border-[#99F6E4] rounded-bl-md'}`}>
                                                            <p className="text-sm leading-snug whitespace-pre-wrap">{msg.text}</p>
                                                            <p className={`mt-1 text-[10px] ${isMine ? 'text-white/70' : 'text-[#0F766E]/70'}`}>{formatChatTime(msg.createdAt)}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>

                                <form
                                    onSubmit={(e) => {
                                        e.preventDefault();
                                        sendChatMessage();
                                    }}
                                    className="p-3 border-t border-gray-100 bg-white flex items-center gap-2"
                                >
                                    <input
                                        value={chatInput}
                                        onChange={(e) => setChatInput(e.target.value)}
                                        maxLength={400}
                                        placeholder={`Mensagem de ${currentProfile.label} para ${otherProfile?.label || 'o outro perfil'}...`}
                                        className="flex-1 px-3 py-2 rounded-xl border border-gray-200 text-sm outline-none focus:ring-2 focus:ring-[#14B8A6]/30"
                                    />
                                    <button
                                        type="submit"
                                        className="px-4 py-2 rounded-xl bg-[#14B8A6] text-white text-sm font-bold hover:bg-[#0fae9d] transition-colors"
                                    >
                                        Enviar
                                    </button>
                                </form>
                            </div>
                        )}

                        <button
                            type="button"
                            onClick={() => {
                                const nextOpen = !chatOpen;
                                setChatOpen(nextOpen);
                                if (nextOpen) markChatAsRead();
                            }}
                            className="relative w-14 h-14 rounded-full bg-[#14B8A6] text-white shadow-xl shadow-[#14B8A6]/35 hover:scale-105 active:scale-95 transition-all flex items-center justify-center"
                            title="Abrir chat entre perfis"
                        >
                            <Icon name="messageCircle" className="w-6 h-6" />
                            {chatUnreadCount > 0 && (
                                <span className="absolute -top-1 -right-1 min-w-[20px] h-5 px-1 rounded-full bg-violet-600 text-white text-[10px] font-black flex items-center justify-center border-2 border-white">
                                    {chatUnreadCount > 99 ? '99+' : chatUnreadCount}
                                </span>
                            )}
                        </button>
                    </div>

                    <footer className="max-w-7xl mx-auto px-6 pb-12 border-t border-gray-100 text-center pt-8">
                        <p className="text-gray-400 text-[10px] tracking-widest uppercase font-black">Biblioteca do Amanhã &copy; 2024</p>
                    </footer>
                    </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
