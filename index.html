        // Configure a URL publica para o proxy de capas (Goodreads/Skoob) em producao.

        window.coverProxyBaseUrl = window.coverProxyBaseUrl || 'https://biblioteca-do-amanha-capas.vercel.app/api/cover';
        window.getCoverProxyBases = () => {
            const fromConfig = String(window.coverProxyBaseUrl || '')
                .split(',')
                .map(value => value.trim())
                .filter(Boolean);

            const sameOriginBase = (window.location?.origin && /^https?:/i.test(window.location.origin))
                ? `${window.location.origin}/api/cover`
                : '';

            const isLocalHost = ['localhost', '127.0.0.1'].includes(window.location?.hostname || '');
            const localDevBase = isLocalHost ? 'http://localhost:8787/cover' : '';

            return [...new Set([...fromConfig, sameOriginBase, localDevBase].filter(Boolean))];
        };
        window.supabaseConfigReady = Boolean(
            supabaseConfig.url &&
            !supabaseConfig.url.includes('SEU-PROJETO') &&
            supabaseConfig.anonKey &&
            !supabaseConfig.anonKey.includes('SUA_ANON_KEY')
        );

        window.ensureSupabaseClient = async () => {
            if (window.supabaseClient) return window.supabaseClient;
            if (!window.supabaseConfigReady) return null;

            for (let i = 0; i < 20; i += 1) {
                const supabaseLib = window.supabase || globalThis.supabase;
                if (supabaseLib?.createClient) {
                    window.supabaseClient = supabaseLib.createClient(supabaseConfig.url, supabaseConfig.anonKey);
                    return window.supabaseClient;
                }
                await new Promise(resolve => setTimeout(resolve, 100));

            return null;

        try {

            window.db = getFirestore(window.FirebaseApp);

            console.warn('⚠️ Firebase não configurado. Usando apenas localStorage.', error);
            window.db = null;

        try {

                window.ensureSupabaseClient()

    </script>

<body class="bg-[#F8F9FB] text-[#111827]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- 0. CONFIGURAÇÃO DO BANCO DE DADOS NA NUVEM ---

        // Funções para salvar/carregar dados do Firebase
        const waitForDb = async () => {
            for (let i = 0; i < 20; i += 1) {
                if (window.db) return true;
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            return false;
        };

        const saveToCloud = async (key, data, setSyncStatus) => {
            try {
                if (!window.db) {
                    const ready = await waitForDb();
                    if (!ready) {
                        if (setSyncStatus) setSyncStatus("offline");
                        localStorage.setItem(key, JSON.stringify(data));
                        return;
                    }
                }

                const userId = window.auth.currentUser ? window.auth.currentUser.uid : 'default-user'; // Para múltiplos usuários, use autenticação
                await setDoc(doc(window.db, 'users', userId, 'data', key), {
                    data: data,
                    timestamp: new Date().toISOString()
                });
                if (setSyncStatus) setSyncStatus("online");
            } catch (error) {
                console.error('Erro ao salvar na nuvem:', error);
                if (setSyncStatus) setSyncStatus("offline");
                // Fallback para localStorage
                localStorage.setItem(key, JSON.stringify(data));
            }
        };

        const sanitizeFileName = (name = '') =>
            name
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-zA-Z0-9._-]/g, '_');

        const ensureSupabaseReady = async () => {
            const client = window.ensureSupabaseClient ? await window.ensureSupabaseClient() : window.supabaseClient;
            return !!client && !!window.supabaseBucket;
        };

        const downloadEpubByUrl = async (epubUrl, fileName) => {
            try {
                if (!epubUrl) {
                    throw new Error('EPUB sem URL remota.');
                }

                const response = await fetch(epubUrl);
                if (!response.ok) {
                    throw new Error('Não foi possível descarregar o EPUB do Supabase.');
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = fileName || 'livro.epub';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            } catch (err) {
                console.error('Erro ao baixar EPUB:', err);
                alert('Erro ao baixar EPUB: ' + err.message);
            }
        };

        const deleteEpubFromCloud = async (epubPath) => {
            if (!epubPath) return;
            const isReady = await ensureSupabaseReady();
            if (!isReady) {
                throw new Error('Supabase Storage indisponível no navegador. Verifique a CDN, a URL e a anon key.');
            }

            const { error } = await window.supabaseClient
                .storage
                .from(window.supabaseBucket)
                .remove([epubPath]);

            if (error) {
                throw error;
            }
        };

        const uploadEpubToCloud = async (bookId, file, previousPath = null) => {
            if (!window.auth?.currentUser || !file) {
                throw new Error('Utilizador não autenticado.');
            }
            const isReady = await ensureSupabaseReady();
            if (!isReady) {
                throw new Error('Supabase Storage indisponível no navegador. Verifique a CDN, a URL e a anon key.');
            }
            const isEpub = (file.type === 'application/epub+zip') || /\.epub$/i.test(file.name || '');
            if (!isEpub) {
                throw new Error('Arquivo inválido. Envie apenas arquivos .epub');
            }
            const maxSizeBytes = 5 * 1024 * 1024; // 5MB limite
            if (file.size > maxSizeBytes) {
                throw new Error('Arquivo muito grande. Limite de 5MB para EPUBs.');
            }

            try {
                const safeFileName = sanitizeFileName(file.name || `livro-${bookId}.epub`);
                const epubPath = `users/${window.auth.currentUser.uid}/books/${bookId}/${Date.now()}-${safeFileName}`;

                const { error: uploadError } = await window.supabaseClient
                    .storage
                    .from(window.supabaseBucket)
                    .upload(epubPath, file, {
                        cacheControl: '3600',
                        upsert: false,
                        contentType: 'application/epub+zip'
                    });

                if (uploadError) {
                    throw uploadError;
                }

                if (previousPath && previousPath !== epubPath) {
                    try {
                        await deleteEpubFromCloud(previousPath);
                    } catch (cleanupError) {
                        console.warn('Não foi possível remover o EPUB antigo:', cleanupError);
                    }
                }

                const { data } = window.supabaseClient
                    .storage
                    .from(window.supabaseBucket)
                    .getPublicUrl(epubPath);

                return {
                    url: data?.publicUrl || '',
                    fileName: file.name || 'livro.epub',
                    epubKey: epubPath,
                    epubPath,
                    epubOrigin: 'supabase'
                };
            } catch (error) {
                throw new Error(error?.message || 'Falha ao processar EPUB.');
            }
        };

        const loadFromCloud = async (key, defaultValue = {}, setSyncStatus) => {
            try {
                if (!window.db) {
                    const ready = await waitForDb();
                    if (!ready) {
                        if (setSyncStatus) setSyncStatus("offline");
                        return defaultValue;
                    }
                }
                const userId = window.auth.currentUser ? window.auth.currentUser.uid : 'default-user';
                const docRef = doc(window.db, 'users', userId, 'data', key);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    if (setSyncStatus) setSyncStatus("online");
                    return docSnap.data().data;
                } else {
                    if (setSyncStatus) setSyncStatus("online");
                    // Tenta carregar do localStorage como fallback
                    const localData = localStorage.getItem(key);
                    return localData ? JSON.parse(localData) : defaultValue;
                }
            } catch (error) {
                console.error('Erro ao carregar da nuvem:', error);
                if (setSyncStatus) setSyncStatus("offline");
                // Fallback para localStorage
                const localData = localStorage.getItem(key);
                return localData ? JSON.parse(localData) : defaultValue;
            }
        };

        // --- 1. CONFIGURAÇÕES E HELPERS (DEFINIDOS NO TOPO) ---

        const GENRES = ["Todos", "Fantasia", "Romantasy", "Ficção Científica", "Thriller", "Romance Contemporâneo", "Ficção Literária", "Distopia"];
        const DEFAULT_GENRES = GENRES.filter(genre => genre !== "Todos");

        function getGenreStyles(genre) {
            switch (genre) {
                case "Fantasia": return { text: "text-emerald-700", bg: "bg-emerald-50", border: "border-emerald-200", gradient: "from-emerald-100 to-emerald-200" };
                case "Romantasy": return { text: "text-cyan-700", bg: "bg-cyan-50", border: "border-cyan-200", gradient: "from-cyan-100 to-cyan-200" };
                case "Ficção Científica": return { text: "text-blue-700", bg: "bg-blue-50", border: "border-blue-200", gradient: "from-blue-100 to-blue-200" };
                case "Thriller": return { text: "text-teal-700", bg: "bg-teal-50", border: "border-teal-200", gradient: "from-teal-100 to-teal-200" };
                case "Romance Contemporâneo": return { text: "text-sky-700", bg: "bg-sky-50", border: "border-sky-200", gradient: "from-sky-100 to-sky-200" };
                case "Ficção Literária": return { text: "text-green-700", bg: "bg-green-50", border: "border-green-200", gradient: "from-green-100 to-green-200" };
                case "Distopia": return { text: "text-violet-700", bg: "bg-violet-50", border: "border-violet-200", gradient: "from-violet-100 to-violet-200" };
                default: return { text: "text-teal-700", bg: "bg-teal-50", border: "border-teal-200", gradient: "from-teal-100 to-teal-200" };
            }
        }

        function getSeriesLabel(total) {
            if (total === 2) return "Duologia";
            if (total === 3) return "Trilogia";
            if (total === 4) return "Tetralogia";
            return `Série (${total} vols)`;
        }

        function Icon({ name, className = "w-5 h-5" }) {
            const icons = {
                search: <path d="M20 20l-4.143-4.143m1.429-4.714c0 3.945-3.197 7.143-7.143 7.143s-7.143-3.198-7.143-7.143 3.197-7.143 7.143-7.143 7.143 3.197 7.143 7.143z" />,
                bookOpen: <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5l5 5 5-5m-5 5V3" />,
                check: <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14m5.93 1.14L12 15.01l-3-3" />,

                grid: (<><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /></>),

                bookMarked: <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" />,
                edit: <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />,
                messageCircle: (<><path d="M21 11.5a8.5 8.5 0 1 1-4.4-7.46" /><path d="M22 4l-7 7" /><path d="m22 9-7-7" /></>),
                bell: (<><path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5" /><path d="M9 17a3 3 0 0 0 6 0" /></>)
            };
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        }

        // --- 2. BASE DE DADOS INTEGRAL COM SINOPSES COMPLETAS ---

        // Livros de seed (carregados uma vez no banco de dados)
        const SEED_BOOKS = [
            { id: 1, title: "Para não acabar tão cedo", author: "Clarice Freire", publisher: "Record", pages: 216, genre: "Ficção Literária", isBrazilianAuthor: true, coverUrl: "https://m.media-amazon.com/images/I/918m27U289L.jpg", synopsis: "Duas irmãs idosas — Augusta e Lia — acordam com os corpos rejuvenescidos. O narrador da história é o próprio Tempo, que provocou essa viravolta. Augusta, guardiã e controladora; Lia, rebelde e sedenta de vida. Um romance sobre envelhecimento, ciclos e o que significa aproveitar o tempo.", tags: ["literatura brasileira", "narrativa experimental", "narrador: o Tempo", "relações entre irmãs", "rejuvenescimento", "romance de estreia"] },
            { id: 2, title: "Jogando com a Verdade", author: "Dri Satys", publisher: "Independente", pages: 572, genre: "Romance Contemporâneo", isBrazilianAuthor: true, series: "Irmãos Raffiti", volume: 1, isSeries: true, totalVolumes: 2, coverUrl: "https://m.media-amazon.com/images/I/71rubAS37ZL._UF1000,1000_QL80_.jpg", synopsis: "Nicole Palazzini vai passar uma temporada com a melhor amiga — e descobre que o irmão dela, Xavier Raffiti, jogador de futebol famoso por quem sempre foi apaixonada, vai dividir o mesmo espaço. Convivência forçada, sentimentos antigos e muita verdade no jogo entre os dois.", tags: ["romance contemporâneo", "comédia romântica", "futebol", "irmão da melhor amiga", "proximidade forçada", "dual POV", "autora brasileira"] },
            { id: 3, title: "Interion: As Crônicas de Júpiter", author: "Patrícia Criado", publisher: "Independente", pages: 1200, genre: "Fantasia", isBrazilianAuthor: true, series: "As Crônicas de Júpiter", volume: 1, isSeries: true, totalVolumes: 3, coverUrl: "https://m.media-amazon.com/images/I/81c3ciDan+L._UF1000,1000_QL80_.jpg", synopsis: "Em Interion, há mais de 500 anos mulheres com poderes foram escravizadas. Seus descendentes ainda lutam para acabar com essa tirania. Kyller, uma feérica curandeira, é salva pelo general Zion Voluz e forçada a se casar com ele para ser aceita. Anos depois, Zion retorna como professor da Academia Militar — onde ela é aluna. Romance, fantasia e guerra em uma das maiores obras de alta fantasia nacional.", tags: ["alta fantasia", "feéricos", "professor e aluna", "guerra", "casamento forçado", "poderes mágicos", "slow burn", "literatura brasileira"] },
            { id: 4, title: "Flores para Algernon", author: "Daniel Keyes", publisher: "Aleph", pages: 284, genre: "Ficção Científica", coverUrl: "https://m.media-amazon.com/images/I/71VrMtcmE9L.jpg", synopsis: "Charlie Gordon tem 32 anos e QI 68. Uma cirurgia experimental aumenta sua inteligência além dos próprios médicos. Narrado pelos relatórios de progresso de Charlie, o livro acompanha sua transformação — e o que o conhecimento revela sobre as pessoas ao seu redor. 5 milhões de cópias, adaptação para Oscar.", tags: ["ficção científica clássica", "deficiência intelectual", "inteligência artificial/cirurgia", "ética na ciência", "narrativa em diário", "comovente"] },
            { id: 5, title: "Recursão", author: "Blake Crouch", publisher: "Intrínseca", pages: 330, genre: "Ficção Científica", coverUrl: "https://m.media-amazon.com/images/I/61IcrwpeLUL.jpg", synopsis: "Barry Sutton é policial que investiga a misteriosa Síndrome da Falsa Memória — uma doença em que as pessoas acordam com memórias de vidas que nunca viveram. Ao cruzar com uma cientista que trabalha com viagem no tempo via memória, as linhas entre passado e realidade começam a se apagar de forma irreversível.", tags: ["ficção científica", "viagem no tempo", "memória falsa", "thriller científico", "plot twist"] },
            { id: 6, title: "A Quinta Estação", author: "N.K. Jemisin", publisher: "Morro Branco", pages: 560, genre: "Ficção Científica", isDistopia: true, series: "A Terra Partida", volume: 1, isSeries: true, totalVolumes: 3, coverUrl: "https://m.media-amazon.com/images/I/81Qnzqi3XlL.jpg", synopsis: "Em um único dia catastrófico: uma mãe descobre que o marido matou o filho e sequestrou a filha; o maior império do mundo colapsa; e uma fenda rasga o coração do único continente, expelindo cinzas que podem apagar o sol por séculos. No mundo da Quietude, os orogenes — que controlam a terra — são os mais temidos. A autora foi a primeira escritora negra a vencer o Hugo, e é a única a vencê-lo por três anos consecutivos.", tags: ["distopia", "fantasia/ficção científica", "pós-apocalíptico", "poderes elementais", "crítica social", "múltiplos POVs", "narração em 2ª pessoa"] },
            { id: 7, title: "Fúria Vermelha", author: "Pierce Brown", publisher: "Globo Alt", pages: 468, genre: "Ficção Científica", isDistopia: true, series: "Red Rising", volume: 1, isSeries: true, totalVolumes: 3, coverUrl: "https://m.media-amazon.com/images/I/81htNBU7jiL.jpg", synopsis: "Marte colonizado. A sociedade é dividida em castas por cor, e os Vermelhos vivem nos subterrâneos minerando para o governo. Darrow, um minerador, descobre que o mundo em que vive é uma grande mentira. Com a ajuda de rebeldes, infiltra-se na elite dos Ouros para destruir o sistema de dentro. Comparado a Jogos Vorazes + Game of Thrones.", tags: ["distopia", "ficção científica", "Marte colonizado", "castas genéticas", "infiltração", "vingança", "violência intensa"] },
            { id: 8, title: "Elite de Prata", author: "Dani Francis", publisher: "Paralela", pages: 464, genre: "Ficção Científica", isDistopia: true, series: "Silver Elite", volume: 1, isSeries: true, totalVolumes: 3, isBrazilianAuthor: true, coverUrl: "https://m.media-amazon.com/images/I/81tycP3bo7L.jpg", synopsis: "No Continente, poderes psíquicos são sentença de morte. Wren Darlington é uma Modificada (Mod) que vive escondida, ajudando a Rebelião em segredo. Um erro a coloca nas mãos do exército inimigo, forçando-a a entrar no programa de treinamento Elite Prata — onde seu superior é o irresistível e arrogante Cross Redden. Uma oportunidade perfeita para a Rebelião, se ela sobreviver.", tags: ["distopia", "romance", "poderes psíquicos", "enemies to lovers", "treinamento militar", "identidade oculta", "rebelião"] },
            { id: 9, title: "A Sombra dos Deuses", author: "John Gwynne", publisher: "Trama", pages: 576, genre: "Fantasia", series: "Saga Bloodsworn", volume: 1, isSeries: true, totalVolumes: 3, coverUrl: "https://m.media-amazon.com/images/I/81bqTipxCPL._AC_UF1000,1000_QL80_.jpg", synopsis: "Um século após os deuses se exterminarem, seus ossos erguem montanhas e seus descendentes são escravizados. Três destinos se entrelaçam: Orka, a guerreira que queria paz mas foi atacada; Varg, o ex-escravo que busca vingança entre mercenários; e Elvar, que persegue a glória e descobre seu preço. Fantasia nórdica brutal elogiada por Robin Hobb.", tags: ["fantasia épica", "mitologia nórdica", "pós-Ragnarök", "3 POVs", "guerra e vingança", "deuses mortos", "dark fantasy"] },
            { id: 10, title: "Um Estranho Sonhador", author: "Laini Taylor", publisher: "Universo dos Livros", pages: 480, genre: "Fantasia", series: "Estranha o Sonhador", volume: 1, isSeries: true, totalVolumes: 2, coverUrl: "https://m.media-amazon.com/images/I/81uxiFkiJvL._AC_UF1000,1000_QL80_.jpg", synopsis: "Lazlo Estranho é um bibliotecário órfão obcecado pela cidade mítica de Lamento, que há 200 anos desapareceu do mundo. Quando uma expedição parte em busca dela, Lazlo finalmente encontra respostas — e uma deusa de pele azul que aparece em seus sonhos. NYT best-seller e finalista do National Book Award.", tags: ["fantasia", "cidade perdida", "sonhos e magia", "deuses", "romance", "escrita lírica"] },
            { id: 11, title: "A Rebelde do Deserto", author: "Alwyn Hamilton", publisher: "Seguinte", pages: 312, genre: "Fantasia", series: "A Rebelde do Deserto", volume: 1, isSeries: true, totalVolumes: 3, coverUrl: "https://m.media-amazon.com/images/I/A1e0TuprdCL._UF1000,1000_QL80_.jpg", synopsis: "Amani Al'Hiza é pobre, órfã, mulher — tudo o que o deserto de Miraji condena. Mas ela é uma atiradora infalível. Ao fugir de um casamento forçado com um forasteiro misterioso, é lançada numa rebelião contra o sultão, entre djinnis reais, poder e o destino de um povo. Mitologia árabe + faroeste em uma das trilogias mais originais do YA.", tags: ["fantasia YA", "mitologia árabe", "faroeste", "djinnis", "protagonista feminina", "crítica social", "trilogia completa"] },
            { id: 12, title: "A Traidora do Trono", author: "Alwyn Hamilton", publisher: "Seguinte", pages: 384, genre: "Fantasia", series: "A Rebelde do Deserto", volume: 2, isSeries: true, totalVolumes: 3, coverUrl: "https://m.media-amazon.com/images/I/91HhIrpcQuL._AC_UF1000,1000_QL80_.jpg", synopsis: "Amani agora está no coração da rebelião contra o sultão. Continuação épica de A Rebelde do Deserto. Entre a lealdade à sua terra e o amor que encontrou nas dunas.", tags: ["fantasia", "rebelião", "conflitos políticos", "mitologia árabe"] },
            { id: 13, title: "A Heroína da Alvorada", author: "Alwyn Hamilton", publisher: "Seguinte", pages: 344, genre: "Fantasia", series: "A Rebelde do Deserto", volume: 3, isSeries: true, totalVolumes: 3, coverUrl: "https://images-na.ssl-images-amazon.com/images/I/A13Nj5VetZL._AC_UL900_SR615,900_.jpg", synopsis: "A conclusão épica da jornada de Amani Al'Hiza no deserto de Miraji. O destino do deserto e de todos os djinnis está em jogo na batalha final.", tags: ["fantasia", "conclusão", "épico", "ação e romance"] },
            { id: 14, title: "Nevernight", author: "Jay Kristoff", publisher: "Plataforma 21", pages: 540, genre: "Fantasia", series: "As Crônicas da Quasinoite", volume: 1, isSeries: true, totalVolumes: 3, coverUrl: "https://images.tcdn.com.br/img/img_prod/971248/nevernight_a_sombra_do_corvo_nova_edicao_1105_1_8381b37499c94f4a111422d575270974.jpg", synopsis: "Mia Corvere viu a família ser destruída ainda criança. Aos 16, começa o treinamento para se tornar uma assassina da Igreja Vermelha — único caminho para a vingança. Em um mundo com três sóis onde a escuridão total ocorre apenas a cada dois anos, Mia comanda as sombras. Fantasia adulta sombria com narrador sarcástico e notas de rodapé únicas.", tags: ["fantasia adulta sombria", "escola de assassinos", "vingança", "magia das sombras", "política e intrigas", "narrador único", "dark fantasy", "spicy"] },
            { id: 17, title: "A Guerra da Papoula", author: "R.F. Kuang", publisher: "HarperCollins", pages: 528, genre: "Fantasia", series: "A Guerra da Papoula", volume: 1, isSeries: true, totalVolumes: 3, coverUrl: "https://m.media-amazon.com/images/I/613YunBw8yL._AC_UF1000,1000_QL80_.jpg", synopsis: "Rin é uma órfã de pele escura que luta para entrar na mais respeitada academia militar do Império Nikara. Ao conseguir, descobre poderes xamânicos através do uso do ópio. Baseado na história da China do século XX, o livro aborda colonialismo, guerra, atrocidades e a natureza destrutiva do poder. Indicado para maiores de 18 anos.", tags: ["fantasia épica", "baseado na história da China", "xamanismo e ópio", "academia militar", "guerra", "conteúdo pesado", "+18"] },
            { id: 18, title: "A Cidade de Bronze", author: "S.A. Chakraborty", publisher: "Morro Branco", pages: 608, genre: "Fantasia", series: "Trilogia de Daevabad", volume: 1, isSeries: true, totalVolumes: 3, coverUrl: "https://m.media-amazon.com/images/I/91JQ7RcYcrL._UF1000,1000_QL80_.jpg", synopsis: "Nahri é uma golpista sobrevivendo nas ruas do Cairo do século XVIII. Sem querer, convoca Dara, um poderoso guerreiro djinn, e descobre que está ligada ao mundo mágico por seu sangue. Juntos fogem até Daevabad, a lendária Cidade de Bronze — onde tribos djinns travam conflitos centenários. Fantasia inspirada na mitologia islâmica e persa, com dois POVs e forte crítica social.", tags: ["fantasia épica", "mitologia islâmica/persa", "djinns", "Cairo século XVIII", "intrigas políticas", "dual POV", "crítica social"] },
            { id: 19, title: "Mistborn: O Império Final", author: "Brandon Sanderson", publisher: "Trama", pages: 672, genre: "Fantasia", series: "Mistborn", volume: 1, isSeries: true, totalVolumes: 3, coverUrl: "https://m.media-amazon.com/images/I/91U6rc7u0yL._AC_UF1000,1000_QL80_.jpg", synopsis: "Em um mundo de cinzas e névoa onde o Senhor Supremo governa há mil anos, um grupo de ladrões plota a maior revolução da história. Vin, uma ladra das ruas, descobre poderes raros de alomância — a magia de queimar metais para obter habilidades. Com the lendário Kelsier, ela precisará destruir um sistema que parece eterno. Sistema de magia único e mundialmente aclamado.", tags: ["fantasia épica", "Cosmere", "alomância — sistema de metais", "revolução", "castas oprimidas", "heist mágico", "trilogia completa"] },
            { id: 20, title: "O Caminho dos Reis", author: "Brandon Sanderson", publisher: "Trama", pages: 1056, genre: "Fantasia", series: "Os Relatos da Guerra das Tempestades", volume: 1, isSeries: true, totalVolumes: 10, coverUrl: "https://m.media-amazon.com/images/I/91gtaGEonIL._UF1000,1000_QL80_.jpg", synopsis: "Em Roshar, um mundo devastado por tempestades mágicas, múltiplos personagens convergem para um conflito épico. Kaladin, um escravo que foi soldado; Shallan, uma acadêmica com poderes secretos; Dalinar, un general assombrado por visões. A saga mais ambiciosa do Cosmere — e um dos livros mais bem avaliados de todos os tempos no Goodreads.", tags: ["fantasia épica", "Cosmere", "múltiplos POVs", "sistema de magia: Elos de Luz", "guerra e política", "construção de mundo excepcional", "calhamaço +1000p"] },
            { id: 21, title: "Foundryside", author: "Robert Jackson Bennett", publisher: "Morro Branco", pages: 640, genre: "Fantasia", series: "Os Fundadores", volume: 1, isSeries: true, totalVolumes: 3, coverUrl: "https://m.media-amazon.com/images/I/81KV69mVmQL.jpg", synopsis: "Em Tevanne, a magia é industrializada: inscrições em objetos os fazem 'acreditar' in coisas diferentes, alterando a realidade. Sancia é uma ladra com habilidade única de ler inscrições — e acaba roubando um artefato com power imensurável, que pode reescrever a própria realidade. Recomendado por Brandon Sanderson. Descrito como 'cyberpunk preso em roupas de fantasia épica'.", tags: ["fantasia épica", "magia industrializada", "elementos cyberpunk", "heist", "crítica ao capitalismo", "protagonista ladra"] },
            { id: 22, title: "Divinos Rivais", author: "Rebecca Ross", publisher: "Alt", pages: 368, genre: "Romantasy", series: "Letters of Enchantment", volume: 1, isSeries: true, totalVolumes: 2, coverUrl: "https://m.media-amazon.com/images/I/81UkZV9mfEL.jpg", synopsis: "Os deuses voltaram à guerra e o mundo está em conflito. Iris Winnow, 18 anos, é jornalista e escreve cartas para o irmão desaparecido na frente de batalha — que misteriosamente vão parar nas mãos de Roman Kitt, seu rival no jornal. Uma conexão anônima que os une e os leva até a linha de frente. Enemies to lovers com cartas mágicas e vibes steampunk.", tags: ["romantasy", "enemies to lovers", "cartas mágicas", "jornalistas rivais", "deuses em guerra", "steampunk"] },
            { id: 23, title: "Alchemised", author: "SenLinYu", publisher: "Planeta Minotauro", pages: 954, genre: "Romantasy", coverUrl: "https://m.media-amazon.com/images/I/91G2hnAVQgL._AC_UF1000,1000_QL80_.jpg", synopsis: "Helena Marino era uma alquimista promissora até ver seus aliados serem assassinados e perder seus poderes. Agora é prisioneira de guerra em Paladia, governada por necromantes. Mantida em cativeiro, é ligada a Ferron — um homem frio, sem emoção e com segredos profundos. Origem fanfic de Harry Potter, 1 milhão de cópias em semanas, adaptação cinematográfica pela Legendary Entertainment.", tags: ["romantasy", "dark fantasy", "alquimia e necromância", "prisioneira de guerra", "slow burn", "memories perdidas", "fenômeno TikTok"] },
            { id: 24, title: "Nona Casa", author: "Leigh Bardugo", publisher: "Planeta Minotauro", pages: 442, genre: "Romantasy", series: "Trilogia Alex Stern", volume: 1, isSeries: true, totalVolumes: 3, coverUrl: "https://m.media-amazon.com/images/I/7190YwrFfuS.jpg", synopsis: "Galaxy 'Alex' Stern enxerga fantasmas desde sempre. Única sobrevivente de um massacre misterioso, recebe uma bolsa integral para Yale com a condição: monitorar as sociedades secretas da universidade, que praticam magia real. Stephen King: 'impossível de largar'. Fantasia adulta com mistério, magia negra e crítica ao privilégio. Adaptação em desenvolvimento pela Amazon Studios.", tags: ["fantasia adulta", "sociedades secretas", "Yale e magia negra", "protagonista vê fantasmas", "mistério e investigação", "conteúdo pesado"] },
            { id: 25, title: "Quicksilver", author: "Callie Hart", publisher: "Rocco", pages: 560, genre: "Romantasy", series: "Magia e Alquimia", volume: 1, isSeries: true, totalVolumes: 5, coverUrl: "https://m.media-amazon.com/images/I/71PJVodvO-L.jpg", synopsis: "Saeris Fane é uma ladra com o power proibido de manipular metais, sobrevivendo em Zilvaren — cidade castigada por dois sóis onde água é mais rara que ouro. Ao reabrir sem querer um portal entre mundos, é transportada para Yvelia, reino gelado dos feéricos, e ligada ao guerreiro Kingfisher: belo, frio e cheio de segredos. Enemies to lovers com spice e plot twist arrebatador.", tags: ["romantasy", "feéricos", "alquimia e metais", "portal entre mundos", "enemies to lovers", "spicy", "plot twist"] },
            { id: 26, title: "O Livro de Azrael", author: "Amber V. Nicole", publisher: "Independente", pages: 640, genre: "Romantasy", series: "Deuses e Monstros", volume: 1, isSeries: true, totalVolumes: 3, coverUrl: "https://m.media-amazon.com/images/I/91hl43KH-QL.jpg", synopsis: "Há mil anos, Dianna fez um pacto com um monstro para salvar a irmã. Agora serve a Kaden e é enviada para roubar uma relíquia das mãos do exército de Samkiel — o Arauto do Fim, um deus recluso que negou a coroa após a Guerra dos Deuses. Dianna e Samkiel são forçados a trabalhar juntos para salvar todos os mundos. Enemies to lovers, slow burn, dark fantasy com duplos POVs.", tags: ["dark romantasy", "deuses e imortais", "enemies to lovers", "slow burn", "dual POV", "pacto com monstro", "heroína moralmente cinza"] },
            { id: 27, title: "A Paciente Silenciosa", author: "Alex Michaelides", publisher: "Record", pages: 350, genre: "Thriller", coverUrl: "https://m.media-amazon.com/images/I/91R8S52UP6L._AC_UF1000,1000_QL80_.jpg", synopsis: "Alicia Berenson matou o marido com cinco tiros e nunca mais disse uma palavra. O psicoterapeuta Theo Faber está determinado a fazê-la falar — mas a verdade que ela esconde pode ser mais perigosa do que ele imagina.", tags: ["thriller psicológico", "narrador não confiável", "plot twist", "psiquiatria", "crime não resolvido", "silêncio como arma", "dual POV"] },

            { id: 30, title: "Pactos Mortais", author: "Steve Cavanagh", publisher: "HarperCollins", pages: 336, genre: "Thriller", coverUrl: "https://m.media-amazon.com/images/I/71F87OecVmL._AC_UF1000,1000_QL80_.jpg", synopsis: "Duas estranhas em Nova York descobrem que têm o mesmo desejo: se vingar dos homens que destruíram suas famílias. O pacto? Eu mato o seu, você mata o meu. O plano perfeito — até que tudo desmorona.", tags: ["vingança", "thriller psicológico", "múltiplas perspectivas", "plot twist", "crime planejado", "triângulo de segredos"] },
            { id: 31, title: "Com Amor, Mamãe", author: "Iliana Xander", publisher: "Independente", pages: 336, genre: "Thriller", coverUrl: "https://m.media-amazon.com/images/I/71DA+TIIuFL.jpg", synopsis: "Após a morte misteriosa da mãe — uma escritora famosa de thrillers —, Mackenzie começa a receber cartas assinadas 'Com amor, mamãe'. O que ela descobre sobre o passado da família é perturbador demais para ser ficção.", tags: ["thriller psicológico", "segredos de família", "cartas misteriosas", "morte suspeita", "mãe e filha", "investigação", "vingança"] },
            { id: 32, title: "Tudo em Família", author: "John Marrs", publisher: "DarkSide Books", pages: 352, genre: "Thriller", coverUrl: "https://m.media-amazon.com/images/I/81kHv-wBb3L._AC_UF1000,1000_QL80_.jpg", synopsis: "Mia e Finn compram uma casa abandonada para recomeçar a vida. Durante a reforma, encontram uma frase escrita com letra infantil sob as camadas de papel de parede: 'EU VOU SALVAR ELAS DO SÓTÃO'. O passado da casa não ficará enterrado.", tags: ["thriller doméstico", "horror psicológico", "segredos do passado", "casa com história", "múltiplas perspectivas", "passado e presente", "obsessão familiar"] },

            { id: 34, title: "Uma Questão de Química", author: "Bonnie Garmus", publisher: "Arqueiro", pages: 384, genre: "Romance Contemporâneo", coverUrl: "https://m.media-amazon.com/images/I/71-JwZqx+mL._AC_UF1000,1000_QL80_.jpg", synopsis: "Elizabeth Zott é uma química brilhante nos anos 1960 que enfrenta um scientific world dominado por homens. Por um capricho do destino, ela se torna a maior estrela de um programa de culinária — e ensina bem mais do que receitas. Adaptado para série com Brie Larson.", tags: ["ficção histórica", "feminismo", "romance", "anos 1960", "mulher na ciência", "mãe solo", "humor", "adaptado para série"] },

            { id: 37, title: "Binding 13", author: "Chloe Walsh", publisher: "Bloom Brasil", pages: 704, genre: "Romance Contemporâneo", series: "Os Garotos de Tommen", volume: 1, isSeries: true, totalVolumes: 4, coverUrl: "https://m.media-amazon.com/images/I/81qgQ2eFh3L._AC_UF1000,1000_QL80_.jpg", synopsis: "Johnny é a estrela do rúgbi irlandês com uma lesão secreta. Shannon é a nova aluna que só quer sobreviver ao colégio. Um encontro improvável os une — mas o passado de Shannon é mais pesado do que qualquer campo de jogo. Fenômeno no TikTok.", tags: ["slow burn", "garoto popular × garota excluída", "romance esportivo", "dual POV", "violência doméstica", "bullying", "trauma", "irlanda", "friends to lovers"] },
            { id: 38, title: "Despertar da Chama Eterna", author: "Penn Cole", publisher: "Arqueiro", pages: 384, genre: "Fantasia", series: "Chama Eterna", volume: 1, isSeries: true, totalVolumes: 4, coverUrl: "https://m.media-amazon.com/images/I/8160XsjSJoL.jpg", synopsis: "Diem Bellator é curandeira num mundo governado por Descendentes dos deuses. O desaparecimento da mãe a lança no world sombrio da realeza, onde o príncipe Luther a observa e uma aliança mortal a recruta para uma guerra civil. Romance lento de ódio ao amor.", tags: ["romantasy", "enemies to lovers", "slow burn", "intrigas políticas", "sistema de magia", "realeza", "deuses e mortais", "toque proibido"] },
            { id: 39, title: "Uma Janela Sombria", author: "Rachel Gillig", publisher: "Alt", pages: 424, genre: "Romantasy", series: "O Rei Pastor", volume: 1, isSeries: true, totalVolumes: 2, coverUrl: "https://m.media-amazon.com/images/I/81UUGTUvPKL.jpg", synopsis: "Elspeth sobreviveu à febre mágica com a ajuda de um monstro preso em sua mente — o Pesadelo. Para salvar o reino de Blunder, ela e o misterioso sobrinho do rei precisam reunir as doze Cartas da Providência, enquanto o Pesadelo ameaça devorar sua alma.", tags: ["dark fantasy", "fantasia gótica", "sistema de magia em cartas", "monstro interno", "enemies to lovers", "slow burn", "duologia", "found family"] },
            { id: 40, title: "Duas Coroas Retorcidas", author: "Rachel Gillig", publisher: "Alt", pages: 448, genre: "Romantasy", series: "O Rei Pastor", volume: 2, isSeries: true, totalVolumes: 2, coverUrl: "https://m.media-amazon.com/images/I/91I5pEHHpNL.jpg", synopsis: "O Pesadelo tomou a cabeça de Elspeth. Não se sabe mais o que é menina e o que é monstro. Mas só ele sabe onde encontrar a última Carta da Providência — a chave para salvar o reino. A conclusão épica da duologia.", tags: ["dark fantasy", "fantasia gótica", "dual POV", "múltiplos POVs", "conclusão de duologia", "política fantástica", "romance intenso", "redenção"] },
            { id: 41, title: "Magia Oculta (Metal Slinger)", author: "Rachel Schneider", publisher: "Independente", pages: 520, genre: "Fantasia", series: "Fogo e Metal", volume: 1, isSeries: true, totalVolumes: 2, coverUrl: "https://m.media-amazon.com/images/I/81K7kIHIr4L._UF1000,1000_QL80_.jpg", synopsis: "Brynn é uma guarda que vive exilada no mar. Quando parte para o Mercado anual dos inimigos do seu povo, un conflito com o soldado Acker ameaça um tratado de paz centenário — e revela um world de magia que ela não sabia que existia. Plot twist final explosivo.", tags: ["romantasy", "enemies to lovers", "slow burn", "fated mates", "proximidade forçada", "magia oculta", "plot twist explosivo", "duologia"] }
        ];

        const LAISA_DEMO_BOOKS = [
            {
                id: "laisa-demo-1",
                title: "Livro de Teste da Laisa",
                author: "Equipe Biblioteca",
                publisher: "Teste Interno",
                pages: 240,
                genre: "Romance Contemporâneo",
                isBrazilianAuthor: true,
                coverUrl: "https://m.media-amazon.com/images/I/71MYkfZvNPS._UF1000,1000_QL80_.jpg",
                synopsis: "Livro criado automaticamente para testar a função de copiar para o perfil da conta logada.",
                tags: ["teste", "perfil", "importacao"]
            }
        ];

        // Array vazia - todos os livros serão carregados do banco de dados
        const INITIAL_BOOKS = [];

        function AddBookModal({ onClose, onSave, initialBook }) {
            const [form, setForm] = useState({
                title: "",
                author: "",
                genre: "Fantasia",
                publisher: "",
                pages: "",
                synopsis: "",
                coverUrl: "",
                tags: "",
                series: "",
                volume: "",
                totalVolumes: "",
                isSeries: false,
                isBrazilianAuthor: false,
                isDistopia: false
            });
            const [customGenre, setCustomGenre] = useState("");
            const [amazonQuery, setAmazonQuery] = useState("");
            const [amazonRef, setAmazonRef] = useState("");
            const [isLoadingAmazon, setIsLoadingAmazon] = useState(false);
            const [amazonMessage, setAmazonMessage] = useState("");
            const [searchResults, setSearchResults] = useState([]);
            const [selectedResultId, setSelectedResultId] = useState(null);
            const [epubFile, setEpubFile] = useState(null);
            const [isUploadingEpub, setIsUploadingEpub] = useState(false);
            const [epubMessage, setEpubMessage] = useState("");

            useEffect(() => {
                if (!initialBook) return;
                setForm({
                    title: initialBook.title || "",
                    author: initialBook.author || "",
                    genre: initialBook.genre || "Fantasia",
                    publisher: initialBook.publisher || "",
                    pages: initialBook.pages || "",
                    synopsis: initialBook.synopsis || "",
                    coverUrl: initialBook.coverUrl || "",
                    tags: Array.isArray(initialBook.tags) ? initialBook.tags.join(', ') : (initialBook.tags || ""),
                    series: initialBook.series || "",
                    volume: initialBook.volume || "",
                    totalVolumes: initialBook.totalVolumes || "",
                    isSeries: !!initialBook.isSeries,
                    isBrazilianAuthor: !!initialBook.isBrazilianAuthor,
                    isDistopia: !!initialBook.isDistopia
                });
                setEpubMessage(initialBook.epubFileName ? `Arquivo atual: ${initialBook.epubFileName}` : "");
                setCustomGenre("");
            }, [initialBook]);

            const setField = (key, value) => setForm(prev => ({ ...prev, [key]: value }));

            const toHttps = (url) => (url || '').replace(/^http:\/\//i, 'https://');

            const getVolumeScore = (v, query) => {
                const q = (query || '').toLowerCase();
                const title = (v?.title || '').toLowerCase();
                let s = 0;
                if (title && q && (title.includes(q) || q.includes(title))) s += 4;
                if ((v?.language || '').toLowerCase().startsWith('pt')) s += 4;
                if (v?.description) s += 3;
                if (v?.pageCount) s += 2;
                if (v?.publisher) s += 2;
                if (v?.imageLinks?.thumbnail || v?.imageLinks?.smallThumbnail) s += 2;
                if (Array.isArray(v?.categories) && v.categories.length) s += 1;
                return s;
            };

            const pickTopVolumes = (items, query, limit = 5) => {
                if (!Array.isArray(items) || !items.length) return [];
                return items
                    .map(item => item?.volumeInfo)
                    .filter(Boolean)
                    .sort((a, b) => getVolumeScore(b, query) - getVolumeScore(a, query))
                    .slice(0, limit);
            };

            const pickBestVolume = (items, query) => {
                const top = pickTopVolumes(items, query, 1);
                return top[0] || null;
            };

            const mergeUniqueVolumes = (volumes) => {
                const map = new Map();
                for (const v of volumes) {
                    const key = `${(v?.title || '').toLowerCase()}|${(v?.authors?.[0] || '').toLowerCase()}`;
                    if (!key || key === "|") continue;
                    if (!map.has(key)) map.set(key, v);
                }
                return Array.from(map.values());
            };

            const applyVolumeToForm = (volume) => {
                if (!volume) return;
                const categories = volume.categories || [];
                const matchedGenre = GENRES.find(g => g !== "Todos" && categories.some(c => c.toLowerCase().includes(g.toLowerCase())));

                setForm(prev => ({
                    ...prev,
                    title: volume.title || prev.title,
                    author: volume.authors?.join(', ') || prev.author,
                    publisher: volume.publisher || prev.publisher,
                    pages: volume.pageCount || prev.pages,
                    synopsis: volume.description || prev.synopsis,
                    coverUrl: toHttps(volume.imageLinks?.thumbnail || volume.imageLinks?.smallThumbnail) || prev.coverUrl,
                    genre: matchedGenre || prev.genre,
                    tags: prev.tags || categories.join(', ')
                }));
            };

            const fetchGoogleVolumePtBr = async (query, authorHint = "") => {
                const queries = [query, `intitle:${query}`];
                if (authorHint) queries.unshift(`intitle:${query} inauthor:${authorHint}`);

                for (const q of queries) {
                    const endpointPt = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&langRestrict=pt&country=BR&printType=books&maxResults=10&orderBy=relevance`;
                    const endpointAny = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&printType=books&maxResults=10&orderBy=relevance`;

                    const resPt = await fetch(endpointPt);
                    const dataPt = await resPt.json();
                    const bestPt = pickBestVolume(dataPt?.items, query);
                    if (bestPt) return bestPt;

                    const resAny = await fetch(endpointAny);
                    const dataAny = await resAny.json();
                    const bestAny = pickBestVolume(dataAny?.items, query);
                    if (bestAny) return bestAny;
                }

                return null;
            };

            const fetchGoogleCandidatesPtBr = async (query, authorHint = "") => {
                const queries = [query, `intitle:${query}`];
                if (authorHint) queries.unshift(`intitle:${query} inauthor:${authorHint}`);

                const all = [];
                for (const q of queries) {
                    const endpointPt = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&langRestrict=pt&country=BR&printType=books&maxResults=10&orderBy=relevance`;
                    const endpointAny = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&printType=books&maxResults=10&orderBy=relevance`;

                    const resPt = await fetch(endpointPt);
                    const dataPt = await resPt.json();
                    all.push(...pickTopVolumes(dataPt?.items, query, 5));

                    const resAny = await fetch(endpointAny);
                    const dataAny = await resAny.json();
                    all.push(...pickTopVolumes(dataAny?.items, query, 5));
                }

                return mergeUniqueVolumes(all)
                    .sort((a, b) => getVolumeScore(b, query) - getVolumeScore(a, query))
                    .slice(0, 5);
            };

            const enrichVolumeData = async (volume, fallbackQuery) => {
                if (!volume || !fallbackQuery) return volume;

                const needExtra = !volume.description || !volume.pageCount || !volume.publisher || !(volume.imageLinks?.thumbnail || volume.imageLinks?.smallThumbnail);
                if (!needExtra) return volume;

                const googleExtra = await fetchGoogleVolumePtBr(volume.title || fallbackQuery, (volume.authors || [])[0] || form.author || "");
                if (googleExtra) {
                    if (!volume.publisher && googleExtra.publisher) volume.publisher = googleExtra.publisher;
                    if (!volume.pageCount && googleExtra.pageCount) volume.pageCount = googleExtra.pageCount;
                    if (!volume.description && googleExtra.description) volume.description = googleExtra.description;
                    if (!(volume.imageLinks?.thumbnail || volume.imageLinks?.smallThumbnail) && (googleExtra.imageLinks?.thumbnail || googleExtra.imageLinks?.smallThumbnail)) {
                        volume.imageLinks = googleExtra.imageLinks;
                    }
                    if ((!volume.categories || !volume.categories.length) && Array.isArray(googleExtra.categories) && googleExtra.categories.length) {
                        volume.categories = googleExtra.categories;
                    }
                }

                const olResExtra = await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(volume.title || fallbackQuery)}&author=${encodeURIComponent((volume.authors || [])[0] || '')}&limit=1`);
                const olDataExtra = await olResExtra.json();
                const extra = olDataExtra?.docs?.[0];

                if (extra) {
                    const extraCover = extra.cover_i ? `https://covers.openlibrary.org/b/id/${extra.cover_i}-L.jpg` : '';
                    if (!volume.publisher && extra.publisher?.[0]) volume.publisher = extra.publisher[0];
                    if (!volume.pageCount && extra.number_of_pages_median) volume.pageCount = extra.number_of_pages_median;
                    if (!(volume.imageLinks?.thumbnail || volume.imageLinks?.smallThumbnail) && extraCover) {
                        volume.imageLinks = { thumbnail: extraCover, smallThumbnail: extraCover };
                    }
                    if ((!volume.categories || !volume.categories.length) && extra.subject?.length) {
                        volume.categories = extra.subject.slice(0, 5);
                    }
                }

                return volume;
            };

            const openAmazonSearch = () => {
                const query = (amazonQuery || form.title || form.author).trim();
                if (!query) return;
                window.open(`https://www.amazon.com.br/s?k=${encodeURIComponent(query)}&i=stripbooks`, '_blank');
            };

            const normalizeBookCode = (value) => {
                const code = (value || '').replace(/[^0-9A-Za-z]/g, '').toUpperCase();
                if (!code) return null;
                if (code.length === 13 && (code.startsWith('978') || code.startsWith('979'))) return code;
                if (code.length === 10) return code;
                return null;
            };

            const extractBookReference = (value) => {
                const clean = (value || '').trim();
                if (!clean) return { code: null, queryText: '' };

                const normalizeHumanQuery = (text) =>
                    (text || '')
                        .replace(/[-_]+/g, ' ')
                        .replace(/\s+/g, ' ')
                        .replace(/\b(dp|product|gp|books|asin)\b/gi, ' ')
                        .trim();

                const isbn13 = clean.match(/(?:ISBN(?:-13)?:?\s*)?(97[89][\d\s-]{10,16})/i);
                if (isbn13) {
                    const code = normalizeBookCode(isbn13[1]);
                    if (code) return { code, queryText: '' };
                }

                const isbn10 = clean.match(/(?:ISBN(?:-10)?:?\s*)?([\dXx][\d\s-]{8,15})/i);
                if (isbn10) {
                    const code = normalizeBookCode(isbn10[1]);
                    if (code) return { code, queryText: '' };
                }

                const directCode = normalizeBookCode(clean);
                if (directCode) return { code: directCode, queryText: '' };

                const amazonLooseMatch = clean.match(/amazon\.[^/]+\/([^?]+)/i);
                if (amazonLooseMatch?.[1]) {
                    const rawPath = amazonLooseMatch[1];
                    const safeDecoded = (() => {
                        try { return decodeURIComponent(rawPath); } catch { return rawPath; }
                    })();
                    const looseQuery = normalizeHumanQuery(safeDecoded);
                    if (looseQuery) return { code: null, queryText: looseQuery };
                }

                try {
                    const asUrl = clean.startsWith('http') ? clean : `https://${clean}`;
                    const url = new URL(asUrl);
                    const path = decodeURIComponent(url.pathname || '');

                    const pathPatterns = [
                        /\/(?:dp|gp\/product|product|exec\/obidos\/ASIN|asin)\/([A-Z0-9]{10,13})/i,
                        /\/([A-Z0-9]{10,13})(?:[/?]|$)/i
                    ];

                    for (const pattern of pathPatterns) {
                        const match = path.match(pattern);
                        if (match) {
                            const code = normalizeBookCode(match[1]);
                            if (code) {
                                const slugPart = path.split('/dp/')[0].split('/').pop() || '';
                                const queryText = slugPart.replace(/-/g, ' ').trim();
                                return { code, queryText };
                            }
                        }
                    }

                    const paramCode = normalizeBookCode(url.searchParams.get('asin') || url.searchParams.get('isbn') || '');
                    if (paramCode) return { code: paramCode, queryText: '' };

                    const paramQuery = (url.searchParams.get('k') || '').trim();
                    if (paramQuery) return { code: null, queryText: paramQuery };

                    const pathText = normalizeHumanQuery(
                        path
                            .split('/')
                            .filter(Boolean)
                            .filter(part => !/^(dp|gp|product|exec|obidos|asin)$/i.test(part))
                            .join(' ')
                    );
                    if (pathText) return { code: null, queryText: pathText };
                } catch {
                    // Não é URL
                }

                return { code: null, queryText: clean };
            };

            const fillFromAmazonReference = async () => {
                setAmazonMessage("");
                setSearchResults([]);
                setSelectedResultId(null);
                const { code, queryText } = extractBookReference(amazonRef);
                const sanitizedQueryFromLink = /^https?:\/\//i.test(queryText) ? '' : queryText;
                const fallbackQuery = (amazonQuery || form.title || form.author || sanitizedQueryFromLink || '').trim();

                if (!code && !fallbackQuery) {
                    setAmazonMessage("Cole URL/ISBN da Amazon ou digite título + autor.");
                    return;
                }

                try {
                    setIsLoadingAmazon(true);
                    const lookups = [];
                    if (code) {
                        lookups.push(`isbn:${code}`);
                        lookups.push(code);
                    }
                    if (fallbackQuery) {
                        lookups.push(`intitle:${fallbackQuery}`);
                        lookups.push(fallbackQuery);
                    }

                    let volume = null;
                    let candidatePool = [];
                    for (const q of lookups) {
                        const candidates = await fetchGoogleCandidatesPtBr(q, (form.author || '').trim());
                        candidatePool = [...candidatePool, ...candidates];
                        volume = await fetchGoogleVolumePtBr(q, (form.author || '').trim());
                        if (volume) break;
                    }

                    const uniqueCandidates = mergeUniqueVolumes(candidatePool)
                        .sort((a, b) => getVolumeScore(b, fallbackQuery) - getVolumeScore(a, fallbackQuery))
                        .slice(0, 5);
                    if (uniqueCandidates.length) setSearchResults(uniqueCandidates);

                    if (!volume && fallbackQuery) {
                        const olRes = await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(fallbackQuery)}&limit=1`);
                        const olData = await olRes.json();
                        const doc = olData?.docs?.[0];
                        if (doc) {
                            const cover = doc.cover_i ? `https://covers.openlibrary.org/b/id/${doc.cover_i}-L.jpg` : '';
                            volume = {
                                title: doc.title,
                                authors: doc.author_name || [],
                                publisher: doc.publisher?.[0] || '',
                                pageCount: doc.number_of_pages_median || '',
                                description: '',
                                categories: doc.subject?.slice(0, 4) || [],
                                imageLinks: { thumbnail: cover, smallThumbnail: cover }
                            };
                        }
                    }

                    if (!volume && fallbackQuery) {
                        const olResByQ = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(fallbackQuery)}&limit=1`);
                        const olDataByQ = await olResByQ.json();
                        const doc = olDataByQ?.docs?.[0];
                        if (doc) {
                            const cover = doc.cover_i ? `https://covers.openlibrary.org/b/id/${doc.cover_i}-L.jpg` : '';
                            volume = {
                                title: doc.title,
                                authors: doc.author_name || [],
                                publisher: doc.publisher?.[0] || '',
                                pageCount: doc.number_of_pages_median || '',
                                description: '',
                                categories: doc.subject?.slice(0, 4) || [],
                                imageLinks: { thumbnail: cover, smallThumbnail: cover }
                            };
                        }
                    }

                    if (volume && fallbackQuery) volume = await enrichVolumeData(volume, fallbackQuery);

                    if (!volume) {
                        setAmazonMessage("Não encontrei dados automáticos para este link. Preencha manualmente ou tente título + autor.");
                        return;
                    }

                    applyVolumeToForm(volume);

                    setAmazonMessage(uniqueCandidates.length > 1 ? "Ficha preenchida. Se quiser, escolha outro resultado abaixo." : "Ficha preenchida com dados do livro. Revise e salve no banco.");
                } catch (error) {
                    console.error(error);
                    setAmazonMessage("Não foi possível completar automaticamente agora.");
                } finally {
                    setIsLoadingAmazon(false);
                }
            };

            const submit = async (e) => {
                e.preventDefault();
                if (!form.title.trim() || !form.author.trim()) return;

                const parsedTotalVolumes = Number(form.totalVolumes) || 0;
                const parsedVolume = Number(form.volume) || 0;
                const isBookInSeries = !!form.isSeries && parsedTotalVolumes > 1;
                const bookId = initialBook?.id || Date.now();
                const finalGenre = (customGenre.trim() || form.genre || "Fantasia").trim();

                let epubUrl = initialBook?.epubUrl || "";
                let epubFileName = initialBook?.epubFileName || "";
                let epubKey = initialBook?.epubKey || null;
                let epubPath = initialBook?.epubPath || initialBook?.epubKey || null;
                let epubOrigin = initialBook?.epubOrigin || null;
                const withUiTimeout = (promise, ms, timeoutMessage) => Promise.race([
                    promise,
                    new Promise((_, reject) => setTimeout(() => reject(new Error(timeoutMessage)), ms))
                ]);

                if (epubFile) {
                    try {
                        setIsUploadingEpub(true);
                        setEpubMessage("A carregar EPUB...");
                        const uploaded = await withUiTimeout(
                            uploadEpubToCloud(bookId, epubFile, epubPath),
                            30000,
                            'Upload sem resposta. Verifique o bucket do Supabase e a conexão.'
                        );
                        epubUrl = uploaded.url;
                        epubFileName = uploaded.fileName;
                        epubKey = uploaded.epubKey;
                        epubPath = uploaded.epubPath;
                        epubOrigin = uploaded.epubOrigin;
                        setEpubMessage("EPUB enviado com sucesso.");
                    } catch (error) {
                        console.error(error);
                        setEpubMessage(error?.message || "Não foi possível enviar o EPUB. Verifique login, bucket e políticas do Supabase.");
                        return;
                    } finally {
                        setIsUploadingEpub(false);
                    }
                }

                onSave({
                    id: bookId,
                    title: form.title.trim(),
                    author: form.author.trim(),
                    genre: finalGenre,
                    publisher: form.publisher.trim() || "Independente",
                    pages: Number(form.pages) || 0,
                    synopsis: form.synopsis.trim() || "Sem sinopse informada.",
                    coverUrl: form.coverUrl.trim() || "https://via.placeholder.com/300x450?text=Sem+Capa",
                    tags: form.tags.split(',').map(t => t.trim()).filter(Boolean),
                    series: isBookInSeries ? form.series.trim() : "",
                    volume: isBookInSeries ? parsedVolume : 0,
                    totalVolumes: isBookInSeries ? parsedTotalVolumes : 0,
                    isSeries: isBookInSeries,
                    epubUrl,
                    epubFileName,
                    epubKey,
                    epubPath,
                    epubOrigin,
                    isBrazilianAuthor: !!form.isBrazilianAuthor,
                    isDistopia: !!form.isDistopia
                });
            };

            const selectableGenres = (() => {
                const base = [...DEFAULT_GENRES];
                if (form.genre && !base.includes(form.genre)) base.unshift(form.genre);
                return base;
            })();

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in">
                    <div className="absolute inset-0 bg-[#0F2240]/60 backdrop-blur-sm" onClick={onClose} />
                    <form onSubmit={submit} className="relative z-10 bg-white w-full max-w-2xl rounded-3xl shadow-2xl border border-gray-100 p-6 md:p-8 max-h-[92vh] overflow-y-auto">
                        <h3 className="text-2xl font-serif font-bold text-[#1E3A5F] mb-6">{initialBook ? 'Editar Livro' : 'Adicionar Livro'}</h3>

                        <div className="mb-5 p-4 rounded-2xl border border-[#1E3A5F]/10 bg-[#1E3A5F]/[0.03]">
                            <p className="text-[11px] uppercase tracking-widest text-[#1E3A5F] font-black mb-3">Assistente Amazon</p>
                            <div className="grid grid-cols-1 md:grid-cols-[1fr_auto] gap-2 mb-3">
                                <input className="px-4 py-2.5 border border-gray-200 rounded-xl" placeholder="Pesquisar livro na Amazon" value={amazonQuery} onChange={(e) => setAmazonQuery(e.target.value)} />
                                <button type="button" onClick={openAmazonSearch} className="px-4 py-2.5 rounded-xl bg-[#1E3A5F] text-white font-semibold text-sm">Abrir Amazon</button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-[1fr_auto] gap-2">
                                <input className="px-4 py-2.5 border border-gray-200 rounded-xl" placeholder="Cole URL da Amazon ou ISBN" value={amazonRef} onChange={(e) => setAmazonRef(e.target.value)} />
                                <button type="button" onClick={fillFromAmazonReference} disabled={isLoadingAmazon} className="px-4 py-2.5 rounded-xl bg-[#14B8A6] text-white font-semibold text-sm disabled:opacity-60">
                                    {isLoadingAmazon ? 'Importando...' : 'Completar Ficha'}
                                </button>
                            </div>
                            {searchResults.length > 0 && (
                                <div className="mt-3 space-y-2">
                                    <p className="text-[11px] uppercase tracking-widest text-gray-500 font-black">Resultados (pt-BR)</p>
                                    {searchResults.map((result, idx) => (
                                        <button
                                            key={`${result.title}-${(result.authors || [])[0] || idx}`}
                                            type="button"
                                            onClick={async () => {

        function AnimatedStatCard({ label, value, variant = 'default' }) {

                const t = setInterval(() => setDV(p => (p < value ? p + 1 : p - 1)), 30);

            }, [value, dV]);

            const isHighlight = variant === 'highlight';
            return (
                <div className={`backdrop-blur-md border p-2.5 md:p-3.5 rounded-2xl flex flex-col items-center justify-center min-w-[74px] md:min-w-[108px] transition-transform hover:scale-105 duration-300 ${isHighlight ? 'bg-[rgba(29,206,165,0.1)] border-[rgba(29,206,165,0.25)]' : 'bg-[rgba(255,255,255,0.06)] border-[rgba(255,255,255,0.1)]'}`}>

        function CuratedCoverImage({ item }) {
            const [coverIndex, setCoverIndex] = useState(0);

            const createInlinePlaceholder = useCallback((title = '') => {
                const safeTitle = (title || 'Sem Capa').replace(/[&<>"']/g, '').slice(0, 36);
                const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='300' height='450' viewBox='0 0 300 450'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop offset='0%' stop-color='#1E3A5F'/><stop offset='100%' stop-color='#14B8A6'/></linearGradient></defs><rect width='300' height='450' fill='url(#g)'/><rect x='20' y='20' width='260' height='410' rx='18' fill='rgba(255,255,255,0.09)'/><text x='150' y='214' text-anchor='middle' fill='white' font-size='13' font-family='Arial, sans-serif' font-weight='700'>SEM CAPA</text><text x='150' y='238' text-anchor='middle' fill='rgba(255,255,255,0.92)' font-size='12' font-family='Arial, sans-serif'>${safeTitle}</text></svg>`;
                return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
            }, []);

            const improveCoverQuality = useCallback((inputUrl = '') => {
                let url = (inputUrl || '').trim();
                if (!url || url.startsWith('data:image/')) return url;

                url = url.replace(/^http:\/\//i, 'https://');

                // Prefer larger Open Library variants when available.
                url = url.replace(/-(S|M)\.jpg(\?|$)/i, '-L.jpg$2');

                // Promote Goodreads-style low-res suffixes.
                url = url
                    .replace(/_SX\d+_/gi, '_SX600_')
                    .replace(/_SY\d+_/gi, '_SY900_')
                    .replace(/_SL\d+_/gi, '_SL600_');

                // Google Books often returns tiny thumbnails; request higher zoom.
                try {
                    const parsed = new URL(url);
                    const host = parsed.hostname || '';
                    if (/google|gstatic|googleusercontent/i.test(host)) {
                        const currentZoom = Number(parsed.searchParams.get('zoom') || '0');
                        if (!Number.isNaN(currentZoom) && currentZoom < 3) parsed.searchParams.set('zoom', '3');
                        if (!parsed.searchParams.has('zoom')) parsed.searchParams.set('zoom', '3');
                        parsed.searchParams.delete('edge');
                        url = parsed.toString();
                    }
                } catch {
                    // If URL parsing fails, keep best-effort transformed URL.
                }

                return url;
            }, []);

            const coverSources = useMemo(() => {
                const fromItem = Array.isArray(item?.coverCandidates) ? item.coverCandidates : [];
                const titleCover = item?.title ? `https://covers.openlibrary.org/b/title/${encodeURIComponent(item.title)}-L.jpg?default=false` : '';
                const isbnCover = item?.isbn ? `https://covers.openlibrary.org/b/isbn/${encodeURIComponent(item.isbn)}-L.jpg?default=false` : '';
                const proxyBases = typeof window.getCoverProxyBases === 'function' ? window.getCoverProxyBases() : [];
                const proxyCoverUrls = item?.title
                    ? proxyBases.flatMap(base => ([
                        `${base}?source=skoob&title=${encodeURIComponent(item.title)}&author=${encodeURIComponent(item?.author || '')}`,
                        `${base}?source=goodreads&title=${encodeURIComponent(item.title)}&author=${encodeURIComponent(item?.author || '')}`
                    ]))
                    : [];
                const merged = [...fromItem, item?.coverUrl || '', isbnCover, titleCover]
                    .map(url => (url || '').trim())
                    .filter(Boolean)
                    .map(improveCoverQuality);
                // Keep localhost proxy URLs as http, but normalize other http links to https.
                const normalized = merged.map(url => (url.startsWith('http://localhost:') ? url : url.replace(/^http:\/\//i, 'https://')));
                // Use proxy covers as fallback because they can be smaller/compressed.
                const proxyAsFallback = proxyCoverUrls.map(improveCoverQuality);
                return [...new Set([...normalized, ...proxyAsFallback].filter(Boolean))];
            }, [item, improveCoverQuality]);

            useEffect(() => {
                setCoverIndex(0);
            }, [item?.id, item?.title]);

            const placeholderSrc = createInlinePlaceholder(item?.title || 'Sem Capa');
            const currentSrc = coverIndex < coverSources.length
                ? coverSources[coverIndex]
                : placeholderSrc;

            return (
                <img
                    src={currentSrc}
                    alt={item?.title || 'Capa do livro'}
                    className="w-full h-full object-cover"
                    loading="lazy"
                    referrerPolicy="no-referrer"
                    onLoad={(e) => {
                        const img = e.currentTarget;
                        const tooSmall = img.naturalWidth > 0 && (img.naturalWidth < 240 || img.naturalHeight < 340);
                        if (tooSmall && coverIndex < coverSources.length - 1) {
                            setCoverIndex(prev => prev + 1);
                        }
                    }}
                    onError={() => {
                        // Avanca para a proxima opcao e, no fim, cai no placeholder inline.
                        setCoverIndex(prev => prev + 1);
                    }}
                />
            );
        }
