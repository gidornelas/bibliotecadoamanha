<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Search — Biblioteca do Amanhã</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.2s ease-out; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ─────────────────────────────────────────────────────────────
// TYPES (as JS constants)
// ─────────────────────────────────────────────────────────────

const GENRE_KEYWORDS = {
  thriller:  ['thriller', 'suspense', 'mystery', 'crime', 'psychological', 'detective', 'murder', 'mistério', 'policial'],
  fantasy:   ['fantasy', 'fantasia', 'magic', 'magia', 'dragon', 'dragão', 'wizard', 'fae', 'fadas', 'epic fantasy'],
  romantasy: ['romantasy', 'romance fantasy', 'paranormal romance', 'fantasy romance'],
  romance:   ['romance', 'love story', 'contemporary romance', 'romantic'],
  'sci-fi':  ['science fiction', 'ficção científica', 'space', 'futuristic', 'sci-fi'],
  dystopia:  ['dystopia', 'dystopian', 'distopia', 'post-apocalyptic', 'pós-apocalíptico'],
  literary:  ['literary fiction', 'ficção literária', 'contemporary fiction', 'general fiction'],
};

const AUTO_TAG_RULES = [
  { keywords: ['enemies to lovers', 'rivals', 'hate to love'],       tag: { label: 'enemies to lovers', type: 'pink' } },
  { keywords: ['slow burn'],                                          tag: { label: 'slow burn',          type: 'pink' } },
  { keywords: ['dual pov', 'multiple pov', 'alternating'],           tag: { label: 'dual POV',           type: 'gray' } },
  { keywords: ['plot twist', 'twist ending', 'unreliable narrator'], tag: { label: 'plot twist',         type: 'thriller' } },
  { keywords: ['young adult', ' ya '],                               tag: { label: 'YA',                 type: 'amber' } },
  { keywords: ['series', 'saga', 'trilogy', 'trilogia', 'duology'],  tag: { label: 'série',              type: 'amber' } },
  { keywords: ['historical', 'histórico', 'historic'],               tag: { label: 'ficção histórica',   type: 'teal' } },
  { keywords: ['award', 'prêmio', 'hugo', 'nebula', 'booker'],       tag: { label: 'premiado',           type: 'amber' } },
  { keywords: ['adapted', 'adaptado', 'netflix', 'série', 'movie'],  tag: { label: 'adaptado',           type: 'amber' } },
  { keywords: ['brazil', 'brasil', 'brasileira', 'brasileiro'],      tag: { label: 'autora brasileira',  type: 'teal' } },
  { keywords: ['magic system', 'sistema de magia'],                  tag: { label: 'sistema de magia',   type: 'purple' } },
  { keywords: ['revenge', 'vingança'],                               tag: { label: 'vingança',           type: 'thriller' } },
  { keywords: ['mythology', 'mitologia'],                            tag: { label: 'mitologia',          type: 'purple' } },
];

const TAG_COLORS = {
  thriller: 'bg-red-100 text-red-700 border-red-200',
  fantasy:  'bg-purple-100 text-purple-700 border-purple-200',
  romance:  'bg-pink-100 text-pink-700 border-pink-200',
  teal:     'bg-teal-100 text-teal-700 border-teal-200',
  amber:    'bg-amber-100 text-amber-700 border-amber-200',
  coral:    'bg-orange-100 text-orange-700 border-orange-200',
  red:      'bg-red-100 text-red-700 border-red-200',
  gray:     'bg-gray-100 text-gray-600 border-gray-200',
  pink:     'bg-pink-100 text-pink-700 border-pink-200',
  purple:   'bg-purple-100 text-purple-700 border-purple-200',
};

// ─────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────

function detectSeriesFromTitle(title) {
  const patterns = [
    /^(.+?)\s*\(([^#)]+?)\s*#?\s*(\d+)\)$/i,
    /^(.+?)\s*[-–—]\s*(?:vol(?:ume)?|livro|book|part(?:e)?)\s*\.?\s*(\d+)(?:\s+(?:da|de|of)\s+(.+))?$/i,
    /^(.+?)\s*:\s*vol(?:ume)?\s*\.?\s*(\d+)$/i,
  ];

  for (const pattern of patterns) {
    const m = title.match(pattern);
    if (m) {
      if (pattern === patterns[0]) {
        return { cleanTitle: m[1].trim(), series: { name: m[2].trim(), volume: parseInt(m[3]) } };
      }
      return { cleanTitle: m[1].trim(), series: { name: m[3]?.trim() || m[1].trim(), volume: parseInt(m[2]) } };
    }
  }
  return { cleanTitle: title, series: undefined };
}

function inferGenre(categories = [], title = '', synopsis = '') {
  const text = [...categories, title, synopsis].join(' ').toLowerCase();
  for (const [genre, keywords] of Object.entries(GENRE_KEYWORDS)) {
    if (keywords.some(k => text.includes(k))) return genre;
  }
  return 'unknown';
}

function inferTags(categories = [], synopsis = '', genre) {
  const text = [...categories, synopsis].join(' ').toLowerCase();
  const tags = [];
  for (const rule of AUTO_TAG_RULES) {
    if (rule.keywords.some(k => text.includes(k))) {
      if (!tags.find(t => t.label === rule.tag.label)) tags.push(rule.tag);
    }
  }
  if (genre !== 'unknown' && !tags.find(t => t.label === genre)) {
    const typeMap = { thriller: 'thriller', fantasy: 'fantasy', romantasy: 'purple',
      romance: 'romance', 'sci-fi': 'teal', dystopia: 'teal', literary: 'gray' };
    tags.unshift({ label: genre, type: typeMap[genre] || 'gray' });
  }
  return tags;
}

function scoreConfidence(result) {
  let score = 0;
  if (result.isbn13 || result.isbn10) score++;
  if (result.synopsis && result.synopsis.length > 50) score++;
  if (result.coverUrl) score++;
  if (result.pages && result.pages > 0) score++;
  if (result.publisher) score++;
  if (score >= 4) return 'high';
  if (score >= 2) return 'medium';
  return 'low';
}

function extractISBNs(identifiers = []) {
  const result = {};
  for (const id of identifiers) {
    if (id.type === 'ISBN_13') result.isbn13 = id.identifier;
    if (id.type === 'ISBN_10') result.isbn10 = id.identifier;
  }
  return result;
}

function cleanSynopsis(text = '') {
  return text.replace(/<[^>]+>/g, '').replace(/&[a-z]+;/gi, ' ').trim();
}

function isValidISBN(isbn) {
  const clean = isbn.replace(/[-\s]/g, '');
  return /^\d{10}$/.test(clean) || /^\d{13}$/.test(clean);
}

function deduplicateResults(results) {
  const seen = new Map();
  for (const r of results) {
    const key = r.isbn13 || r.isbn10 || `${r.title.toLowerCase()}|${(r.allAuthors[0] || '').toLowerCase()}`;
    if (!seen.has(key)) {
      seen.set(key, r);
    } else {
      // merge: prefer fields from the existing entry, fill gaps from new one
      const existing = seen.get(key);
      const merged = {
        ...existing,
        synopsis:   existing.synopsis  || r.synopsis,
        coverUrl:   existing.coverUrl  || r.coverUrl,
        pages:      existing.pages     || r.pages,
        publisher:  existing.publisher || r.publisher,
        isbn13:     existing.isbn13    || r.isbn13,
        isbn10:     existing.isbn10    || r.isbn10,
        rawCategories: [...new Set([...existing.rawCategories, ...r.rawCategories])],
        sourceApi:  'combined',
      };
      merged.suggestedGenre = inferGenre(merged.rawCategories, merged.title, merged.synopsis || '');
      merged.suggestedTags  = inferTags(merged.rawCategories, merged.synopsis || '', merged.suggestedGenre);
      merged.confidence     = scoreConfidence(merged);
      seen.set(key, merged);
    }
  }
  return [...seen.values()];
}

// ─────────────────────────────────────────────────────────────
// OPEN LIBRARY API
// ─────────────────────────────────────────────────────────────

function normalizeOpenLibraryDoc(doc) {
  const { cleanTitle, series } = detectSeriesFromTitle(doc.title || '');
  const authors = doc.author_name || [];
  const isbns = doc.isbn || [];
  const isbn13 = isbns.find(i => i.length === 13);
  const isbn10 = isbns.find(i => i.length === 10);
  const coverId = doc.cover_i;
  const coverUrl = coverId
    ? `https://covers.openlibrary.org/b/id/${coverId}-L.jpg`
    : (isbn13 ? `https://covers.openlibrary.org/b/isbn/${isbn13}-L.jpg`
      : isbn10 ? `https://covers.openlibrary.org/b/isbn/${isbn10}-L.jpg` : null);
  const categories = doc.subject || [];
  const genre = inferGenre(categories, cleanTitle, '');
  const tags  = inferTags(categories, '', genre);

  const result = {
    title: cleanTitle,
    author: authors[0] || 'Autor desconhecido',
    allAuthors: authors,
    publisher: (doc.publisher || [])[0] || '',
    publishYear: doc.first_publish_year || null,
    pages: doc.number_of_pages_median || null,
    isbn13: isbn13 || null,
    isbn10: isbn10 || null,
    openLibraryId: doc.key || null,
    googleBooksId: null,
    synopsis: null,
    coverUrl,
    coverFallbackUrl: coverId ? `https://covers.openlibrary.org/b/id/${coverId}-M.jpg` : null,
    rawCategories: categories.slice(0, 10),
    suggestedGenre: genre,
    suggestedTags: tags,
    seriesDetected: series || null,
    language: (doc.language || ['por'])[0],
    sourceApi: 'open-library',
    confidence: 'low',
  };
  result.confidence = scoreConfidence(result);
  return result;
}

async function searchOpenLibrary(title, author) {
  const params = new URLSearchParams({ title, limit: '5' });
  if (author) params.set('author', author);
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 8000);
  try {
    const res = await fetch(`https://openlibrary.org/search.json?${params}`, { signal: controller.signal });
    if (!res.ok) return [];
    const data = await res.json();
    return (data.docs || []).slice(0, 5).map(normalizeOpenLibraryDoc);
  } catch {
    return [];
  } finally {
    clearTimeout(timeout);
  }
}

async function fetchByISBNOpenLibrary(isbn) {
  const clean = isbn.replace(/[-\s]/g, '');
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 8000);
  try {
    const res = await fetch(
      `https://openlibrary.org/api/books?bibkeys=ISBN:${clean}&format=json&jscmd=data`,
      { signal: controller.signal }
    );
    if (!res.ok) return null;
    const data = await res.json();
    const book = data[`ISBN:${clean}`];
    if (!book) return null;
    const authors = (book.authors || []).map(a => a.name);
    const publisher = (book.publishers || [])[0]?.name || '';
    const isbn13 = book.identifiers?.isbn_13?.[0] || (clean.length === 13 ? clean : null);
    const isbn10 = book.identifiers?.isbn_10?.[0] || (clean.length === 10 ? clean : null);
    const coverId = book.cover?.large || book.cover?.medium || null;
    const { cleanTitle, series } = detectSeriesFromTitle(book.title || '');
    const categories = (book.subjects || []).map(s => typeof s === 'string' ? s : s.name).slice(0, 10);
    const genre = inferGenre(categories, cleanTitle, '');
    const tags  = inferTags(categories, '', genre);
    const result = {
      title: cleanTitle,
      author: authors[0] || 'Autor desconhecido',
      allAuthors: authors,
      publisher,
      publishYear: book.publish_date ? parseInt(book.publish_date.slice(-4)) : null,
      pages: book.number_of_pages || null,
      isbn13, isbn10,
      openLibraryId: book.key || null,
      googleBooksId: null,
      synopsis: null,
      coverUrl: coverId || (isbn13 ? `https://covers.openlibrary.org/b/isbn/${isbn13}-L.jpg` : null),
      coverFallbackUrl: null,
      rawCategories: categories,
      suggestedGenre: genre,
      suggestedTags: tags,
      seriesDetected: series || null,
      language: 'por',
      sourceApi: 'open-library',
      confidence: 'low',
    };
    result.confidence = scoreConfidence(result);
    return result;
  } catch {
    return null;
  } finally {
    clearTimeout(timeout);
  }
}

// ─────────────────────────────────────────────────────────────
// GOOGLE BOOKS API
// ─────────────────────────────────────────────────────────────

function normalizeGoogleBooksVolume(vol) {
  const info = vol.volumeInfo || {};
  const { cleanTitle, series } = detectSeriesFromTitle(info.title || '');
  const authors = info.authors || [];
  const isbns = extractISBNs(info.industryIdentifiers || []);
  const thumbnail = info.imageLinks?.thumbnail || info.imageLinks?.smallThumbnail || null;
  const coverUrl = thumbnail ? thumbnail.replace('http://', 'https://').replace('&zoom=1', '').replace('zoom=1&', '') + '&zoom=3' : null;
  const categories = info.categories || [];
  const synopsis = cleanSynopsis(info.description || '');
  const genre = inferGenre(categories, cleanTitle, synopsis);
  const tags  = inferTags(categories, synopsis, genre);

  const result = {
    title: cleanTitle,
    author: authors[0] || 'Autor desconhecido',
    allAuthors: authors,
    publisher: info.publisher || '',
    publishYear: info.publishedDate ? parseInt(info.publishedDate.slice(0, 4)) : null,
    pages: info.pageCount || null,
    isbn13: isbns.isbn13 || null,
    isbn10: isbns.isbn10 || null,
    openLibraryId: null,
    googleBooksId: vol.id || null,
    synopsis: synopsis || null,
    coverUrl,
    coverFallbackUrl: null,
    rawCategories: categories,
    suggestedGenre: genre,
    suggestedTags: tags,
    seriesDetected: series || null,
    language: info.language || 'pt',
    sourceApi: 'google-books',
    confidence: 'low',
  };
  result.confidence = scoreConfidence(result);
  return result;
}

async function searchGoogleBooks(title, author) {
  let q = `intitle:${encodeURIComponent(title)}`;
  if (author) q += `+inauthor:${encodeURIComponent(author)}`;
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 8000);
  try {
    const res = await fetch(
      `https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=5`,
      { signal: controller.signal }
    );
    if (!res.ok) return [];
    const data = await res.json();
    return (data.items || []).slice(0, 5).map(normalizeGoogleBooksVolume);
  } catch {
    return [];
  } finally {
    clearTimeout(timeout);
  }
}

async function fetchByISBNGoogle(isbn) {
  const clean = isbn.replace(/[-\s]/g, '');
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 8000);
  try {
    const res = await fetch(
      `https://www.googleapis.com/books/v1/volumes?q=isbn:${clean}`,
      { signal: controller.signal }
    );
    if (!res.ok) return null;
    const data = await res.json();
    const item = (data.items || [])[0];
    return item ? normalizeGoogleBooksVolume(item) : null;
  } catch {
    return null;
  } finally {
    clearTimeout(timeout);
  }
}

// ─────────────────────────────────────────────────────────────
// BOOK SEARCH SERVICE (orchestrator)
// ─────────────────────────────────────────────────────────────

async function searchBooks(title, author) {
  const [olResults, gbResults] = await Promise.all([
    searchOpenLibrary(title, author),
    searchGoogleBooks(title, author),
  ]);
  const all = [...gbResults, ...olResults];
  const deduped = deduplicateResults(all);
  return deduped
    .sort((a, b) => {
      const order = { high: 0, medium: 1, low: 2 };
      return order[a.confidence] - order[b.confidence];
    })
    .slice(0, 5);
}

async function searchBookByISBN(isbn) {
  const [ol, gb] = await Promise.all([
    fetchByISBNOpenLibrary(isbn),
    fetchByISBNGoogle(isbn),
  ]);
  if (ol && gb) {
    const merged = {
      ...ol,
      synopsis:   ol.synopsis   || gb.synopsis,
      coverUrl:   ol.coverUrl   || gb.coverUrl,
      pages:      ol.pages      || gb.pages,
      publisher:  gb.publisher  || ol.publisher,
      rawCategories: [...new Set([...ol.rawCategories, ...gb.rawCategories])],
      googleBooksId: gb.googleBooksId,
      sourceApi: 'combined',
    };
    merged.suggestedGenre = inferGenre(merged.rawCategories, merged.title, merged.synopsis || '');
    merged.suggestedTags  = inferTags(merged.rawCategories, merged.synopsis || '', merged.suggestedGenre);
    merged.confidence     = scoreConfidence(merged);
    return merged;
  }
  return ol || gb || null;
}

// ─────────────────────────────────────────────────────────────
// CLAUDE ENRICHMENT (chamada direta — requer chave API)
// ─────────────────────────────────────────────────────────────

async function enrichWithClaude(bookData, apiKey) {
  if (!apiKey) throw new Error('Chave API não configurada.');

  const prompt = `Você é um especialista em literatura. Analise os dados brutos abaixo sobre um livro e retorne um JSON enriquecido.

DADOS BRUTOS:
${JSON.stringify({ title: bookData.title, author: bookData.author, publisher: bookData.publisher, publishYear: bookData.publishYear, pages: bookData.pages, synopsis: bookData.synopsis, rawCategories: bookData.rawCategories }, null, 2)}

INSTRUÇÕES:
1. "synopsis": escreva em português (pt-BR), 3 a 5 frases descritivas. Se já houver, melhore e traduza.
2. "suggestedGenre": escolha UM dos valores: thriller | fantasy | romantasy | romance | sci-fi | dystopia | literary | unknown
3. "suggestedTags": array de objetos { "label": string, "type": string }. Gere entre 3 e 8 tags relevantes.
   - Tipos disponíveis: "pink" (tropos de romance), "purple" (fantasia/magia), "thriller" (suspense/crime), "teal" (ficção histórica, autoras brasileiras, sci-fi), "amber" (YA, séries, prêmios, adaptações), "gray" (outros)
   - Exemplos de labels úteis: "enemies to lovers", "slow burn", "dual POV", "plot twist", "YA", "série", "ficção histórica", "autora brasileira", "sistema de magia", "vingança", "mitologia", "premiado", "adaptado", "segunda chance", "amor proibido", "chosen one", "dark academia", "coming of age", "morally grey", "found family"
4. "seriesName": nome da série se detectado, ou null
5. "seriesVolume": número do volume se detectado, ou null
6. "pages": número de páginas se souber com certeza, senão mantenha o original
7. "publisher": editora se souber, senão mantenha o original

Retorne SOMENTE JSON válido, sem texto extra:
{
  "title": string,
  "author": string,
  "allAuthors": string[],
  "publisher": string,
  "publishYear": number | null,
  "pages": number | null,
  "synopsis": string,
  "suggestedGenre": string,
  "suggestedTags": [{ "label": string, "type": string }],
  "seriesName": string | null,
  "seriesVolume": number | null,
  "seriesDetected": boolean
}`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 2048,
      messages: [{ role: 'user', content: prompt }],
    }),
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Erro ${response.status} na API Claude`);
  }

  const data = await response.json();
  const text = data?.content?.[0]?.text || '';
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('Resposta inválida do Claude.');
  const enriched = JSON.parse(jsonMatch[0]);

  return {
    ...bookData,
    title:          enriched.title          || bookData.title,
    author:         enriched.author         || bookData.author,
    allAuthors:     enriched.allAuthors     || bookData.allAuthors,
    publisher:      enriched.publisher      || bookData.publisher,
    publishYear:    enriched.publishYear    ?? bookData.publishYear,
    pages:          enriched.pages          ?? bookData.pages,
    synopsis:       enriched.synopsis       || bookData.synopsis,
    suggestedGenre: enriched.suggestedGenre || bookData.suggestedGenre,
    suggestedTags:  enriched.suggestedTags?.length
      ? enriched.suggestedTags.map(t => typeof t === 'string' ? { label: t, type: 'gray' } : t)
      : bookData.suggestedTags,
    seriesDetected: enriched.seriesDetected ?? bookData.seriesDetected,
    seriesName:     enriched.seriesName     || bookData.seriesName,
    seriesVolume:   enriched.seriesVolume   ?? bookData.seriesVolume,
    enrichedByAI:   true,
  };
}

// COMPONENTS

const { useState, useCallback, useRef } = React;

// --- Tag Badge ---
function TagBadge({ tag, onRemove }) {
  return (
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-semibold border ${TAG_COLORS[tag.type] || TAG_COLORS.gray}`}>
      {tag.label}
      {onRemove && (
        <button type="button" onClick={onRemove} className="hover:opacity-60 leading-none">×</button>
      )}
    </span>
  );
}

// --- Confidence Badge ---
function ConfidenceBadge({ level }) {
  const styles = {
    high:   'bg-emerald-100 text-emerald-700 border-emerald-200',
    medium: 'bg-amber-100 text-amber-700 border-amber-200',
    low:    'bg-red-100 text-red-600 border-red-200',
  };
  const labels = { high: '● alta', medium: '● média', low: '● baixa' };
  return (
    <span className={`text-[10px] font-bold border rounded-full px-2 py-0.5 ${styles[level]}`}>
      {labels[level]}
    </span>
  );
}

// --- Cover Image ---
function CoverImage({ url, title, size = 'sm' }) {
  const [failed, setFailed] = useState(false);
  const dims = size === 'sm' ? 'w-12 h-16' : 'w-24 h-32';
  const initials = (title || '?').split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();

  if (!url || failed) {
    return (
      <div className={`${dims} rounded-lg bg-gradient-to-br from-[#1E3A5F] to-[#14B8A6] flex items-center justify-center text-white font-bold text-xs shrink-0`}>
        {initials}
      </div>
    );
  }
  return (
    <img
      src={url}
      alt={title}
      className={`${dims} object-cover rounded-lg shrink-0`}
      onError={() => setFailed(true)}
    />
  );
}

// --- Search Input ---
function BookSearchInput({ onSearch, isLoading }) {
  const [query, setQuery]       = useState('');
  const [author, setAuthor]     = useState('');
  const [isbn, setIsbn]         = useState('');
  const [showAuthor, setShowAuthor] = useState(false);
  const [showIsbn, setShowIsbn] = useState(false);
  const [isbnError, setIsbnError] = useState('');

  const handleSearch = () => {
    if (!query.trim()) return;
    onSearch({ type: 'title', query: query.trim(), author: author.trim() });
  };

  const handleISBN = () => {
    const clean = isbn.replace(/[-\s]/g, '');
    if (!isValidISBN(clean)) {
      setIsbnError('ISBN inválido. Use 10 ou 13 dígitos.');
      return;
    }
    setIsbnError('');
    onSearch({ type: 'isbn', isbn: clean });
  };

  return (
    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 space-y-3">
      <p className="text-[11px] uppercase tracking-widest text-[#1E3A5F] font-black">Buscar livro</p>

      {/* Title row */}
      <div className="flex gap-2">
        <div className="relative flex-1">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
          </svg>
          <input
            className="w-full pl-9 pr-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#14B8A6]/30 focus:border-[#14B8A6] transition-all"
            placeholder="Digite o título do livro..."
            value={query}
            onChange={e => setQuery(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleSearch()}
          />
        </div>
        <button
          type="button"
          onClick={handleSearch}
          disabled={isLoading || !query.trim()}
          className="px-4 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-semibold disabled:opacity-50 hover:bg-[#162d4a] transition-colors"
        >
          {isLoading ? (
            <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin" />
          ) : 'Buscar'}
        </button>
      </div>

      {/* Author (optional) */}
      {showAuthor && (
        <input
          className="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#14B8A6]/30 focus:border-[#14B8A6] transition-all animate-fade-in"
          placeholder="Autor (opcional — melhora a precisão)"
          value={author}
          onChange={e => setAuthor(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && handleSearch()}
        />
      )}

      {/* ISBN row */}
      {showIsbn && (
        <div className="animate-fade-in space-y-1">
          <div className="flex gap-2">
            <input
              className="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#14B8A6]/30 focus:border-[#14B8A6] transition-all"
              placeholder="ISBN (10 ou 13 dígitos)"
              value={isbn}
              onChange={e => { setIsbn(e.target.value); setIsbnError(''); }}
              onKeyDown={e => e.key === 'Enter' && handleISBN()}
            />
            <button
              type="button"
              onClick={handleISBN}
              disabled={isLoading || !isbn.trim()}
              className="px-4 py-2.5 rounded-xl bg-[#14B8A6] text-white text-sm font-semibold disabled:opacity-50 hover:bg-[#0ea5e9] transition-colors"
            >
              ISBN
            </button>
          </div>
          {isbnError && <p className="text-xs text-red-500">{isbnError}</p>}
        </div>
      )}

      {/* Toggle buttons */}
      <div className="flex gap-3">
        <button
          type="button"
          onClick={() => setShowAuthor(v => !v)}
          className="text-xs text-[#14B8A6] hover:underline"
        >
          {showAuthor ? '− Ocultar autor' : '+ Buscar com autor'}
        </button>
        <button
          type="button"
          onClick={() => setShowIsbn(v => !v)}
          className="text-xs text-[#14B8A6] hover:underline"
        >
          {showIsbn ? '− Ocultar ISBN' : '+ Buscar por ISBN'}
        </button>
      </div>
    </div>
  );
}

// --- Search Results ---
function BookSearchResults({ results, onSelect }) {
  if (!results.length) return null;
  return (
    <div className="space-y-2 animate-fade-in">
      <p className="text-[11px] uppercase tracking-widest text-gray-400 font-black px-1">
        {results.length} resultado{results.length !== 1 ? 's' : ''} encontrado{results.length !== 1 ? 's' : ''}
      </p>
      {results.map((r, idx) => (
        <div key={idx} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 flex gap-3 hover:border-[#14B8A6]/40 transition-colors">
          <CoverImage url={r.coverUrl} title={r.title} size="sm" />
          <div className="flex-1 min-w-0">
            <div className="flex items-start justify-between gap-2">
              <div className="min-w-0">
                <p className="font-semibold text-[#1E3A5F] text-sm line-clamp-2 leading-tight">{r.title}</p>
                <p className="text-xs text-gray-500 mt-0.5">{r.allAuthors.join(', ')}</p>
                <div className="flex flex-wrap gap-1.5 items-center mt-1.5">
                  {r.publishYear && <span className="text-[11px] text-gray-400">{r.publishYear}</span>}
                  {r.publisher && <span className="text-[11px] text-gray-400">· {r.publisher}</span>}
                  {r.pages && <span className="text-[11px] text-gray-400">· {r.pages} pág.</span>}
                </div>
                <div className="mt-1.5 flex items-center gap-2">
                  <ConfidenceBadge level={r.confidence} />
                  <span className="text-[10px] text-gray-400 uppercase tracking-wide">{r.sourceApi}</span>
                </div>
              </div>
              <button
                type="button"
                onClick={() => onSelect(r)}
                className="shrink-0 px-3 py-1.5 rounded-xl bg-[#1E3A5F] text-white text-xs font-semibold hover:bg-[#14B8A6] transition-colors whitespace-nowrap"
              >
                Selecionar →
              </button>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// --- Inline Editable Field ---
function EditableField({ label, value, onChange, multiline, type = 'text' }) {
  const [editing, setEditing] = useState(false);
  const inputRef = useRef(null);

  React.useEffect(() => {
    if (editing && inputRef.current) inputRef.current.focus();
  }, [editing]);

  return (
    <div className="flex items-start gap-2 py-1.5 border-b border-gray-50 last:border-0">
      <span className="text-[11px] text-gray-400 uppercase tracking-wider font-bold w-20 shrink-0 pt-0.5">{label}</span>
      <div className="flex-1 min-w-0">
        {editing ? (
          multiline ? (
            <textarea
              ref={inputRef}
              className="w-full text-sm text-gray-800 border border-[#14B8A6]/50 rounded-lg px-2 py-1 focus:outline-none resize-none"
              rows={3}
              value={value || ''}
              onChange={e => onChange(e.target.value)}
              onBlur={() => setEditing(false)}
            />
          ) : (
            <input
              ref={inputRef}
              type={type}
              className="w-full text-sm text-gray-800 border border-[#14B8A6]/50 rounded-lg px-2 py-1 focus:outline-none"
              value={value || ''}
              onChange={e => onChange(e.target.value)}
              onBlur={() => setEditing(false)}
            />
          )
        ) : (
          <p className={`text-sm text-gray-800 ${multiline ? 'line-clamp-3' : 'truncate'} ${!value ? 'text-gray-300 italic' : ''}`}>
            {value || '—'}
          </p>
        )}
      </div>
      <button
        type="button"
        onClick={() => setEditing(v => !v)}
        className="text-gray-300 hover:text-[#14B8A6] transition-colors shrink-0 mt-0.5"
        title="Editar"
      >
        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
          <path strokeLinecap="round" strokeLinejoin="round" d="M15.232 5.232l3.536 3.536M9 11l6-6 3 3-6 6H9v-3z" />
        </svg>
      </button>
    </div>
  );
}

// --- Book Data Preview ---
function BookDataPreview({ result, onConfirm, onBack }) {
  const [data, setData] = useState({ ...result });
  const [newTag, setNewTag] = useState('');

  const update = (field) => (value) => setData(prev => ({ ...prev, [field]: value }));

  const removeTag = (idx) => setData(prev => ({
    ...prev,
    suggestedTags: prev.suggestedTags.filter((_, i) => i !== idx),
  }));

  const addTag = () => {
    if (!newTag.trim()) return;
    setData(prev => ({
      ...prev,
      suggestedTags: [...prev.suggestedTags, { label: newTag.trim(), type: 'gray' }],
    }));
    setNewTag('');
  };

  const GENRE_OPTIONS = ['thriller', 'romance', 'fantasy', 'romantasy', 'sci-fi', 'literary', 'dystopia', 'unknown'];

  return (
    <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 animate-fade-in space-y-4">
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-2">
          <p className="text-[11px] uppercase tracking-widest text-[#1E3A5F] font-black">Pré-visualização do card</p>
          {result.enrichedByAI && (
            <span className="text-[10px] bg-[#14B8A6]/10 text-[#14B8A6] border border-[#14B8A6]/20 rounded-full px-2 py-0.5 font-bold">✦ Claude</span>
          )}
        </div>
        <button type="button" onClick={onBack} className="text-xs text-gray-400 hover:text-gray-600 transition-colors">
          ← Nova busca
        </button>
      </div>

      {/* Cover + Fields */}
      <div className="flex gap-4">
        <CoverImage url={data.coverUrl} title={data.title} size="lg" />
        <div className="flex-1 min-w-0 space-y-0.5">
          <EditableField label="Título"   value={data.title}       onChange={update('title')} />
          <EditableField label="Autor"    value={data.author}      onChange={update('author')} />
          <EditableField label="Editora"  value={data.publisher}   onChange={update('publisher')} />
          <EditableField label="Ano"      value={data.publishYear} onChange={v => update('publishYear')(parseInt(v) || null)} type="number" />
          <EditableField label="Páginas"  value={data.pages}       onChange={v => update('pages')(parseInt(v) || null)} type="number" />
        </div>
      </div>

      {/* Synopsis */}
      <div>
        <p className="text-[11px] text-gray-400 uppercase tracking-wider font-bold mb-1">Sinopse</p>
        <EditableField label="" value={data.synopsis} onChange={update('synopsis')} multiline />
        {data.synopsis && data.language && !['pt', 'por'].includes(data.language) && (
          <p className="text-[10px] text-amber-500 mt-0.5">(sinopse em inglês — você pode editar acima)</p>
        )}
      </div>

      {/* Genre */}
      <div className="flex items-center gap-3">
        <p className="text-[11px] text-gray-400 uppercase tracking-wider font-bold w-20 shrink-0">Gênero</p>
        <select
          className="text-sm border border-gray-200 rounded-lg px-2 py-1 focus:outline-none focus:border-[#14B8A6] transition-colors"
          value={data.suggestedGenre}
          onChange={e => setData(prev => ({ ...prev, suggestedGenre: e.target.value }))}
        >
          {GENRE_OPTIONS.map(g => <option key={g} value={g}>{g}</option>)}
        </select>
        <ConfidenceBadge level={data.confidence} />
      </div>

      {/* Tags */}
      <div>
        <p className="text-[11px] text-gray-400 uppercase tracking-wider font-bold mb-2">Tags geradas automaticamente</p>
        <div className="flex flex-wrap gap-1.5">
          {data.suggestedTags.map((tag, idx) => (
            <TagBadge key={idx} tag={tag} onRemove={() => removeTag(idx)} />
          ))}
          <div className="flex items-center gap-1">
            <input
              className="text-xs border border-gray-200 rounded-full px-2 py-0.5 w-28 focus:outline-none focus:border-[#14B8A6]"
              placeholder="+ nova tag"
              value={newTag}
              onChange={e => setNewTag(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addTag()}
            />
          </div>
        </div>
      </div>

      {/* Series */}
      <div>
        <p className="text-[11px] text-gray-400 uppercase tracking-wider font-bold mb-2">Série</p>
        <div className="flex items-center gap-3 flex-wrap">
          <label className="flex items-center gap-1.5 text-sm text-gray-600 cursor-pointer">
            <input
              type="radio"
              checked={!data.seriesDetected}
              onChange={() => setData(prev => ({ ...prev, seriesDetected: null }))}
            />
            Não é série
          </label>
          <label className="flex items-center gap-1.5 text-sm text-gray-600 cursor-pointer">
            <input
              type="radio"
              checked={!!data.seriesDetected}
              onChange={() => setData(prev => ({ ...prev, seriesDetected: { name: '', volume: 1 } }))}
            />
            É série
          </label>
          {data.seriesDetected && (
            <div className="flex gap-2 items-center animate-fade-in">
              <input
                className="text-sm border border-gray-200 rounded-lg px-2 py-1 w-36 focus:outline-none focus:border-[#14B8A6]"
                placeholder="Nome da série"
                value={data.seriesDetected.name}
                onChange={e => setData(prev => ({ ...prev, seriesDetected: { ...prev.seriesDetected, name: e.target.value } }))}
              />
              <span className="text-sm text-gray-400">Vol.</span>
              <input
                type="number"
                min="1"
                className="text-sm border border-gray-200 rounded-lg px-2 py-1 w-14 focus:outline-none focus:border-[#14B8A6]"
                value={data.seriesDetected.volume}
                onChange={e => setData(prev => ({ ...prev, seriesDetected: { ...prev.seriesDetected, volume: parseInt(e.target.value) || 1 } }))}
              />
            </div>
          )}
        </div>
      </div>

      {/* Cover URL edit */}
      <EditableField label="URL capa" value={data.coverUrl} onChange={update('coverUrl')} />

      {/* IDs */}
      <div className="text-[10px] text-gray-300 space-y-0.5">
        {data.isbn13 && <p>ISBN-13: {data.isbn13}</p>}
        {data.isbn10 && <p>ISBN-10: {data.isbn10}</p>}
        {data.openLibraryId && <p>Open Library: {data.openLibraryId}</p>}
        {data.googleBooksId && <p>Google Books: {data.googleBooksId}</p>}
      </div>

      {/* Actions */}
      <div className="flex gap-3 pt-2">
        <button
          type="button"
          onClick={onBack}
          className="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-colors"
        >
          ← Nova busca
        </button>
        <button
          type="button"
          onClick={() => onConfirm(data)}
          className="flex-1 px-4 py-2.5 rounded-xl bg-[#14B8A6] text-white text-sm font-semibold hover:bg-[#0ea5e9] transition-colors shadow-md shadow-[#14B8A6]/20"
        >
          Adicionar ao catálogo ✓
        </button>
      </div>
    </div>
  );
}

// --- JSON Output Viewer ---
function JSONViewer({ data }) {
  const [copied, setCopied] = useState(false);
  const json = JSON.stringify(data, null, 2);
  const copy = () => {
    navigator.clipboard.writeText(json).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };
  return (
    <div className="bg-[#1E3A5F] rounded-2xl p-4 animate-fade-in">
      <div className="flex justify-between items-center mb-3">
        <p className="text-[11px] uppercase tracking-widest text-white/60 font-black">JSON normalizado</p>
        <button type="button" onClick={copy} className="text-xs text-[#14B8A6] hover:text-white transition-colors">
          {copied ? 'Copiado!' : 'Copiar'}
        </button>
      </div>
      <pre className="text-[11px] text-[#14B8A6] overflow-x-auto whitespace-pre-wrap leading-relaxed max-h-64 overflow-y-auto">
        {json}
      </pre>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────

function App() {
  const [isLoading, setIsLoading]   = useState(false);
  const [isEnriching, setIsEnriching] = useState(false);
  const [results, setResults]       = useState([]);
  const [selected, setSelected]     = useState(null);
  const [confirmed, setConfirmed]   = useState(null);
  const [error, setError]           = useState(null);
  const [claudeError, setClaudeError] = useState(null);
  const [apiKey, setApiKey]         = useState(() => localStorage.getItem('anthropic_api_key') || '');
  const [apiKeyInput, setApiKeyInput] = useState('');
  const [showKeyInput, setShowKeyInput] = useState(false);

  const saveApiKey = () => {
    const k = apiKeyInput.trim();
    if (!k) return;
    localStorage.setItem('anthropic_api_key', k);
    setApiKey(k);
    setApiKeyInput('');
    setShowKeyInput(false);
  };
  const clearApiKey = () => {
    localStorage.removeItem('anthropic_api_key');
    setApiKey('');
  };

  const handleSearch = useCallback(async ({ type, query, author, isbn }) => {
    setIsLoading(true);
    setError(null);
    setClaudeError(null);
    setResults([]);
    setSelected(null);
    setConfirmed(null);

    try {
      if (type === 'isbn') {
        const result = await searchBookByISBN(isbn);
        if (result) setResults([result]);
        else setError(`Nenhum livro encontrado para o ISBN "${isbn}".`);
      } else {
        const found = await searchBooks(query, author);
        if (found.length) setResults(found);
        else setError(`Não encontramos "${query}". Tente o título em inglês ou adicione o autor.`);
      }
    } catch {
      setError('Erro inesperado ao buscar. Verifique sua conexão.');
    } finally {
      setIsLoading(false);
    }
  }, []);

  const handleSelect = useCallback(async (result) => {
    setResults([]);
    setClaudeError(null);
    if (!apiKey) {
      // Sem chave: usa dado bruto sem tentar enriquecer
      setSelected(result);
      return;
    }
    setIsEnriching(true);
    try {
      const enriched = await enrichWithClaude(result, apiKey);
      setSelected(enriched);
    } catch (err) {
      console.error('[Claude enrichment error]', err);
      setClaudeError(err.message || 'Erro ao conectar com Claude.');
      setSelected(result); // fallback: usa dado bruto
    } finally {
      setIsEnriching(false);
    }
  }, [apiKey]);

  const handleConfirm = (data) => {
    setConfirmed(data);
    setSelected(null);
  };

  const handleBack = () => {
    setSelected(null);
    setConfirmed(null);
    setResults([]);
    setError(null);
    setClaudeError(null);
  };

  return (
    <div className="min-h-screen bg-slate-50 py-10 px-4">
      <div className="max-w-xl mx-auto space-y-4">

        {/* Header */}
        <div className="mb-2">
          <h1 className="text-2xl font-bold text-[#1E3A5F]">Book Search</h1>
          <p className="text-sm text-gray-400 mt-1">Open Library + Google Books + Claude AI</p>
        </div>

        {/* Claude API Key */}
        {!confirmed && !isEnriching && (
          <div className="bg-white rounded-2xl border border-gray-100 shadow-sm px-4 py-3 space-y-2">
            {apiKey ? (
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="w-2 h-2 rounded-full bg-emerald-400" />
                  <span className="text-xs text-gray-500">Claude ativo — enriquecimento automático</span>
                </div>
                <button type="button" onClick={clearApiKey} className="text-[11px] text-red-400 hover:text-red-600">Remover chave</button>
              </div>
            ) : (
              <div>
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-2 h-2 rounded-full bg-amber-400" />
                  <span className="text-xs text-gray-500">Claude inativo — configure sua chave para enriquecer dados</span>
                  <button type="button" onClick={() => setShowKeyInput(v => !v)} className="ml-auto text-[11px] text-[#14B8A6] hover:underline">{showKeyInput ? 'Cancelar' : 'Configurar'}</button>
                </div>
                {showKeyInput && (
                  <div className="flex gap-2">
                    <input
                      type="password"
                      placeholder="sk-ant-..."
                      value={apiKeyInput}
                      onChange={e => setApiKeyInput(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && saveApiKey()}
                      className="flex-1 px-3 py-1.5 text-xs border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-[#14B8A6]/30"
                    />
                    <button type="button" onClick={saveApiKey} className="px-3 py-1.5 bg-[#14B8A6] text-white text-xs font-bold rounded-lg">Salvar</button>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* Search Input */}
        {!confirmed && !isEnriching && (
          <BookSearchInput onSearch={handleSearch} isLoading={isLoading} />
        )}

        {/* Searching loading */}
        {isLoading && (
          <div className="text-center py-8 animate-fade-in">
            <div className="w-6 h-6 border-2 border-[#14B8A6]/30 border-t-[#14B8A6] rounded-full animate-spin mx-auto mb-3" />
            <p className="text-sm text-gray-400">Buscando em Open Library e Google Books...</p>
          </div>
        )}

        {/* Claude enriching loading */}
        {isEnriching && (
          <div className="text-center py-12 animate-fade-in">
            <div className="w-8 h-8 border-2 border-[#14B8A6]/20 border-t-[#14B8A6] rounded-full animate-spin mx-auto mb-4" />
            <p className="text-sm font-semibold text-[#1E3A5F]">Enriquecendo com Claude...</p>
            <p className="text-xs text-gray-400 mt-1">Traduzindo sinopse, inferindo gênero e tags</p>
          </div>
        )}

        {/* Claude error (non-blocking) */}
        {claudeError && !isEnriching && (
          <div className="bg-red-50 border border-red-200 rounded-2xl px-4 py-3 animate-fade-in space-y-1">
            <p className="text-xs font-bold text-red-700">Claude não conseguiu enriquecer os dados</p>
            <p className="text-xs font-mono text-red-600 break-all">{claudeError}</p>
            <p className="text-xs text-red-500">Exibindo dados brutos das APIs. {apiKey ? 'Verifique se a chave é válida em' : 'Configure sua chave em'} <strong>console.anthropic.com</strong>.</p>
          </div>
        )}

        {/* Search error */}
        {error && !isLoading && (
          <div className="bg-red-50 border border-red-100 rounded-2xl px-4 py-3 text-sm text-red-600 animate-fade-in">
            {error}
          </div>
        )}

        {/* Results */}
        {!isLoading && !isEnriching && !selected && !confirmed && (
          <BookSearchResults results={results} onSelect={handleSelect} />
        )}

        {/* Preview */}
        {selected && !isEnriching && !confirmed && (
          <BookDataPreview result={selected} onConfirm={handleConfirm} onBack={handleBack} />
        )}

        {/* Confirmed */}
        {confirmed && (
          <div className="space-y-4 animate-fade-in">
            <div className="bg-emerald-50 border border-emerald-200 rounded-2xl px-4 py-3 text-sm text-emerald-700 font-semibold flex items-center justify-between">
              <span>✓ "{confirmed.title}" adicionado ao catálogo</span>
              <button type="button" onClick={handleBack} className="text-xs font-normal underline">
                Nova busca
              </button>
            </div>
            <JSONViewer data={confirmed} />
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
