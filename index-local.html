    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- 0. CONFIGURAÇÃO DO BANCO DE DADOS NA NUVEM ---

        // Funções para salvar/carregar dados do Firebase
        const waitForDb = async () => false;

        const saveToCloud = async (key, data, setSyncStatus) => {
            try {
                if (!window.db) {
                    const ready = await waitForDb();
                    if (!ready) {
                        if (setSyncStatus) setSyncStatus("offline");
                        localStorage.setItem(key, JSON.stringify(data));
                        return;
                    }
                }

                const userId = window.auth.currentUser ? window.auth.currentUser.uid : 'default-user'; // Para múltiplos usuários, use autenticação
                await setDoc(doc(window.db, 'users', userId, 'data', key), {
                    data: data,
                    timestamp: new Date().toISOString()
                });
                if (setSyncStatus) setSyncStatus("online");
            } catch (error) {
                console.error('Erro ao salvar na nuvem:', error);
                if (setSyncStatus) setSyncStatus("offline");
                // Fallback para localStorage
                localStorage.setItem(key, JSON.stringify(data));
            }
        };

        const loadFromCloud = async (key, defaultValue = {}, setSyncStatus) => {
            try {
                if (!window.db) {
                    const ready = await waitForDb();
                    if (!ready) {
                        if (setSyncStatus) setSyncStatus("offline");
                        return defaultValue;
                    }
                }
                const userId = window.auth.currentUser ? window.auth.currentUser.uid : 'default-user';
                const docRef = doc(window.db, 'users', userId, 'data', key);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    if (setSyncStatus) setSyncStatus("online");
                    return docSnap.data().data;
                } else {
                    if (setSyncStatus) setSyncStatus("online");
                    // Tenta carregar do localStorage como fallback
                    const localData = localStorage.getItem(key);
                    return localData ? JSON.parse(localData) : defaultValue;
                }
            } catch (error) {
                console.error('Erro ao carregar da nuvem:', error);
                if (setSyncStatus) setSyncStatus("offline");
                // Fallback para localStorage
                const localData = localStorage.getItem(key);
                return localData ? JSON.parse(localData) : defaultValue;
            }
        };

        // --- 1. CONFIGURAÇÕES E HELPERS (DEFINIDOS NO TOPO) ---

        // --- 3. COMPONENTES DE UI ---

        function AnimatedStatCard({ label, value }) {
            const [dV, setDV] = useState(value);
            useEffect(() => {
                if (dV === value) return;
                const t = setInterval(() => setDV(p => (p < value ? p + 1 : p - 1)), 30);
                return () => clearInterval(t);
            }, [value, dV]);
            return (
                <div className="bg-white/5 backdrop-blur-md border border-white/10 p-3 md:p-5 rounded-3xl flex flex-col items-center justify-center min-w-[80px] md:min-w-[140px] transition-transform hover:scale-105 duration-300">
                    <span className="text-xl md:text-5xl font-serif font-bold text-[#14B8A6] leading-none mb-1 md:mb-2">{dV}</span>
                    <span className="text-[8px] md:text-[11px] uppercase tracking-widest text-white/40 font-bold text-center">{label}</span>
                </div>
            );
        }

        function BookCard({ book, coverUrl, onClick, isQueueMode, queueIndex, totalInQueue, onMove, onRemoveFromQueue, onGenreClick }) {
            const styles = getGenreStyles(book.genre);
            if (isQueueMode) {
                return (
                    <div className="bg-white p-4 rounded-[28px] border border-gray-100 flex items-center gap-4 md:gap-6 shadow-sm hover:shadow-md transition-all group animate-fade-in">
                        <div className="text-xl md:text-2xl font-serif font-black text-gray-200 w-6 md:w-8 text-center">{queueIndex + 1}</div>
                        <div className="w-12 h-18 md:w-16 md:h-24 rounded-lg overflow-hidden shrink-0 shadow-md">
                            <img src={coverUrl} className="w-full h-full object-cover" alt={book.title} />
                        </div>
                        <div className="flex-1 min-w-0 cursor-pointer" onClick={onClick}>
                            <h4 className="font-bold text-sm text-[#1E3A5F] truncate">{book.title}</h4>
                            <p className="text-xs text-gray-400 truncate">{book.author}</p>
                            <span className={`inline-block mt-2 text-[8px] font-black uppercase tracking-widest px-2 py-0.5 rounded border ${styles.bg} ${styles.text} ${styles.border}`}>{book.genre}</span>
                        </div>
                        <div className="flex items-center gap-1 md:gap-2">
                            <div className="flex flex-col gap-1">
                                <button onClick={() => onMove(queueIndex, -1)} disabled={queueIndex === 0} className="p-1.5 md:p-2 bg-gray-50 rounded-lg text-gray-400 hover:text-[#14B8A6]"><Icon name="up" /></button>
                                <button onClick={() => onMove(queueIndex, 1)} disabled={queueIndex === totalInQueue - 1} className="p-1.5 md:p-2 bg-gray-50 rounded-lg text-gray-400 hover:text-[#14B8A6]"><Icon name="down" /></button>
                            </div>
                            <button onClick={onRemoveFromQueue} className="p-2 md:p-3 bg-red-50 text-red-400 rounded-xl hover:bg-red-100 transition-colors"><Icon name="trash" /></button>
                        </div>
                    </div>
                );
            }
            return (
                <div onClick={onClick} className="book-card-hover group relative bg-white rounded-[24px] overflow-hidden border border-transparent hover:border-[#14B8A6] hover:shadow-2xl hover:shadow-[#14B8A6]/10 cursor-pointer flex flex-col h-full animate-fade-in">
                    <div className="relative aspect-[3/4.2] overflow-hidden bg-gray-50">
                        <img src={coverUrl} alt={book.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" loading="lazy" onError={(e) => { e.target.src='https://via.placeholder.com/300x450?text=Sem+Capa'; }} />
                        <div className="absolute top-3 left-3 right-3 flex flex-col gap-1.5 pointer-events-none z-10">
                            {book.isDistopia && <span className="bg-[#EF4444] text-white text-[9px] font-black px-2.5 py-1 rounded shadow-lg uppercase tracking-wider w-fit">DISTOPIA</span>}
                            {book.isBrazilianAuthor && (
                                <span className="bg-[#14B8A6] text-white text-[9px] font-black px-2.5 py-1 rounded shadow-lg uppercase tracking-wider w-fit flex items-center gap-1.5 shadow-md">
                                    <span className="text-[11px]">🇧🇷</span> NACIONAL
                                </span>
                            )}
                        </div>
                        <div className="absolute inset-0 bg-[#1E3A5F]/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center backdrop-blur-[2px] z-20">
                            <span className="bg-white text-[#1E3A5F] px-5 py-2.5 rounded-full text-[11px] font-black shadow-xl">VER DETALHES</span>
                        </div>
                    </div>
                    <div className="p-4 flex-1 flex flex-col bg-white">
                        <h3 className="font-bold text-[13px] md:text-sm leading-[1.4] line-clamp-2 mb-1 group-hover:text-[#14B8A6] transition-colors">{book.title}</h3>
                        <p className="text-gray-400 text-[10px] md:text-[11px] font-medium truncate mb-3">{book.author}</p>
                        <div className="flex flex-wrap gap-1 mt-auto">
                            <span 
                                onClick={(e) => { e.stopPropagation(); onGenreClick(book.genre); }}
                                className={`text-[8px] md:text-[9px] font-black uppercase tracking-widest px-2 py-0.5 rounded border cursor-pointer hover:shadow-sm transition-all ${styles.bg} ${styles.text} ${styles.border}`}
                            >
                                {book.genre}
                            </span>
                        </div>
                    </div>
                </div>
            );
        }

            const styles = getGenreStyles(book.genre);
            const [isConfirmingDelete, setIsConfirmingDelete] = useState(false);

            return (

                    <div className="relative bg-white w-full max-w-4xl max-h-[92vh] overflow-y-auto sm:rounded-[40px] rounded-t-[32px] shadow-2xl flex flex-col animate-slide-up z-10">
                        <div className="flex justify-between items-center px-6 md:px-10 py-5 border-b border-gray-50 sticky top-0 bg-white/95 backdrop-blur-md z-20">
                            <span className="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Ficha Técnica</span>
                            <button onClick={onClose} className="p-2.5 rounded-full hover:bg-gray-100 text-gray-400 transition-all hover:rotate-90"><Icon name="x" /></button>
                        </div>
                        <div className="px-6 py-8 md:px-14 md:py-16">
                            <div className="flex flex-col md:flex-row gap-10 md:gap-16">
                                <div className="w-full md:w-80 shrink-0">
                                    <div className="relative">
                                        <div className="aspect-[3/4.2] rounded-[32px] shadow-2xl overflow-hidden bg-gray-50 border-[10px] border-white ring-1 ring-gray-100 transition-transform duration-500">
                                            <img src={coverUrl} alt={book.title} className="w-full h-full object-cover" onError={(e) => { e.target.src='https://via.placeholder.com/300x450?text=Indisponível'; }} />
                                        </div>
                                    </div>
                                    <div className="mt-6 flex flex-col gap-3">
                                        <button onClick={onToggleQueue} className={`w-full py-4 px-6 rounded-2xl text-[11px] font-black uppercase tracking-widest flex items-center justify-center gap-3 transition-all border-2 ${isInQueue ? 'bg-amber-50 text-amber-600 border-amber-200 shadow-sm' : 'bg-white text-gray-400 border-gray-100 hover:border-teal-200 hover:text-teal-600'}`}>
                                            <Icon name="list" className="w-4 h-4" /> {isInQueue ? 'Na Fila de Leitura' : 'Planear Leitura'}
                                        </button>
                                        <div className="flex gap-2">
                                            <button onClick={onToggleRead} className={`flex-1 py-3 px-4 rounded-xl text-[10px] font-bold uppercase tracking-wider flex items-center justify-center gap-2 transition-all border ${isRead ? 'bg-[#1E3A5F] text-white border-[#1E3A5F] shadow-md shadow-[#1E3A5F]/20' : 'bg-gray-50 text-gray-400 border-gray-100 hover:bg-gray-100'}`}>
                                                <Icon name="check" className="w-3.5 h-3.5" /> Lido
                                            </button>
                                            <button onClick={onToggleDownload} className={`flex-1 py-3 px-4 rounded-xl text-[10px] font-bold uppercase tracking-wider flex items-center justify-center gap-2 transition-all border ${isDownloaded ? 'bg-[#14B8A6] text-white border-[#14B8A6] shadow-md shadow-[#14B8A6]/20' : 'bg-gray-50 text-gray-400 border-gray-100 hover:bg-gray-100'}`}>
                                                <Icon name="download" className="w-3.5 h-3.5" /> Baixado
                                            </button>
                                        </div>
                                        <div className="mt-2 pt-4 border-t border-gray-100 text-center">
                                            {!isConfirmingDelete ? (
                                                <button onClick={() => setIsConfirmingDelete(true)} className="w-full py-2 text-[10px] font-bold text-gray-300 uppercase tracking-widest hover:text-red-400 flex items-center justify-center gap-2 transition-colors">
                                                    <Icon name="trash" className="w-3.5 h-3.5" /> Eliminar Obra
                                                </button>
                                            ) : (
                                                <div className="bg-red-50 p-4 rounded-2xl animate-fade-in">
                                                    <p className="text-[10px] font-black text-red-500 uppercase tracking-widest mb-3">Tem a certeza?</p>
                                                    <div className="flex gap-2 w-full">
                                                        <button onClick={onDelete} className="flex-1 py-2 bg-red-500 text-white rounded-lg text-[10px] font-bold uppercase tracking-widest shadow-sm">Sim</button>
                                                        <button onClick={() => setIsConfirmingDelete(false)} className="flex-1 py-2 bg-white text-gray-400 border border-gray-200 rounded-lg text-[10px] font-bold uppercase tracking-widest">Não</button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex-1 min-w-0">
                                    <div className="mb-10">
                                        <div className="flex flex-wrap gap-2 mb-6">
                                            <span onClick={() => { onGenreClick(book.genre); onClose(); }} className={`text-[10px] uppercase font-black tracking-widest px-4 py-1.5 rounded-full border cursor-pointer hover:shadow-sm transition-all ${styles.bg} ${styles.text} ${styles.border}`}>{book.genre}</span>
                                            {book.isBrazilianAuthor && (
                                                <span className="bg-teal-50 text-[#14B8A6] border border-[#14B8A6]/20 text-[10px] uppercase font-black tracking-widest px-4 py-1.5 rounded-full shadow-sm flex items-center gap-1.5">
                                                    <span>🇧🇷</span> Nacional
                                                </span>
                                            )}
                                        </div>
                                        <h3 className="text-3xl md:text-5xl font-serif font-bold text-[#1E3A5F] mb-4 leading-tight">{book.title}</h3>
                                        <p className="text-xl text-gray-400 italic font-serif">por {book.author}</p>
                                    </div>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-6 mb-12 text-sm">
                                        <div className="flex flex-col gap-1"><span className="text-[10px] text-gray-300 uppercase font-black tracking-widest">Editora</span><span className="font-bold text-[#1E3A5F]">{book.publisher || "Independente"}</span></div>
                                        <div className="flex flex-col gap-1"><span className="text-[10px] text-gray-300 uppercase font-black tracking-widest">Páginas</span><span className="font-bold text-[#1E3A5F]">{book.pages}p</span></div>
                                    </div>
                                    <div className="mb-12 relative">
                                        <div className={`absolute -left-6 top-0 bottom-0 w-1 rounded-full opacity-10 ${styles.text} bg-current`} />
                                        <h4 className={`text-[10px] font-black uppercase tracking-[0.3em] ${styles.text} mb-6`}>Sinopse da Obra</h4>
                                        <p className="text-gray-600 leading-[1.9] text-lg max-w-2xl whitespace-pre-wrap">{book.synopsis}</p>
                                    </div>
                                    <div className="pt-8 border-t border-gray-100 flex flex-wrap gap-2">
                                        {book.tags?.map(t => (
                                            <span key={t} className="text-[11px] font-semibold text-gray-400 lowercase bg-gray-50 px-4 py-2 rounded-xl border border-gray-100">#{t}</span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 4. APP PRINCIPAL ---

        const App = () => {
            const [readStatus, setReadStatus] = useState({});
            const [downloadStatus, setDownloadStatus] = useState({});
            const [customCovers, setCustomCovers] = useState({});
            const [customBooks, setCustomBooks] = useState([]);
            const [removedInitialIds, setRemovedInitialIds] = useState([]);
            const [readingOrder, setReadingOrder] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeGenre, setActiveGenre] = useState("Todos");
            const [filterRead, setFilterRead] = useState(false);
            const [filterDownloaded, setFilterDownloaded] = useState(false);
            const [selectedBook, setSelectedBook] = useState(null);
            const [viewMode, setViewMode] = useState("grid");
            const [isInitialized, setIsInitialized] = useState(false);
            const [user, setUser] = useState({ uid: 'local-user', displayName: 'Modo Local' });
            const [authLoading, setAuthLoading] = useState(false);

            // Monitora estado de autenticação
            useEffect(() => {
                // Modo local: não exige autenticação.
                setUser({ uid: 'local-user', displayName: 'Modo Local' });
                setAuthLoading(false);
            }, []);

            // Funções de autenticação
            const loginWithGoogle = async () => {
                try {
                    await window.signInWithPopup(window.auth, window.provider);
                } catch (error) {
                    console.error('Erro no login:', error);
                }
            };

            const logout = async () => {
                try {
                    await window.signOut(window.auth);
                } catch (error) {
                    console.error('Erro no logout:', error);
                }
            };

            // Carregamento inicial e Sanitização
            useEffect(() => {
                if (!user) return; // Só carrega dados se estiver logado

                const loadData = async () => {
                    const r = await loadFromCloud('lib-read-final-v2', {});
                    const d = await loadFromCloud('lib-download-final-v2', {});
                    const c = await loadFromCloud('lib-covers-final-v2', {});
                    const cb = await loadFromCloud('lib-custom-final-v2', []);
                    const rem = await loadFromCloud('lib-removed-final-v2', []);
                    const q = await loadFromCloud('lib-queue-final-v2', []);
                    
                    setReadStatus(r); setDownloadStatus(d); setCustomCovers(c); 
                    setCustomBooks(cb); setRemovedInitialIds(rem); setReadingOrder(q);
                    setIsInitialized(true);
                };
                loadData();
            }, [user]); // Dependência do user

            // Persistência Automática (Nuvem + LocalStorage)
            useEffect(() => {
                if (!isInitialized || !user) return; // Só salva se estiver logado e inicializado

                // Salva na nuvem
                saveToCloud('lib-read-final-v2', readStatus);
                saveToCloud('lib-download-final-v2', downloadStatus);
                saveToCloud('lib-covers-final-v2', customCovers);
                saveToCloud('lib-custom-final-v2', customBooks);
                saveToCloud('lib-removed-final-v2', removedInitialIds);
                saveToCloud('lib-queue-final-v2', readingOrder);
                
                // Backup no localStorage
                localStorage.setItem('lib-read-final-v2', JSON.stringify(readStatus));
                localStorage.setItem('lib-download-final-v2', JSON.stringify(downloadStatus));
                localStorage.setItem('lib-covers-final-v2', JSON.stringify(customCovers));
                localStorage.setItem('lib-custom-final-v2', JSON.stringify(customBooks));
                localStorage.setItem('lib-removed-final-v2', JSON.stringify(removedInitialIds));
                localStorage.setItem('lib-queue-final-v2', JSON.stringify(readingOrder));
            }, [readStatus, downloadStatus, customCovers, customBooks, removedInitialIds, readingOrder, isInitialized, user]); // Adicionada dependência do user

            const allBooksCombined = useMemo(() => {
                const initialVisible = INITIAL_BOOKS.filter(b => !removedInitialIds.includes(b.id));
                return [...initialVisible, ...customBooks];
            }, [customBooks, removedInitialIds]);

            const handleToggleRead = useCallback((id) => setReadStatus(p => ({ ...p, [id]: !p[id] })), []);
            const handleToggleDownload = useCallback((id) => setDownloadStatus(p => ({ ...p, [id]: !p[id] })), []);
            const handleToggleQueue = useCallback((id) => setReadingOrder(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]), []);

            const deleteBookFromCatalog = (id) => {
                const isCustom = customBooks.some(b => b.id === id);
                if (isCustom) setCustomBooks(p => p.filter(b => b.id !== id));
                else setRemovedInitialIds(p => [...p, id]);
                setReadingOrder(p => p.filter(bId => bId !== id));
                setSelectedBook(null);
            };

            const handleGenreFilter = useCallback((genre) => {
                setActiveGenre(genre);
                setViewMode('grid');
                setSearchQuery("");
                setFilterRead(false);
                setFilterDownloaded(false);
            }, []);

            const filteredBooks = useMemo(() => {
                if (viewMode === "queue") return readingOrder.map(id => allBooksCombined.find(b => b.id === id)).filter(Boolean);
                return allBooksCombined.filter(b => {
                    const titleMatch = (b.title || "").toLowerCase().includes(searchQuery.toLowerCase());
                    const authorMatch = (b.author || "").toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesSearch = titleMatch || authorMatch;

                    let matchesGenre = true;
                    if (activeGenre === "Distopia") matchesGenre = b.isDistopia;
                    else if (activeGenre !== "Todos") matchesGenre = b.genre === activeGenre;

                    const matchesRead = filterRead ? readStatus[b.id] : true;
                    const matchesDownloaded = filterDownloaded ? downloadStatus[b.id] : true;
                    return matchesSearch && matchesGenre && matchesRead && matchesDownloaded;
                });
            }, [searchQuery, activeGenre, filterRead, filterDownloaded, readStatus, downloadStatus, viewMode, readingOrder, allBooksCombined]);

            const stats = {
                total: allBooksCombined.length,
                read: Object.values(readStatus).filter(Boolean).length,
                downloaded: Object.values(downloadStatus).filter(Boolean).length
            };

            const getCoverUrl = (b) => customCovers[b.id] || b.coverUrl || `https://covers.openlibrary.org/b/isbn/${b.isbn}-L.jpg`;

            return (
                <div className="min-h-screen">
                    {authLoading ? (
                        <div className="flex items-center justify-center min-h-screen">
                            <div className="text-center">
                                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-[#14B8A6] mx-auto mb-4"></div>
                                <p className="text-gray-600">Carregando...</p>
                            </div>
                        </div>
                    ) : !user ? (
                        <div className="min-h-screen bg-[#F3F4F6] flex items-center justify-center px-6">
                            <div className="max-w-md w-full text-center bg-[#1E3A5F] rounded-3xl px-8 py-10 shadow-2xl shadow-[#1E3A5F]/20 border border-white/10">
                                <div className="logo-container mx-auto mb-8">
                                    <img
                                        src="https://i.imgur.com/FGFYV7A.png"
                                        alt="Biblioteca do Amanhã"
                                        className="animate-fade-in mx-auto"
                                        referrerPolicy="no-referrer"
                                        crossOrigin="anonymous"
                                        onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/260x86/1E3A5F/FFFFFF?text=Biblioteca+do+Amanh%C3%A3'; }}
                                    />
                                </div>
                                <button onClick={loginWithGoogle} className="w-full px-6 py-3 bg-[#14B8A6] hover:bg-[#0ea5e9] text-white rounded-lg text-lg font-medium transition-all flex items-center justify-center gap-3">
                                    <svg className="w-5 h-5" viewBox="0 0 24 24">
                                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                    </svg>
                                    Entrar com Google
                                </button>
                            </div>
                        </div>
                    ) : (
                    <>
                    <header className="bg-[#1E3A5F] text-white pt-20 pb-12 px-6 relative overflow-hidden text-center md:text-left">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-12 relative z-10">
                            <div className="logo-container">
                                <img
                                    src="https://i.imgur.com/FGFYV7A.png"
                                    alt="Biblioteca do Amanhã"
                                    className="animate-fade-in"
                                    referrerPolicy="no-referrer"
                                    crossOrigin="anonymous"
                                    onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/260x86/1E3A5F/FFFFFF?text=Biblioteca+do+Amanh%C3%A3'; }}
                                />
                            </div>
                            <div className="grid grid-cols-3 gap-3 md:gap-6 w-full md:w-auto">
                                <AnimatedStatCard label="Total" value={stats.total} />
                                <AnimatedStatCard label="Lidos" value={stats.read} />
                                <AnimatedStatCard label="Baixados" value={stats.downloaded} />
                            </div>

                        </div>
                        <div className="absolute top-0 right-0 w-[600px] h-[600px] bg-[#14B8A6] rounded-full blur-[160px] opacity-[0.07] -mr-64 -mt-64"></div>
                        <div className="absolute bottom-0 left-0 w-96 h-96 bg-[#7C3AED] rounded-full blur-[140px] opacity-[0.05] -ml-48 -mb-48"></div>
                    </header>

                    <nav className="sticky top-0 z-40 bg-white/95 backdrop-blur-xl border-b border-gray-100 shadow-sm transition-all duration-300">
                        <div className="max-w-7xl mx-auto flex flex-col">
                            <div className="px-6 py-4 flex flex-col xl:flex-row gap-4 items-center justify-between">
                                <div className="flex bg-gray-100 p-1 rounded-xl shrink-0 w-full xl:w-auto">
                                    <button onClick={() => setViewMode('grid')} className={`flex-1 xl:flex-none flex items-center justify-center gap-2 px-6 py-2 rounded-lg text-xs font-bold transition-all ${viewMode === 'grid' ? 'bg-white text-[#1E3A5F] shadow-sm' : 'text-gray-400'}`}>
                                        <Icon name="grid" className="w-3.5 h-3.5" /> Catálogo
                                    </button>
                                    <button onClick={() => setViewMode('queue')} className={`flex-1 xl:flex-none flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all ${viewMode === 'queue' ? 'bg-[#14B8A6] text-white shadow-sm' : 'text-gray-400'}`}>
                                        <Icon name="list" className="w-3.5 h-3.5" /> Minha Fila
                                    </button>
                                </div>
                                <div className="relative w-full xl:max-w-md">
                                    <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" />
                                    <input type="text" placeholder="Pesquisar..." className="w-full pl-11 pr-4 py-2.5 bg-[#F8F9FB] border border-gray-200 rounded-2xl text-sm focus:ring-2 focus:ring-[#14B8A6]/20 outline-none" value={searchQuery} disabled={viewMode === 'queue'} onChange={(e) => setSearchQuery(e.target.value)} />
                                </div>
                                <div className="flex gap-2 w-full xl:w-auto">
                                    <button onClick={() => setFilterRead(!filterRead)} className={`flex-1 xl:flex-none px-6 py-2.5 rounded-xl text-xs font-bold transition-all border ${filterRead ? 'bg-[#1E3A5F] text-white border-transparent' : 'bg-white text-gray-400 border-gray-100'}`}>Lido</button>
                                    <button onClick={() => setFilterDownloaded(!filterDownloaded)} className={`flex-1 xl:flex-none px-6 py-2.5 rounded-xl text-xs font-bold transition-all border ${filterDownloaded ? 'bg-[#14B8A6] text-white border-transparent' : 'bg-white text-gray-400 border-gray-100'}`}>Baixado</button>
                                </div>
                            </div>

                            <div className="genre-nav-row no-scrollbar">
                                {GENRES.map(g => (
                                    <button key={g} onClick={() => handleGenreFilter(g)} className={`px-5 py-2 rounded-full text-[11px] font-black uppercase tracking-widest whitespace-nowrap transition-all border ${activeGenre === g ? "bg-[#14B8A6] text-white border-[#14B8A6] shadow-md shadow-[#14B8A6]/20" : "bg-white text-gray-400 border-gray-100 hover:border-teal-100 hover:text-teal-600"}`}>{g}</button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    <main key={viewMode} className="max-w-7xl mx-auto px-6 py-12">
                        <div className={viewMode === 'queue' ? "flex flex-col gap-6 max-w-3xl mx-auto" : "grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-8"}>
                            {filteredBooks.map((b, idx) => b && (
                                <BookCard 
                                    key={b.id} book={b} isRead={readStatus[b.id]} isDownloaded={downloadStatus[b.id]} 
                                    coverUrl={getCoverUrl(b)} onClick={() => setSelectedBook(b)}
                                    isQueueMode={viewMode === 'queue'} queueIndex={idx} totalInQueue={readingOrder.length}
                                    onMove={(idx, dir) => {
                                        const n = [...readingOrder];
                                        const t = idx + dir;
                                        if (t >= 0 && t < n.length) {
                                            const [m] = n.splice(idx, 1);
                                            n.splice(t, 0, m);
                                            setReadingOrder(n);
                                        }
                                    }} 
                                    onRemoveFromQueue={() => handleToggleQueue(b.id)} 
                                    onGenreClick={handleGenreFilter}
                                />
                            ))}
                        </div>
                    </main>

                    {selectedBook && (
                        <DetailModal 
                            book={selectedBook} onClose={() => setSelectedBook(null)} 
                            isRead={readStatus[selectedBook.id]} isDownloaded={downloadStatus[selectedBook.id]} isInQueue={readingOrder.includes(selectedBook.id)}
                            coverUrl={getCoverUrl(selectedBook)} 
                            onToggleRead={() => handleToggleRead(selectedBook.id)}
                            onToggleDownload={() => handleToggleDownload(selectedBook.id)} 
                            onToggleQueue={() => handleToggleQueue(selectedBook.id)}
                            onSetCover={(id, u) => setCustomCovers(p => ({ ...p, [id]: u }))} 
                            onRemoveCover={(id) => setCustomCovers(p => { const n = { ...p }; delete n[id]; return n; })} 
                            hasCustomCover={!!customCovers[selectedBook.id]}
                            onDelete={() => deleteBookFromCatalog(selectedBook.id)}
                            onGenreClick={handleGenreFilter}
                        />
                    )}

                    <footer className="max-w-7xl mx-auto px-6 pb-12 border-t border-gray-100 text-center pt-8">
                        <p className="text-gray-400 text-[10px] tracking-widest uppercase font-black">Biblioteca do Amanhã &copy; 2024</p>
                    </footer>
                    </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
