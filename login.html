<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Biblioteca do Amanhã</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --teal: #14B8A6;
            --teal-dark: #0d9e8e;
            --teal-glow: rgba(20, 184, 166, 0.4);
            --navy: #1E3A5F;
            --navy-deep: #0F2240;
            --bg: #F8F9FB;
            --text: #111827;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--navy-deep);
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* ── Background ── */
        .bg-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(20,184,166,0.25), rgba(30,58,95,0.5), var(--navy-deep));
        }

        .bg-noise {
            position: absolute;
            inset: 0;
            opacity: 0.03;
            mix-blend-mode: soft-light;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        .glow-top {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 120vh;
            height: 60vh;
            border-radius: 0 0 50% 50%;
            background: rgba(20,184,166,0.15);
            filter: blur(80px);
            animation: pulse-glow 8s ease-in-out infinite alternate;
        }

        .glow-bottom {
            position: absolute;
            bottom: -15%;
            left: 50%;
            transform: translateX(-50%);
            width: 90vh;
            height: 90vh;
            border-radius: 50% 50% 0 0;
            background: rgba(20,184,166,0.12);
            filter: blur(60px);
            animation: pulse-glow 6s ease-in-out 1s infinite alternate;
        }

        .glow-spot {
            position: absolute;
            width: 24rem;
            height: 24rem;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
            filter: blur(100px);
            animation: pulse-glow 4s ease-in-out infinite alternate;
        }
        .glow-spot.left { left: 15%; top: 20%; }
        .glow-spot.right { right: 15%; bottom: 20%; animation-delay: 1s; }

        @keyframes pulse-glow {
            0% { opacity: 0.3; transform: translateX(-50%) scale(0.98); }
            100% { opacity: 0.6; transform: translateX(-50%) scale(1.03); }
        }
        .glow-spot.left, .glow-spot.right {
            animation-name: pulse-spot;
        }
        @keyframes pulse-spot {
            0% { opacity: 0.3; }
            100% { opacity: 0.5; }
        }

        /* ── Card wrapper ── */
        .card-wrapper {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            perspective: 1500px;
            padding: 1rem;
            animation: card-enter 0.8s ease-out both;
        }

        @keyframes card-enter {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-3d {
            position: relative;
            transition: transform 0.15s ease-out;
        }

        .card-group { position: relative; }

        /* ── Light beams ── */
        .beam-container {
            position: absolute;
            inset: -1px;
            border-radius: 1rem;
            overflow: hidden;
            pointer-events: none;
        }

        .beam {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(20,184,166,0.7), transparent);
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }

        .beam-top {
            top: 0; left: -50%;
            height: 3px; width: 50%;
            animation: beam-lr 5.5s ease-in-out infinite;
            animation-delay: 0s;
        }
        .beam-right {
            top: -50%; right: 0;
            width: 3px; height: 50%;
            background: linear-gradient(180deg, transparent, rgba(20,184,166,0.7), transparent);
            animation: beam-tb 5.5s ease-in-out infinite;
            animation-delay: 2s;
        }
        .beam-bottom {
            bottom: 0; right: -50%;
            height: 3px; width: 50%;
            animation: beam-rl 5.5s ease-in-out infinite;
            animation-delay: 4s;
        }
        .beam-left {
            bottom: -50%; left: 0;
            width: 3px; height: 50%;
            background: linear-gradient(180deg, transparent, rgba(20,184,166,0.7), transparent);
            animation: beam-bt 5.5s ease-in-out infinite;
            animation-delay: 6s;
        }

        @keyframes beam-lr { 0% { left: -50%; } 100% { left: 100%; } }
        @keyframes beam-rl { 0% { right: -50%; } 100% { right: 100%; } }
        @keyframes beam-tb { 0% { top: -50%; } 100% { top: 100%; } }
        @keyframes beam-bt { 0% { bottom: -50%; } 100% { bottom: 100%; } }

        /* Corner glows */
        .corner-glow {
            position: absolute;
            border-radius: 50%;
            background: rgba(20,184,166,0.5);
            filter: blur(1px);
            animation: corner-pulse 2.2s ease-in-out infinite alternate;
        }
        .corner-glow.tl { top: -1px; left: -1px; width: 5px; height: 5px; }
        .corner-glow.tr { top: -1px; right: -1px; width: 8px; height: 8px; animation-delay: 0.5s; }
        .corner-glow.br { bottom: -1px; right: -1px; width: 8px; height: 8px; animation-delay: 1s; }
        .corner-glow.bl { bottom: -1px; left: -1px; width: 5px; height: 5px; animation-delay: 1.5s; }

        @keyframes corner-pulse {
            0% { opacity: 0.2; }
            100% { opacity: 0.5; }
        }

        /* ── Card border glow on hover ── */
        .card-group:hover .card-border-glow {
            opacity: 0.6;
        }
        .card-border-glow {
            position: absolute;
            inset: -0.5px;
            border-radius: 1rem;
            background: linear-gradient(to right, rgba(20,184,166,0.05), rgba(20,184,166,0.12), rgba(20,184,166,0.05));
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        /* ── Glass card ── */
        .glass-card {
            position: relative;
            background: rgba(15, 34, 64, 0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 1.25rem;
            padding: 2.75rem 2.5rem;
            border: 1px solid rgba(20,184,166,0.08);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .card-grid-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.025;
            background-image:
                linear-gradient(135deg, white 0.5px, transparent 0.5px),
                linear-gradient(45deg, white 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        /* ── Header ── */
        .logo-img {
            display: block;
            width: auto;
            max-width: 270px;
            height: auto;
            margin: 0 auto 1.25rem;
            animation: logo-pop 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes logo-pop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .header-title {
            font-size: 1.35rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(to bottom, white, rgba(255,255,255,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fade-up 0.6s ease-out 0.2s both;
        }
        .header-subtitle {
            font-size: 0.875rem;
            text-align: center;
            color: rgba(255,255,255,0.55);
            margin-top: 0.2rem;
            animation: fade-up 0.6s ease-out 0.3s both;
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Form ── */
        .form-group {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            border-radius: 0.5rem;
            overflow: hidden;
            transition: transform 0.2s ease;
        }
        .input-wrapper:hover { transform: scale(1.01); }
        .input-wrapper:focus-within { transform: scale(1.02); }
        .input-wrapper:focus-within .input-highlight {
            opacity: 1;
        }
        .input-wrapper:focus-within .input-icon {
            color: white;
        }

        .input-highlight {
            position: absolute;
            inset: 0;
            background: rgba(20,184,166,0.06);
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 0;
            pointer-events: none;
        }

        .input-icon {
            position: absolute;
            left: 0.85rem;
            width: 1.1rem;
            height: 1.1rem;
            color: rgba(255,255,255,0.35);
            transition: color 0.3s;
            z-index: 2;
            pointer-events: none;
        }

        .input-field {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid transparent;
            color: white;
            font-size: 0.95rem;
            font-family: inherit;
            height: 3.1rem;
            padding: 0 0.85rem 0 2.65rem;
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }
        .input-field::placeholder { color: rgba(255,255,255,0.28); }
        .input-field:focus {
            border-color: rgba(20,184,166,0.3);
            background: rgba(255,255,255,0.07);
        }

        .toggle-password {
            position: absolute;
            right: 0.85rem;
            cursor: pointer;
            z-index: 2;
            color: rgba(255,255,255,0.35);
            transition: color 0.3s;
            background: none;
            border: none;
            padding: 0;
            display: flex;
        }
        .toggle-password:hover { color: white; }
        .toggle-password svg { width: 1.1rem; height: 1.1rem; }

        /* ── Remember / Forgot ── */
        .options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.25rem;
        }

        .remember-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.55);
            transition: color 0.2s;
        }
        .remember-label:hover { color: rgba(255,255,255,0.75); }

        .custom-checkbox {
            appearance: none;
            width: 1rem;
            height: 1rem;
            border-radius: 0.25rem;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.04);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .custom-checkbox:checked {
            background: var(--teal);
            border-color: var(--teal);
        }
        .custom-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 5px;
            height: 9px;
            border: solid var(--navy-deep);
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .forgot-link {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            transition: color 0.2s;
        }
        .forgot-link:hover { color: white; }

        /* ── Buttons ── */
        .btn-primary {
            position: relative;
            width: 100%;
            margin-top: 1.25rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            font-family: inherit;
        }
        .btn-primary:hover { transform: scale(1.02); }
        .btn-primary:active { transform: scale(0.98); }

        .btn-primary .btn-glow {
            position: absolute;
            inset: 0;
            background: var(--teal-glow);
            border-radius: 0.5rem;
            filter: blur(16px);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-primary:hover .btn-glow { opacity: 0.5; }

        .btn-primary .btn-inner {
            position: relative;
            overflow: hidden;
            background: var(--teal);
            color: var(--navy-deep);
            font-weight: 600;
            font-size: 0.95rem;
            height: 3.1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            transition: background 0.3s;
        }
        .btn-primary:hover .btn-inner { background: var(--teal-dark); }
        .btn-primary:disabled { pointer-events: none; opacity: 0.6; }

        .btn-inner .loading-shimmer {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: translateX(-100%);
            opacity: 0;
        }
        .btn-primary.is-loading .loading-shimmer {
            opacity: 1;
            animation: shimmer 1.5s ease-in-out infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .btn-inner .spinner {
            display: none;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(15,34,64,0.5);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn-primary.is-loading .spinner { display: block; }
        .btn-primary.is-loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-inner .btn-text {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .btn-inner .arrow-icon {
            width: 0.85rem;
            height: 0.85rem;
            transition: transform 0.3s;
        }
        .btn-primary:hover .arrow-icon { transform: translateX(4px); }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            margin: 1rem 0 1.25rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .divider-text {
            margin: 0 0.75rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
            animation: divider-pulse 3s ease-in-out infinite alternate;
        }
        @keyframes divider-pulse {
            0% { opacity: 0.6; }
            100% { opacity: 0.9; }
        }

        /* ── Google button ── */
        .btn-google {
            position: relative;
            width: 100%;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            font-family: inherit;
        }
        .btn-google:hover { transform: scale(1.02); }
        .btn-google:active { transform: scale(0.98); }

        .btn-google .btn-inner-google {
            position: relative;
            overflow: hidden;
            background: rgba(255,255,255,0.04);
            color: white;
            font-weight: 500;
            font-size: 0.875rem;
            height: 3.1rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        .btn-google:hover .btn-inner-google {
            border-color: rgba(255,255,255,0.18);
            color: white;
        }
        .btn-google .google-hover-sweep {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            transform: translateX(-100%);
            transition: transform 1s ease-in-out;
        }
        .btn-google:hover .google-hover-sweep {
            transform: translateX(100%);
        }

        .google-icon {
            width: 1.1rem;
            height: 1.1rem;
        }

        /* ── Footer link ── */
        .footer-text {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            margin-top: 1.25rem;
            animation: fade-up 0.6s ease-out 0.5s both;
        }
        .footer-text a {
            color: white;
            font-weight: 500;
            text-decoration: none;
            position: relative;
        }
        .footer-text a::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 0;
            height: 1px;
            background: white;
            transition: width 0.3s;
        }
        .footer-text a:hover::after { width: 100%; }
        .footer-text a:hover { color: rgba(255,255,255,0.7); }

        /* ── Error/Status messages ── */
        .login-message {
            font-size: 0.78rem;
            text-align: center;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            margin-top: 0.75rem;
            display: none;
            animation: fade-up 0.3s ease-out both;
        }
        .login-message.error {
            display: block;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #fca5a5;
        }
        .login-message.success {
            display: block;
            background: rgba(20,184,166,0.1);
            border: 1px solid rgba(20,184,166,0.2);
            color: #5eead4;
        }

        /* ── Reset password modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,34,64,0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }

        .modal-card {
            background: rgba(15, 34, 64, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(20,184,166,0.1);
            border-radius: 1rem;
            padding: 2rem 1.75rem;
            max-width: 380px;
            width: 100%;
            animation: card-enter 0.4s ease-out both;
        }
        .modal-card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            margin-bottom: 0.35rem;
        }
        .modal-card p {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 1.25rem;
        }
        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .modal-actions button {
            flex: 1;
            height: 2.5rem;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-cancel {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.1) !important;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }
        .btn-confirm {
            background: var(--teal);
            color: var(--navy-deep);
        }
        .btn-confirm:hover { background: var(--teal-dark); }
    </style>
</head>
<body>
    <!-- Background layers -->
    <div class="bg-gradient"></div>
    <div class="bg-noise"></div>
    <div class="glow-top"></div>
    <div class="glow-bottom"></div>
    <div class="glow-spot left"></div>
    <div class="glow-spot right"></div>

    <!-- Card -->
    <div class="card-wrapper">
        <div class="card-3d" id="card3d">
            <div class="card-group">
                <!-- Light beams -->
                <div class="beam-container">
                    <div class="beam beam-top"></div>
                    <div class="beam beam-right"></div>
                    <div class="beam beam-bottom"></div>
                    <div class="beam beam-left"></div>
                    <div class="corner-glow tl"></div>
                    <div class="corner-glow tr"></div>
                    <div class="corner-glow br"></div>
                    <div class="corner-glow bl"></div>
                </div>

                <div class="card-border-glow"></div>

                <!-- Glass card -->
                <div class="glass-card">
                    <div class="card-grid-pattern"></div>

                    <!-- Logo & header -->
                    <img src="https://i.imgur.com/ewWnZWm.png" alt="Biblioteca do Amanhã" class="logo-img">
                    <p class="header-subtitle">Entre para acessar sua biblioteca</p>

                    <!-- Form -->
                    <form id="loginForm" class="form-group" autocomplete="on">
                        <!-- Email -->
                        <div class="input-wrapper">
                            <div class="input-highlight"></div>
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                            <input type="email" class="input-field" id="emailInput" placeholder="Email" autocomplete="email" required>
                        </div>

                        <!-- Password -->
                        <div class="input-wrapper">
                            <div class="input-highlight"></div>
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            <input type="password" class="input-field" id="passwordInput" placeholder="Senha" autocomplete="current-password" required style="padding-right: 2.75rem;">
                            <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar senha">
                                <svg id="eyeClosedIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
                                <svg id="eyeOpenIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>

                        <!-- Remember / Forgot -->
                        <div class="options-row">
                            <label class="remember-label">
                                <input type="checkbox" class="custom-checkbox" id="rememberMe" checked>
                                Lembrar de mim
                            </label>
                            <a href="#" class="forgot-link" id="forgotLink">Esqueceu a senha?</a>
                        </div>

                        <!-- Sign in button -->
                        <button type="submit" class="btn-primary" id="submitBtn">
                            <div class="btn-glow"></div>
                            <div class="btn-inner">
                                <div class="loading-shimmer"></div>
                                <div class="spinner"></div>
                                <span class="btn-text">
                                    Entrar
                                    <svg class="arrow-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                                </span>
                            </div>
                        </button>

                        <!-- Status message -->
                        <div class="login-message" id="loginMessage"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Forgot password modal -->
    <div class="modal-overlay" id="resetModal">
        <div class="modal-card">
            <h2>Redefinir senha</h2>
            <p>Enviaremos um email com instruções para redefinir sua senha.</p>
            <div class="input-wrapper" style="margin-bottom: 0;">
                <div class="input-highlight"></div>
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                <input type="email" class="input-field" id="resetEmailInput" placeholder="Seu email cadastrado">
            </div>
            <div class="login-message" id="resetMessage" style="margin-top: 0.75rem;"></div>
            <div class="modal-actions">
                <button class="btn-cancel" id="resetCancel">Cancelar</button>
                <button class="btn-confirm" id="resetConfirm">Enviar</button>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, setPersistence, browserLocalPersistence, browserSessionPersistence, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA6cx6vGuJHzohRyr-uda_gI7_MavD_OmU",
            authDomain: "biblioteca-do-amanha.firebaseapp.com",
            projectId: "biblioteca-do-amanha",
            storageBucket: "biblioteca-do-amanha.firebasestorage.app",
            messagingSenderId: "39485326387",
            appId: "1:39485326387:web:84c1e13522efa7cbb1cf46"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // If already logged in, redirect
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'index.html';
        });

        // DOM refs
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const togglePassword = document.getElementById('togglePassword');
        const eyeClosed = document.getElementById('eyeClosedIcon');
        const eyeOpen = document.getElementById('eyeOpenIcon');
        const rememberMe = document.getElementById('rememberMe');
        const submitBtn = document.getElementById('submitBtn');
        const loginMessage = document.getElementById('loginMessage');
        const forgotLink = document.getElementById('forgotLink');
        const resetModal = document.getElementById('resetModal');
        const resetEmailInput = document.getElementById('resetEmailInput');
        const resetMessage = document.getElementById('resetMessage');
        const resetCancel = document.getElementById('resetCancel');
        const resetConfirm = document.getElementById('resetConfirm');

        // Toggle password visibility
        togglePassword.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeClosed.style.display = isPassword ? 'none' : 'block';
            eyeOpen.style.display = isPassword ? 'block' : 'none';
        });

        // Show message
        function showMessage(el, text, type = 'error') {
            el.textContent = text;
            el.className = 'login-message ' + type;
        }
        function hideMessage(el) {
            el.className = 'login-message';
            el.textContent = '';
        }

        // Login
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage(loginMessage);

            const email = emailInput.value.trim().toLowerCase();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage(loginMessage, 'Preencha email e senha para entrar.', 'error');
                return;
            }

            submitBtn.classList.add('is-loading');
            submitBtn.disabled = true;

            try {
                await setPersistence(auth, rememberMe.checked ? browserLocalPersistence : browserSessionPersistence);
                await signInWithEmailAndPassword(auth, email, password);
                // onAuthStateChanged will redirect
            } catch (error) {
                const code = error?.code || '';
                if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') {
                    showMessage(loginMessage, 'Email ou senha incorretos.', 'error');
                } else if (code === 'auth/too-many-requests') {
                    showMessage(loginMessage, 'Muitas tentativas. Aguarde um pouco.', 'error');
                } else {
                    showMessage(loginMessage, 'Erro ao entrar. Tente novamente.', 'error');
                }
            } finally {
                submitBtn.classList.remove('is-loading');
                submitBtn.disabled = false;
            }
        });

        // Forgot password
        forgotLink.addEventListener('click', (e) => {
            e.preventDefault();
            resetEmailInput.value = emailInput.value || '';
            hideMessage(resetMessage);
            resetModal.classList.add('active');
        });

        resetCancel.addEventListener('click', () => {
            resetModal.classList.remove('active');
        });

        resetModal.addEventListener('click', (e) => {
            if (e.target === resetModal) resetModal.classList.remove('active');
        });

        resetConfirm.addEventListener('click', async () => {
            const email = resetEmailInput.value.trim().toLowerCase();
            if (!email) {
                showMessage(resetMessage, 'Informe seu email.', 'error');
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                showMessage(resetMessage, 'Email de redefinição enviado! Verifique sua caixa de entrada.', 'success');
                setTimeout(() => resetModal.classList.remove('active'), 3000);
            } catch {
                showMessage(resetMessage, 'Não foi possível enviar. Verifique o email.', 'error');
            }
        });

        // 3D card mouse follow
        const card3d = document.getElementById('card3d');
        card3d.addEventListener('mousemove', (e) => {
            const rect = card3d.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            const rotateY = (x / rect.width) * 12;
            const rotateX = -(y / rect.height) * 12;
            card3d.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        card3d.addEventListener('mouseleave', () => {
            card3d.style.transform = 'rotateX(0) rotateY(0)';
        });
    </script>
</body>
</html>
